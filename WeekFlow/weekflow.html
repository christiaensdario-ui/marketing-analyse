  const tip = document.getElementById('cal-resize-tip');
  if (!tip) return;
  const endH   = startH + dur;
  const durTxt = dur >= 1 ? dur + 'u' : Math.round(dur * 60) + ' min';
  tip.textContent = _floatToTime(startH) + ' – ' + _floatToTime(endH) + ' (' + durTxt + ')';
  tip.style.display = 'block';
  tip.style.left    = (x + 16) + 'px';
  tip.style.top     = Math.max(8, y - 36) + 'px';
}

function _doResize(e) {
  if (!_resizeState) return;
  const { startY, rowH, origDur, origStart, blockId, day, blkEl } = _resizeState;
  const deltaH = (e.clientY - startY) / rowH;
  const newDur = Math.max(0.5, Math.round((origDur + deltaH) * 2) / 2); // 30-min snap
  _resizeState.currentDur = newDur;
  const conflict = _checkOverlap(day, origStart, newDur, blockId);
  _resizeState.hasConflict = conflict;
  blkEl.style.height = `calc(${newDur} * var(--row-h))`;
  blkEl.classList.toggle('has-conflict', conflict);
  _updateResizeTip(e.clientX, e.clientY, origStart, newDur);
}

function _endResize(e) {
  if (!_resizeState) return;
  document.removeEventListener('mousemove', _doResize);
  document.removeEventListener('mouseup',   _endResize);
  const tip = document.getElementById('cal-resize-tip');
  if (tip) tip.style.display = 'none';
  const { blockId, origDur, origStart, day, blkEl, currentDur, hasConflict } = _resizeState;
  _resizeState = null;
  blkEl.classList.remove('is-resizing', 'has-conflict');
  if (!hasConflict && currentDur !== origDur) {
    // Valid resize → save
    const blocks = _lsGet(KEYS.blocks, []);
    const b = blocks.find(bl => bl.id === blockId);
    if (b) { b.durationHours = currentDur; _lsSet(KEYS.blocks, blocks); }
    _render();
  } else if (currentDur !== origDur) {
    // Invalid → snap back + shake
    blkEl.style.height = `calc(${origDur} * var(--row-h))`;
    blkEl.classList.add('is-shaking');
    blkEl.addEventListener('animationend', () => blkEl.classList.remove('is-shaking'), { once: true });
    showToast('⚠️ Kan niet verkleinen — overlapt met blok of shift');
  }
}

// ─── Popover ──────────────────────────────────────────────────────────────────
function _closePopover() {
  const pop  = document.getElementById('cal-pop');
  const back = document.getElementById('cal-pop-back');
  if (pop)  pop.classList.remove('visible');
  if (back) back.classList.remove('visible');
  _popCtx = null;
}

function _openPopover(html, x, y) {
  const pop  = document.getElementById('cal-pop');
  const back = document.getElementById('cal-pop-back');
  pop.innerHTML = html;
  pop.classList.add('visible');
  back.classList.add('visible');
  setTimeout(() => {
    const pw = pop.offsetWidth, ph = pop.offsetHeight;
    let left = x + 12, top = y - 10;
    if (left + pw > window.innerWidth  - 8) left = x - pw - 12;
    if (top  + ph > window.innerHeight - 8) top  = window.innerHeight - ph - 8;
    pop.style.left = Math.max(6, left) + 'px';
    pop.style.top  = Math.max(6, top)  + 'px';
  }, 0);
}

function _showAddPopover(day, startHour, catId, x, y) {
  const cats = _lsGet(KEYS.categories, null) || DEFAULT_CATS;
  const cat  = cats.find(c => c.id === catId);
  if (!cat) return;
  if (catId === 'studie') { _showStudyPopover(day, startHour, catId, x, y); return; }
  _popCtx = { type: 'add', day, startHour, catId };
  _openPopover(`
    <div class="pop-title" style="border-left:3px solid ${cat.color}">${_esc(cat.name)} toevoegen</div>
    <div class="pop-field">
      <div class="pop-lbl">Naam</div>
      <input id="pop-name" type="text" value="${_esc(cat.name)}" placeholder="Naam">
    </div>
    <div class="pop-field">
      <div class="pop-lbl">Starttijd</div>
      <input id="pop-time" type="time" value="${_floatToTime(startHour)}">
    </div>
    <div class="pop-field">
      <div class="pop-lbl">Duur (uren)</div>
      <input id="pop-dur" type="number" min="0.5" max="8" step="0.5" value="${cat.durationHours || 1}">
    </div>
    <div class="pop-actions">
      <button class="pop-ok" onclick="_confirmAdd()">Toevoegen</button>
      <button class="pop-x"  onclick="_closePopover()">Annuleer</button>
    </div>`, x, y);
  setTimeout(() => { const i = document.getElementById('pop-name'); if (i) { i.focus(); i.select(); } }, 40);
}

function _confirmAdd() {
  if (!_popCtx || _popCtx.type !== 'add') return;
  const name     = (document.getElementById('pop-name') || {}).value || '';
  const timeVal  = (document.getElementById('pop-time') || {}).value;
  const dur      = +((document.getElementById('pop-dur') || {}).value) || 1;
  const startHour = _timeToFloat(timeVal || _floatToTime(_popCtx.startHour));
  if (_checkOverlap(_popCtx.day, startHour, dur)) {
    showToast('⚠️ Overlapt met bestaand blok of werkshift');
    return;
  }
  const blocks = _lsGet(KEYS.blocks, []);
  const _newBlockId = _genId();
  blocks.push({ id: _newBlockId, day: _popCtx.day, startHour, durationHours: dur, category: _popCtx.catId, name: name.trim() });
  _lsSet(KEYS.blocks, blocks);
  const _addDay = _popCtx.day;
  _closePopover();
  _render();
  _checkOverbooking(_addDay, _newBlockId);
}

function _showEditPopover(blockId, x, y) {
  const blocks = _lsGet(KEYS.blocks, []);
  const b = blocks.find(bl => bl.id === blockId);
  if (!b) return;
  const cats  = _lsGet(KEYS.categories, null) || DEFAULT_CATS;
  const cat   = cats.find(c => c.id === b.category);
  const color = cat ? cat.color : '#94a3b8';
  _popCtx = { type: 'edit', blockId };
  _openPopover(`
    <div class="pop-title" style="border-left:3px solid ${color}">${_esc(b.name || (cat ? cat.name : 'Blok'))} bewerken</div>
    <div class="pop-field">
      <div class="pop-lbl">Naam</div>
      <input id="pop-name" type="text" value="${_esc(b.name || '')}" placeholder="Naam">
    </div>
    <div class="pop-field">
      <div class="pop-lbl">Starttijd</div>
      <input id="pop-time" type="time" value="${_floatToTime(b.startHour)}">
    </div>
    <div class="pop-field">
      <div class="pop-lbl">Duur (uren)</div>
      <input id="pop-dur" type="number" min="0.5" max="8" step="0.5" value="${b.durationHours}">
    </div>
    <div class="pop-actions">
      <button class="pop-ok"  onclick="_confirmEdit()">Opslaan</button>
      <button class="pop-del" onclick="_deleteBlock()">Verwijder</button>
      <button class="pop-x"   onclick="_closePopover()">✕</button>
    </div>`, x, y);
}

function _confirmEdit() {
  if (!_popCtx || _popCtx.type !== 'edit') return;
  const name      = (document.getElementById('pop-name') || {}).value || '';
  const timeVal   = (document.getElementById('pop-time') || {}).value;
  const dur       = +((document.getElementById('pop-dur') || {}).value) || 1;
  const startHour = _timeToFloat(timeVal);
  const blocks    = _lsGet(KEYS.blocks, []);
  const b         = blocks.find(bl => bl.id === _popCtx.blockId);
  if (!b) return;
  if (_checkOverlap(b.day, startHour, dur, _popCtx.blockId)) {
    showToast('⚠️ Overlapt met bestaand blok of werkshift');
    return;
  }
  b.name = name.trim();
  b.startHour = startHour;
  b.durationHours = dur;
  _lsSet(KEYS.blocks, blocks);
  const _editDay = b.day;
  const _editId  = b.id;
  _closePopover();
  _render();
  _checkOverbooking(_editDay, _editId);
}

function _deleteBlock() {
  if (!_popCtx || _popCtx.type !== 'edit') return;
  const blocks = _lsGet(KEYS.blocks, []);
  _lsSet(KEYS.blocks, blocks.filter(b => b.id !== _popCtx.blockId));
  _closePopover();
  _render();
}

function _moveBlock(blockId, day, startHour) {
  const blocks = _lsGet(KEYS.blocks, []);
  const b = blocks.find(bl => bl.id === blockId);
  if (!b) return;
  if (_checkOverlap(day, startHour, b.durationHours, blockId)) {
    // Schedule shake — applied in dragend handler
    _pendingShake = blockId;
    return;
  }
  b.day = day;
  b.startHour = startHour;
  if (b.isGhost) b.isShifted = false; // user chose this slot — clear the shifted badge
  _lsSet(KEYS.blocks, blocks);
  _render();
  _checkOverbooking(day, blockId);
}

// ─── Study block helpers ──────────────────────────────────────────────────────
function _getStudySessionNum(vaknaam) {
  const blocks = _lsGet(KEYS.blocks, []);
  const norm   = vaknaam.trim().toLowerCase();
  const existing = blocks.filter(b =>
    b.category === 'studie' && !b.isGhost &&
    b.vaknaam && b.vaknaam.trim().toLowerCase() === norm
  );
  if (!existing.length) return 1;
  return Math.max(...existing.map(b => b.sessienummer || 1)) + 1;
}

function _getSessionInfo(num) {
  if (num === 1) return { type: 'Sessie 1',  label: 'Sessie 1 · 45 min',  durMin: 45, durHours: 0.75 };
  if (num === 2) return { type: 'Sessie 2',  label: 'Sessie 2 · 30 min',  durMin: 30, durHours: 0.5  };
  if (num === 3) return { type: 'Sessie 3',  label: 'Sessie 3 · 45 min',  durMin: 45, durHours: 0.75 };
  return               { type: 'Herhaling', label: 'Herhaling · 15 min', durMin: 15, durHours: 0.25 };
}

function _showStudyPopover(day, startHour, catId, x, y) {
  const cats = _lsGet(KEYS.categories, null) || DEFAULT_CATS;
  const cat  = cats.find(c => c.id === catId) || { color: '#3b82f6', name: 'Studie' };
  _popCtx = { type: 'study-add', day, startHour, catId };
  _openPopover(`
    <div class="pop-title" style="border-left:3px solid ${cat.color}">Studie toevoegen</div>
    <div class="pop-field">
      <div class="pop-lbl">Vaknaam</div>
      <input id="pop-vak" type="text" placeholder="bijv. Wiskunde" oninput="_updateStudyInfo()">
    </div>
    <div id="pop-study-info" class="pop-study-info">📖 Sessie 1 · 45 min</div>
    <div class="pop-field">
      <div class="pop-lbl">Starttijd</div>
      <input id="pop-time" type="time" value="${_floatToTime(startHour)}">
    </div>
    <div class="pop-actions">
      <button class="pop-ok" onclick="_confirmStudyAdd()">Toevoegen</button>
      <button class="pop-x"  onclick="_closePopover()">Annuleer</button>
    </div>`, x, y);
  setTimeout(() => { const i = document.getElementById('pop-vak'); if (i) i.focus(); }, 40);
}

function _updateStudyInfo() {
  const vak  = ((document.getElementById('pop-vak') || {}).value || '').trim();
  const num  = vak ? _getStudySessionNum(vak) : 1;
  const info = _getSessionInfo(num);
  const el   = document.getElementById('pop-study-info');
  if (el) el.textContent = '📖 ' + info.label;
}

function _confirmStudyAdd() {
  if (!_popCtx || _popCtx.type !== 'study-add') return;
  const vak = ((document.getElementById('pop-vak') || {}).value || '').trim();
  if (!vak) { showToast('Vul een vaknaam in'); return; }
  const timeVal   = (document.getElementById('pop-time') || {}).value;
  const startHour = _timeToFloat(timeVal || _floatToTime(_popCtx.startHour));
  const num       = _getStudySessionNum(vak);
  const info      = _getSessionInfo(num);
  if (_checkOverlap(_popCtx.day, startHour, info.durHours)) {
    showToast('⚠️ Overlapt met bestaand blok of werkshift'); return;
  }
  const blocks = _lsGet(KEYS.blocks, []);
  const newBlock = {
    id: _genId(), day: _popCtx.day, startHour,
    durationHours: info.durHours, category: 'studie',
    name: vak + ' — ' + info.type,
    vaknaam: vak, sessienummer: num, sessionType: info.type,
    isGhost: false, done: false,
  };
  blocks.push(newBlock);
  _lsSet(KEYS.blocks, blocks);
  _placeGhostBlocks(newBlock);
  const saveDay = _popCtx.day;
  const saveId  = newBlock.id;
  _closePopover();
  _render();
  _checkOverbooking(saveDay, saveId);
}

// Returns { day, startHour, shifted } — first free slot at/after preferredHour that day,
// falling back to next day at preferredHour if the entire day is blocked.
function _findAvailableSlot(targetDay, preferredHour, dur) {
  if (!_checkOverlap(targetDay, preferredHour, dur)) {
    return { day: targetDay, startHour: preferredHour, shifted: false };
  }
  // Search same day in 30-min increments from 6:00 to end-of-day
  for (let h = 6; h <= 23 - dur + 0.001; h += 0.5) {
    if (Math.abs(h - preferredHour) < 0.01) continue;
    if (!_checkOverlap(targetDay, h, dur)) {
      return { day: targetDay, startHour: h, shifted: true };
    }
  }
  // No slot on targetDay — use next day at preferred hour
  const nextDay = _toISO(_addDays(new Date(targetDay + 'T12:00:00'), 1));
  return { day: nextDay, startHour: preferredHour, shifted: true };
}

function _placeGhostBlocks(block) {
  if (block.category !== 'studie' || block.isGhost) return;
  const blocks = _lsGet(KEYS.blocks, []);
  const num = block.sessienummer || 1;
  const mkGhost = (dayOff, gNum) => {
    const info = _getSessionInfo(gNum);
    const targetDay = _toISO(_addDays(new Date(block.day + 'T12:00:00'), dayOff));
    const slot = _findAvailableSlot(targetDay, block.startHour, info.durHours);
    blocks.push({
      id: _genId(),
      day: slot.day, startHour: slot.startHour, durationHours: info.durHours,
      category: 'studie', name: block.vaknaam + ' — ' + info.type,
      vaknaam: block.vaknaam, sessienummer: gNum, sessionType: info.type,
      isGhost: true, isShifted: slot.shifted, done: false, parentBlockId: block.id,
    });
    _lsSet(KEYS.blocks, blocks); // write after each ghost so next one sees it in overlap check
  };
  if (num === 1) { mkGhost(1, 2); }
  else if (num === 2) { mkGhost(2, 3); }
  else if (num === 3) { mkGhost(3, 4); mkGhost(7, 4); }
}

// ─── Ghost confirm ────────────────────────────────────────────────────────────
function _openGhostPopover(ghostId, x, y) {
  const blocks = _lsGet(KEYS.blocks, []);
  const b = blocks.find(bl => bl.id === ghostId);
  if (!b) return;
  const cats  = _lsGet(KEYS.categories, null) || DEFAULT_CATS;
  const cat   = cats.find(c => c.id === b.category);
  const color = cat ? cat.color : '#94a3b8';
  _popCtx = { type: 'ghost', ghostId };
  _openPopover(`
    <div class="pop-title" style="border-left:3px solid ${color}">✓ ${_esc(b.name)}</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px;">
      ${_esc(b.day)} · ${_floatToTime(b.startHour)} · ${Math.round(b.durationHours * 60)} min
      ${b.isShifted ? '<br><span style="color:#f97316;font-weight:700">Verschoven — geen vrije tijd op voorkeurstijdstip</span>' : ''}
    </div>
    <div class="pop-actions">
      <button class="pop-ok"  onclick="_confirmGhost()">Bevestig</button>
      <button class="pop-del" onclick="_deleteGhost()">Verwijder</button>
      <button class="pop-x"   onclick="_closePopover()">✕</button>
    </div>`, x, y);
}

function _confirmGhost() {
  if (!_popCtx || _popCtx.type !== 'ghost') return;
  const blocks = _lsGet(KEYS.blocks, []);
  const b = blocks.find(bl => bl.id === _popCtx.ghostId);
  if (!b) return;
  b.isGhost = false; b.isShifted = false; b.done = false;
  _lsSet(KEYS.blocks, blocks);
  _placeGhostBlocks(b);
  const saveDay = b.day;
  const saveId  = b.id;
  _closePopover();
  _render();
  _checkOverbooking(saveDay, saveId);
}

function _deleteGhost() {
  if (!_popCtx || _popCtx.type !== 'ghost') return;
  const blocks = _lsGet(KEYS.blocks, []);
  _lsSet(KEYS.blocks, blocks.filter(b => b.id !== _popCtx.ghostId));
  _closePopover();
  _render();
}

// ─── Overbooking ──────────────────────────────────────────────────────────────
function _isDayFull(iso) {
  const blocks   = _lsGet(KEYS.blocks, []);
  const shifts   = _lsGet(KEYS.workshifts, []);
  const settings = _lsGet(KEYS.settings, {});
  const buffer   = settings.bufferHours != null ? settings.bufferHours : 1;
  const confH    = blocks.filter(b => b.day === iso && !b.isGhost)
                         .reduce((s, b) => s + b.durationHours, 0);
  const sh    = shifts.find(s => s.date === iso);
  const shiftH = sh ? _timeToFloat(sh.endHour) - _timeToFloat(sh.startHour) : 0;
  return (confH + shiftH + buffer) > 16;
}

function _checkOverbooking(day, newBlockId) {
  if (!_isDayFull(day)) return;
  _obNewBlockId = newBlockId || null;
  const blocks = _lsGet(KEYS.blocks, []);
  const cats   = _lsGet(KEYS.categories, null) || DEFAULT_CATS;
  const shifts = _lsGet(KEYS.workshifts, []);
  const d = new Date(day + 'T12:00:00');
  const dayLabel = DN_SHORT[d.getDay()] + ' ' + _fmtDate(d);
  const sh = shifts.find(s => s.date === day);
  let rows = '';
  if (sh) {
    rows += `<div class="ob-block-row">
      <div class="ob-dot" style="background:var(--primary)"></div>
      <div style="flex:1">${_esc(sh.label || 'Werkblok')}
        <span style="color:var(--text-faint)"> ${sh.startHour}–${sh.endHour}</span></div>
    </div>`;
  }
  blocks.filter(b => b.day === day && !b.isGhost).forEach(b => {
    const cat   = cats.find(c => c.id === b.category);
    const color = cat ? cat.color : '#94a3b8';
    rows += `<div class="ob-block-row">
      <div class="ob-dot" style="background:${color}"></div>
      <div style="flex:1">${_esc(b.name)}
        <span style="color:var(--text-faint)"> ${_floatToTime(b.startHour)}–${_floatToTime(b.startHour + b.durationHours)}</span></div>
      <button class="ob-block-del" onclick="_obDelBlock('${b.id}')">✕</button>
    </div>`;
  });
  const modal = document.getElementById('ob-modal');
  if (!modal) return;
  const moveBtn = _obNewBlockId
    ? `<button class="ob-btn ob-btn-move" onclick="_obMoveNewBlock()">Verplaats blok</button>` : '';
  modal.innerHTML = `<div class="ob-box">
    <div class="ob-title">⚠️ ${_esc(dayLabel)} is overbelast</div>
    <div class="ob-sub">Er is meer ingepland dan beschikbare tijd. Verplaats of verwijder een blok.</div>
    <div class="ob-list">${rows}</div>
    <div class="ob-actions">
      ${moveBtn}
      <button class="ob-btn ob-btn-close" onclick="_obClose()">Sluiten</button>
    </div>
  </div>`;
  modal.classList.remove('hidden');
}

function _obDelBlock(blockId) {
  const blocks = _lsGet(KEYS.blocks, []);
  _lsSet(KEYS.blocks, blocks.filter(b => b.id !== blockId));
  _obClose();
  _render();
}

function _obClose() {
  const modal = document.getElementById('ob-modal');
  if (modal) modal.classList.add('hidden');
}

function _obMoveNewBlock() {
  if (!_obNewBlockId) return;
  _obClose();
  const blocks = _lsGet(KEYS.blocks, []);
  const b = blocks.find(bl => bl.id === _obNewBlockId);
  if (!b) return;
  const cats  = _lsGet(KEYS.categories, null) || DEFAULT_CATS;
  const cat   = cats.find(c => c.id === b.category);
  const color = cat ? cat.color : '#94a3b8';
  _popCtx = { type: 'ob-move', blockId: _obNewBlockId };
  _openPopover(`
    <div class="pop-title" style="border-left:3px solid ${color}">Verplaats ${_esc(b.name)}</div>
    <div class="pop-field">
      <div class="pop-lbl">Naar dag</div>
      <input id="pop-ob-day" type="date" value="${b.day}">
    </div>
    <div class="pop-field">
      <div class="pop-lbl">Starttijd</div>
      <input id="pop-ob-time" type="time" value="${_floatToTime(b.startHour)}">
    </div>
    <div class="pop-actions">
      <button class="pop-ok" onclick="_obConfirmMove()">Verplaats</button>
      <button class="pop-x"  onclick="_closePopover()">Annuleer</button>
    </div>`, window.innerWidth / 2, window.innerHeight / 2);
}

function _obConfirmMove() {
  if (!_popCtx || _popCtx.type !== 'ob-move') return;
  const dayVal  = (document.getElementById('pop-ob-day')  || {}).value;
  const timeVal = (document.getElementById('pop-ob-time') || {}).value;
  if (!dayVal) return;
  const blocks   = _lsGet(KEYS.blocks, []);
  const b = blocks.find(bl => bl.id === _popCtx.blockId);
  if (!b) return;
  const newStart = _timeToFloat(timeVal || _floatToTime(b.startHour));
  if (_checkOverlap(dayVal, newStart, b.durationHours, b.id)) {
    showToast('⚠️ Overlapt op die dag — kies een andere tijd'); return;
  }
  b.day = dayVal;
  b.startHour = newStart;
  _lsSet(KEYS.blocks, blocks);
  _closePopover();
  _render();
}

// ─── Day view ─────────────────────────────────────────────────────────────────
function navDay(iso) {
  _selectedDay = iso;
  _screen = 'day';
  _render();
  window.scrollTo({ top: 0 });
}

function _buildDayView() {
  const iso    = _selectedDay;
  const d      = new Date(iso + 'T12:00:00');
  const dayLbl = DN_SHORT[d.getDay()] + ' ' + _fmtDate(d) + ' ' + d.getFullYear();
  const now    = new Date();
  const isToday = _toISO(now) === iso;
  const nowH   = now.getHours() + now.getMinutes() / 60;

  const blocks    = _lsGet(KEYS.blocks, []);
  const cats      = _lsGet(KEYS.categories, null) || DEFAULT_CATS;
  const dayBlocks = blocks.filter(b => b.day === iso).sort((a, b) => a.startHour - b.startHour);
  const realBlocks = dayBlocks.filter(b => !b.isGhost);
  const doneCount  = realBlocks.filter(b => b.done).length;
  const progress   = realBlocks.length ? Math.round(doneCount / realBlocks.length * 100) : 0;

  let items = '';
  dayBlocks.forEach(b => {
    const cat   = cats.find(c => c.id === b.category);
    const color = cat ? cat.color : '#94a3b8';
    const endH  = b.startHour + b.durationHours;
    const isPast    = isToday && nowH > endH;
    const isOverdue = isPast && !b.done && !b.isGhost;
    const durTxt = b.durationHours >= 1
      ? b.durationHours + 'u'
      : Math.round(b.durationHours * 60) + ' min';

    if (b.isGhost) {
      items += `<div class="dv-block dv-ghost">
        <div class="dv-dot" style="background:${color}"></div>
        <div class="dv-block-info">
          <div class="dv-block-time">${_floatToTime(b.startHour)} – ${_floatToTime(endH)}</div>
          <div class="dv-block-name">❓ ${_esc(b.name)}</div>
          <div class="dv-ghost-banner">Automatisch ingepland — bevestig of verplaats</div>
        </div>
        <button class="dv-confirm-btn" onclick="_openGhostPopover('${b.id}', window.innerWidth/2, window.innerHeight/2)">Bevestig</button>
      </div>`;
    } else {
      items += `<div class="dv-block${b.done ? ' dv-done' : ''}${isOverdue ? ' dv-overdue' : ''}">
        <div class="dv-dot" style="background:${color}"></div>
        <div class="dv-block-info">
          <div class="dv-block-time">${_floatToTime(b.startHour)} – ${_floatToTime(endH)}</div>
          <div class="dv-block-name">${_esc(b.name)}</div>
          <div class="dv-block-dur">${_esc(durTxt)}</div>
          ${isOverdue ? `<div class="dv-overdue-banner">
            ⏰ ${_esc(b.name)} niet afgewerkt — wat wil je doen?
            <div class="dv-overdue-actions">
              <button onclick="_dvMoveLater('${b.id}')">Later vandaag</button>
              <button onclick="_dvMoveMorrow('${b.id}')">Morgen</button>
            </div>
          </div>` : ''}
        </div>
        <label class="dv-checkbox">
          <input type="checkbox" ${b.done ? 'checked' : ''}
            onchange="_dvToggleDone('${b.id}', this.checked)">
        </label>
      </div>`;
    }
  });

  if (!items) items = '<div class="dv-empty">Geen blokken voor deze dag</div>';

  return `
    <div class="screen-header">
      <button class="back-btn" onclick="nav('calendar')">‹ Week</button>
      <div class="dv-header-title">${_esc(dayLbl)}</div>
      <div></div>
    </div>
    <div class="dv-progress-wrap">
      <div class="dv-progress-label">${doneCount} van ${realBlocks.length} blokken afgewerkt</div>
      <div class="dv-progress-bar"><div class="dv-progress-fill" style="width:${progress}%"></div></div>
    </div>
    <div class="dv-list">${items}</div>`;
}

function _dvToggleDone(blockId, checked) {
  const blocks = _lsGet(KEYS.blocks, []);
  const b = blocks.find(bl => bl.id === blockId);
  if (b) { b.done = checked; _lsSet(KEYS.blocks, blocks); }
  // Update progress bar without full re-render
  const realBlocks = blocks.filter(bk => bk.day === _selectedDay && !bk.isGhost);
  const done = realBlocks.filter(bk => bk.done).length;
  const pct  = realBlocks.length ? Math.round(done / realBlocks.length * 100) : 0;
  const lbl  = document.querySelector('.dv-progress-label');
  const fill = document.querySelector('.dv-progress-fill');
  if (lbl)  lbl.textContent = done + ' van ' + realBlocks.length + ' blokken afgewerkt';
  if (fill) fill.style.width = pct + '%';
  // Toggle done class on row
  const rows = document.querySelectorAll('.dv-block');
  rows.forEach(row => {
    const cb = row.querySelector('input[type="checkbox"]');
    if (cb && (cb.getAttribute('onchange') || '').includes(blockId)) {
      checked ? row.classList.add('dv-done') : row.classList.remove('dv-done');
    }
  });
}

function _dvMoveLater(blockId) {
  const blocks  = _lsGet(KEYS.blocks, []);
  const b = blocks.find(bl => bl.id === blockId);
  if (!b) return;
  const cats  = _lsGet(KEYS.categories, null) || DEFAULT_CATS;
  const cat   = cats.find(c => c.id === b.category);
  const color = cat ? cat.color : '#94a3b8';
  const suggest = Math.min(b.startHour + b.durationHours + 0.5, 22);
  _popCtx = { type: 'move-later', blockId, day: b.day };
  _openPopover(`
    <div class="pop-title" style="border-left:3px solid ${color}">Later vandaag verplaatsen</div>
    <div class="pop-field">
      <div class="pop-lbl">Nieuwe starttijd</div>
      <input id="pop-new-time" type="time" value="${_floatToTime(suggest)}">
    </div>
    <div class="pop-actions">
      <button class="pop-ok" onclick="_dvConfirmMoveLater()">Verplaats</button>
      <button class="pop-x"  onclick="_closePopover()">Annuleer</button>
    </div>`, window.innerWidth / 2, window.innerHeight / 2);
}

function _dvConfirmMoveLater() {
  if (!_popCtx || _popCtx.type !== 'move-later') return;
  const timeVal = (document.getElementById('pop-new-time') || {}).value;
  if (!timeVal) return;
  const newStart = _timeToFloat(timeVal);
  const blocks   = _lsGet(KEYS.blocks, []);
  const b = blocks.find(bl => bl.id === _popCtx.blockId);
  if (!b) return;
  if (_checkOverlap(b.day, newStart, b.durationHours, b.id)) {
    showToast('⚠️ Overlapt met bestaand blok of shift'); return;
  }
  b.startHour = newStart;
  _lsSet(KEYS.blocks, blocks);
  _closePopover();
  _render();
}

function _dvMoveMorrow(blockId) {
  const blocks  = _lsGet(KEYS.blocks, []);
  const b = blocks.find(bl => bl.id === blockId);
  if (!b) return;
  const morrow = _toISO(_addDays(new Date(b.day + 'T12:00:00'), 1));
  b.day = morrow;
  _lsSet(KEYS.blocks, blocks);
  showToast('Verplaatst naar morgen');
  _render();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
function _init() {
  // Ensure base data model exists
  if (!_lsGet(KEYS.settings, null)) {
    _lsSet(KEYS.settings, { bufferHours: 1, planningHorizonWeeks: 2 });
  }
  if (!_lsGet(KEYS.blocks, null)) {
    _lsSet(KEYS.blocks, []);
  }
  if (!_lsGet(KEYS.weeks, null)) {
    _lsSet(KEYS.weeks, []);
  }
  _render();
}

_init();
</script>
<div id="ob-modal" class="hidden"></div>
<div id="ai-loading" class="hidden">
  <div class="ai-spinner"></div>
  <div class="ai-loading-text">AI is je planning aan het maken...</div>
  <div class="ai-loading-sub">Dit duurt even — even geduld</div>
</div>
<div id="ai-overlay" class="hidden"></div>
<div id="cal-resize-tip"></div>
</body>
