<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Analyse Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    textarea { resize: vertical; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.18s ease-out; }
    * { box-sizing: border-box; }
    .subtab-bar::-webkit-scrollbar { display: none; }
    .subtab-bar { -ms-overflow-style: none; scrollbar-width: none; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ─── Data structure ───────────────────────────────────────────────────────
    const emptyFormat = () => ({ percentage: '', uitleg: '', voorbeelden: '' });
    const emptyCompetitor = () => ({ naam: '', positionering: '', branding: '', content: '', community: '', engagement: '', differentiatie: '', watDoenZijNiet: '' });

    const emptyData = () => ({
      interneAnalyse: {
        organisatie: { labelType: '', geschiedenis: '', team: '', rollenManagement: '', werking: '' },
        merkidentiteit: { visuelIdentiteit: '', toneOfVoice: '', consistentieBranding: '', waardenMissie: '', huidigePositionering: '' },
        kanaalstrategie: { actievePlatformen: '', onderbouwingPerPlatform: '', primairKanaal: '', ontbrekendeKanalen: '' },
        doelgroep: { wieVolgt: '', leeftijdInteresses: '', gedrag: '', engagement: '', communityInteractie: '', gewensteDoelgroep: '', werkelijkeDoelgroep: '' },
        contentanalyse: {
          contentmixTotaal: 20,
          contentmixPromo: 0, contentmixBehindScenes: 0, contentmixCommunity: 0, contentmixStorytelling: 0, contentmixEvents: 0, contentmixMemes: 0,
          formatsFoto: emptyFormat(), formatsVideo: emptyFormat(), formatsReels: emptyFormat(), formatsCarousels: emptyFormat(),
          frequentie: '',
          gemiddeldeLikes: '', gemiddeldeComments: '', gemiddeldeShares: '', gemiddeldeEngagementRate: '',
        },
        strategischeContent: { positioneringsconsistentie: '', toneOfVoice: '', storytelling: '', emotie: '', doelgroepresonantie: '', formatstrategie: '' },
        communityAnalyse: { interactieComments: '', terugkerendeFans: '', userGeneratedContent: '', dmInteracties: '', communityBetrokkenheid: '', publiefOfCommunity: '' },
        middelen: { budget: '', tijd: '', team: '', netwerk: '', skills: '' },
        swot: { strengths: '', weaknesses: '', opportunities: '', threats: '' },
      },
      externeAnalyse: {
        concurrentieanalyse: [emptyCompetitor()],
        marktSceneAnalyse: { grootteScene: '', populariteitGenre: '', aantalEvents: '', andereLabels: '', marktverzadiging: '' },
        doelgroepgedrag: { ontdekkingMuziek: '', platformgebruik: '', motivatie: '', invloeden: '' },
        cultureleTrends: { genrePopulariteit: '', nostalgieTrends: '', diyCultuur: '', authenticiteitVsCommercialisering: '' },
        samenwerkingen: { potentielePartners: '', gatekeepers: '', bestaandeSamenwerkingen: '', ontbrekendeSamenwerkingen: '' },
      },
    });

    // Migrate old saved data to new structure
    function migrateAnalysis(raw) {
      const base = emptyData();
      const int = raw.interneAnalyse || {};
      const ext = raw.externeAnalyse || {};

      // Migrate formats: string → object
      const migrateFormat = (v) => (v && typeof v === 'object') ? v : emptyFormat();
      const ca = int.contentanalyse || {};
      const toInt = (v) => { const n = parseInt(v, 10); return isNaN(n) ? 0 : n; };
      const migratedCa = {
        ...base.interneAnalyse.contentanalyse,
        ...ca,
        contentmixTotaal: ca.contentmixTotaal || 20,
        contentmixPromo: toInt(ca.contentmixPromo),
        contentmixBehindScenes: toInt(ca.contentmixBehindScenes),
        contentmixCommunity: toInt(ca.contentmixCommunity),
        contentmixStorytelling: toInt(ca.contentmixStorytelling),
        contentmixEvents: toInt(ca.contentmixEvents),
        contentmixMemes: toInt(ca.contentmixMemes),
        formatsFoto: migrateFormat(ca.formatsFoto),
        formatsVideo: migrateFormat(ca.formatsVideo),
        formatsReels: migrateFormat(ca.formatsReels),
        formatsCarousels: migrateFormat(ca.formatsCarousels),
        // Migrate renamed performance fields
        gemiddeldeLikes: ca.gemiddeldeLikes || ca.performanceLikes || '',
        gemiddeldeComments: ca.gemiddeldeComments || ca.performanceComments || '',
        gemiddeldeShares: ca.gemiddeldeShares || ca.performanceShares || '',
        gemiddeldeEngagementRate: ca.gemiddeldeEngagementRate || ca.performanceEngagementRate || '',
      };

      // Migrate concurrentieanalyse: flat object → array
      let concurrentieanalyse;
      if (Array.isArray(ext.concurrentieanalyse)) {
        concurrentieanalyse = ext.concurrentieanalyse.map(c => ({ ...emptyCompetitor(), ...c }));
      } else if (ext.concurrentieanalyse && typeof ext.concurrentieanalyse === 'object') {
        concurrentieanalyse = [{ ...emptyCompetitor(), ...ext.concurrentieanalyse }];
      } else {
        concurrentieanalyse = [emptyCompetitor()];
      }

      return {
        interneAnalyse: {
          ...base.interneAnalyse,
          ...int,
          kanaalstrategie: { ...base.interneAnalyse.kanaalstrategie, ...(int.kanaalstrategie || {}) },
          contentanalyse: migratedCa,
        },
        externeAnalyse: {
          ...base.externeAnalyse,
          ...ext,
          concurrentieanalyse,
          samenwerkingen: { ...base.externeAnalyse.samenwerkingen, ...(ext.samenwerkingen || {}) },
        },
      };
    }

    function deepMerge(target, source) {
      if (!source || typeof source !== 'object') return target;
      const result = { ...target };
      for (const key in source) {
        if (source[key] !== null && typeof source[key] === 'object' && !Array.isArray(source[key]) && typeof target[key] === 'object') {
          result[key] = deepMerge(target[key], source[key]);
        } else if (source[key] !== undefined) {
          result[key] = source[key];
        }
      }
      return result;
    }

    function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    // ─── Score helpers ────────────────────────────────────────────────────────
    function parseEngagementRate(str) {
      if (!str || !String(str).trim()) return null;
      const m = String(str).match(/[\d,.]+/);
      return m ? parseFloat(m[0].replace(',', '.')) : null;
    }

    function engagementRateColor(rate) {
      if (rate === null) return { bg: 'bg-gray-50', text: 'text-gray-500', border: 'border-gray-200', label: null, color: '#9ca3af' };
      if (rate < 2)  return { bg: 'bg-red-50',     text: 'text-red-600',     border: 'border-red-200',     label: 'Laag',      color: '#ef4444' };
      if (rate <= 5) return { bg: 'bg-amber-50',   text: 'text-amber-600',   border: 'border-amber-200',   label: 'Gemiddeld', color: '#f59e0b' };
      return               { bg: 'bg-emerald-50', text: 'text-emerald-600', border: 'border-emerald-200', label: 'Goed',      color: '#10b981' };
    }

    function computeCommunityScore(data) {
      const scoreField = (v) => {
        if (!v || !String(v).trim()) return 0;
        const len = String(v).trim().length;
        if (len < 20) return 0.5;
        if (len < 80) return 1;
        return 1.5;
      };
      const raw =
        scoreField(data.interactieComments) +
        scoreField(data.terugkerendeFans) +
        scoreField(data.userGeneratedContent) +
        scoreField(data.communityBetrokkenheid);
      return Math.min(100, Math.round((raw / 6) * 100));
    }

    function communityScoreColor(pct) {
      if (pct < 40)  return { color: '#ef4444', text: 'text-red-600',     bg: 'bg-red-50',     border: 'border-red-200',     label: 'Laag' };
      if (pct <= 70) return { color: '#f59e0b', text: 'text-amber-600',   bg: 'bg-amber-50',   border: 'border-amber-200',   label: 'Groeiend' };
      return               { color: '#10b981', text: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-200', label: 'Sterk' };
    }

    function exportAnalysis(analysis) {
      const json = JSON.stringify(analysis, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `analyse-${(analysis.klantnaam || 'export').replace(/\s+/g, '-')}-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ─── PDF export ───────────────────────────────────────────────────────────
    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function pdfField(label, value) {
      const v = String(value || '').trim();
      if (!v) return `<div class="f"><div class="fl">${escHtml(label)}</div><span class="em">—</span></div>`;
      return `<div class="f"><div class="fl">${escHtml(label)}</div><div class="fv">${escHtml(v).replace(/\n/g,'<br>')}</div></div>`;
    }
    function exportPDF(analysis) {
      const { interneAnalyse: int, externeAnalyse: ext, klantnaam, datum } = analysis;
      const ca = int.contentanalyse;
      const competitors = Array.isArray(ext.concurrentieanalyse) ? ext.concurrentieanalyse : [ext.concurrentieanalyse || {}];
      const compLabels = ['Positionering','Branding','Content','Community','Engagement','Differentiatie','Wat doen zij NIET?'];
      const compKeys   = ['positionering','branding','content','community','engagement','differentiatie','watDoenZijNiet'];
      const compTable = `<table><thead><tr><th></th>${competitors.map((c,i)=>`<th>${escHtml(c.naam||`Concurrent ${i+1}`)}</th>`).join('')}</tr></thead><tbody>${compKeys.map((k,ri)=>`<tr><td><strong>${compLabels[ri]}</strong></td>${competitors.map(c=>`<td>${escHtml(c[k]||'—')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
      const dateStr = new Date(datum).toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});
      const html = `<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><title>${escHtml(klantnaam||'Analyse')}</title><style>
*{box-sizing:border-box;margin:0;padding:0}@page{margin:2cm;size:A4}body{font-family:-apple-system,Arial,sans-serif;font-size:11px;color:#1f2937;line-height:1.5}
.hdr{margin-bottom:24px;padding-bottom:14px;border-bottom:3px solid #1f2937}.hdr h1{font-size:24px;font-weight:800;margin-bottom:3px}.hdr .meta{color:#6b7280;font-size:11px}
h2{font-size:13px;font-weight:700;margin:20px 0 8px;padding:5px 10px;background:#f9fafb;border-left:3px solid #374151}
.f{margin-bottom:9px;page-break-inside:avoid}.fl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#9ca3af;margin-bottom:2px}.fv{font-size:11px}.em{color:#d1d5db;font-style:italic;font-size:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0}.sc{border:1px solid #e5e7eb;border-radius:6px;padding:10px}.sc-s{background:#f0fdf4}.sc-w{background:#fef2f2}.sc-o{background:#eff6ff}.sc-t{background:#fffbeb}
.sl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}.sc-s .sl{color:#059669}.sc-w .sl{color:#dc2626}.sc-o .sl{color:#2563eb}.sc-t .sl{color:#d97706}
table{width:100%;border-collapse:collapse;font-size:10px;margin:6px 0}td,th{border:1px solid #e5e7eb;padding:5px 8px;text-align:left;vertical-align:top}th{background:#f9fafb;font-weight:600}
.pb{page-break-before:always}
</style></head><body>
<div class="hdr"><h1>${escHtml(klantnaam||'Naamloos')}</h1><div class="meta">Marketing Analyse · ${dateStr}</div></div>
<h2>A — Organisatie / structuur</h2>${pdfField('Type label / bedrijf',int.organisatie.labelType)}${pdfField('Geschiedenis',int.organisatie.geschiedenis)}${pdfField('Team / leden',int.organisatie.team)}${pdfField('Rollen en managementstructuur',int.organisatie.rollenManagement)}${pdfField('Werking',int.organisatie.werking)}
<h2>B — Merkidentiteit</h2>${pdfField('Visuele identiteit',int.merkidentiteit.visuelIdentiteit)}${pdfField('Tone of voice',int.merkidentiteit.toneOfVoice)}${pdfField('Consistentie van branding',int.merkidentiteit.consistentieBranding)}${pdfField('Waarden en missie',int.merkidentiteit.waardenMissie)}${pdfField('Huidige positionering',int.merkidentiteit.huidigePositionering)}
<h2>C — Kanaalstrategie</h2>${pdfField('Actieve platformen',int.kanaalstrategie.actievePlatformen)}${pdfField('Onderbouwing per platform',int.kanaalstrategie.onderbouwingPerPlatform)}${pdfField('Primair kanaal',int.kanaalstrategie.primairKanaal)}${pdfField('Ontbrekende kanalen',int.kanaalstrategie.ontbrekendeKanalen)}
<h2>D — Doelgroep</h2>${pdfField('Wie volgt het merk nu?',int.doelgroep.wieVolgt)}${pdfField('Leeftijd / interesses',int.doelgroep.leeftijdInteresses)}${pdfField('Gedrag',int.doelgroep.gedrag)}${pdfField('Engagement',int.doelgroep.engagement)}${pdfField('Community interactie',int.doelgroep.communityInteractie)}${pdfField('Gewenste doelgroep',int.doelgroep.gewensteDoelgroep)}${pdfField('Werkelijke doelgroep',int.doelgroep.werkelijkeDoelgroep)}
<h2>E — Contentanalyse</h2>${pdfField('Frequentie',ca.frequentie)}${pdfField('Gem. likes',ca.gemiddeldeLikes)}${pdfField('Gem. comments',ca.gemiddeldeComments)}${pdfField('Gem. shares',ca.gemiddeldeShares)}${pdfField('Engagement rate',ca.gemiddeldeEngagementRate)}${pdfField('Formats — Foto',ca.formatsFoto?.uitleg)}${pdfField('Formats — Video',ca.formatsVideo?.uitleg)}${pdfField('Formats — Reels',ca.formatsReels?.uitleg)}${pdfField('Formats — Carousels',ca.formatsCarousels?.uitleg)}
<h2>G — Strategische contentanalyse</h2>${pdfField('Positioneringsconsistentie',int.strategischeContent.positioneringsconsistentie)}${pdfField('Tone of voice',int.strategischeContent.toneOfVoice)}${pdfField('Storytelling',int.strategischeContent.storytelling)}${pdfField('Emotie',int.strategischeContent.emotie)}${pdfField('Doelgroepresonantie',int.strategischeContent.doelgroepresonantie)}${pdfField('Formatstrategie',int.strategischeContent.formatstrategie)}
<h2>H — Community analyse</h2>${pdfField('Interactie in comments',int.communityAnalyse.interactieComments)}${pdfField('Terugkerende fans',int.communityAnalyse.terugkerendeFans)}${pdfField('User generated content',int.communityAnalyse.userGeneratedContent)}${pdfField('DM interacties',int.communityAnalyse.dmInteracties)}${pdfField('Community betrokkenheid',int.communityAnalyse.communityBetrokkenheid)}${pdfField('Publiek of echte community?',int.communityAnalyse.publiefOfCommunity)}
<h2>I — Middelen</h2>${pdfField('Budget',int.middelen.budget)}${pdfField('Tijd',int.middelen.tijd)}${pdfField('Team',int.middelen.team)}${pdfField('Netwerk',int.middelen.netwerk)}${pdfField('Skills',int.middelen.skills)}
<h2>J — SWOT</h2><div class="grid2"><div class="sc sc-s"><div class="sl">Strengths</div>${escHtml(int.swot.strengths||'—').replace(/\n/g,'<br>')}</div><div class="sc sc-w"><div class="sl">Weaknesses</div>${escHtml(int.swot.weaknesses||'—').replace(/\n/g,'<br>')}</div><div class="sc sc-o"><div class="sl">Opportunities</div>${escHtml(int.swot.opportunities||'—').replace(/\n/g,'<br>')}</div><div class="sc sc-t"><div class="sl">Threats</div>${escHtml(int.swot.threats||'—').replace(/\n/g,'<br>')}</div></div>
<div class="pb"></div>
<h2>A — Concurrentieanalyse</h2>${compTable}
<h2>B — Samenwerkingen en netwerk</h2>${pdfField('Potentiële partners',ext.samenwerkingen.potentielePartners)}${pdfField('Gatekeepers in de scene',ext.samenwerkingen.gatekeepers)}${pdfField('Bestaande samenwerkingen',ext.samenwerkingen.bestaandeSamenwerkingen)}${pdfField('Ontbrekende samenwerkingen',ext.samenwerkingen.ontbrekendeSamenwerkingen)}
<h2>C — Markt / scene analyse</h2>${pdfField('Grootte van de scene',ext.marktSceneAnalyse.grootteScene)}${pdfField('Populariteit van het genre',ext.marktSceneAnalyse.populariteitGenre)}${pdfField('Aantal events',ext.marktSceneAnalyse.aantalEvents)}${pdfField('Andere labels / collectieven',ext.marktSceneAnalyse.andereLabels)}${pdfField('Marktverzadiging',ext.marktSceneAnalyse.marktverzadiging)}
<h2>D — Doelgroepgedrag</h2>${pdfField('Hoe ontdekken ze muziek?',ext.doelgroepgedrag.ontdekkingMuziek)}${pdfField('Welke platformen gebruiken ze?',ext.doelgroepgedrag.platformgebruik)}${pdfField('Wat motiveert hen?',ext.doelgroepgedrag.motivatie)}${pdfField('Wie beïnvloedt hen?',ext.doelgroepgedrag.invloeden)}
<h2>E — Culturele trends</h2>${pdfField('Stijgende populariteit van een genre',ext.cultureleTrends.genrePopulariteit)}${pdfField('Nostalgie trends',ext.cultureleTrends.nostalgieTrends)}${pdfField('DIY cultuur',ext.cultureleTrends.diyCultuur)}${pdfField('Authenticiteit vs commercialisering',ext.cultureleTrends.authenticiteitVsCommercialisering)}
</body></html>`;
      const win = window.open('','_blank');
      if (!win) { alert('Pop-up geblokkeerd. Sta pop-ups toe voor deze pagina om PDF te exporteren.'); return; }
      win.document.write(html);
      win.document.close();
      setTimeout(() => { win.focus(); win.print(); }, 400);
    }

    // ─── Insights detection ───────────────────────────────────────────────────
    function detectInsights(analysis) {
      const insights = [];
      const { interneAnalyse: int, externeAnalyse: ext } = analysis;

      // 1 — Doelgroep platforms vs kanaalstrategie
      const doelgroepPlatforms = ((ext.doelgroepgedrag?.platformgebruik || '') + ' ' + (int.doelgroep?.gedrag || '')).toLowerCase();
      const actieveKanalen = (int.kanaalstrategie?.actievePlatformen || '').toLowerCase();
      const platforms = ['tiktok','instagram','youtube','twitter','linkedin','facebook','snapchat','spotify','soundcloud','discord','twitch','pinterest','reddit','threads'];
      for (const p of platforms) {
        if (doelgroepPlatforms.includes(p) && !actieveKanalen.includes(p)) {
          insights.push({ id: 'kanaal-mismatch', type: 'tension', icon: '📱', title: 'Kanaal mismatch', text: `Mismatch gedetecteerd: ${p.charAt(0).toUpperCase()+p.slice(1)} wordt gebruikt door je doelgroep maar ontbreekt in je kanaalstrategie.`, pages: ['doelgroep','kanaalstrategie'] });
          break;
        }
      }

      // 2 — Promo > 50% AND weak emotion/resonance
      const keys = ['contentmixPromo','contentmixBehindScenes','contentmixCommunity','contentmixStorytelling','contentmixEvents','contentmixMemes'];
      const cnts = keys.map(k => Number(int.contentanalyse[k]) || 0);
      const tot = cnts.reduce((a,b) => a+b, 0);
      const promoPct = tot > 0 ? (cnts[0] / tot) * 100 : 0;
      const emotieText = ((int.strategischeContent?.emotie || '') + ' ' + (int.strategischeContent?.doelgroepresonantie || '')).toLowerCase();
      const weakWords = ['zwak','laag','beperkt','geen','matig','weinig'];
      const emotieWeak = weakWords.some(w => new RegExp(`\\b${w}`).test(emotieText));
      if (promoPct > 50 && emotieWeak) {
        insights.push({ id: 'promo-emotie', type: 'tension', icon: '📢', title: 'Hoge promofocus', text: 'Hoge promofocus gecombineerd met lage emotionele resonantie — overweeg meer verbindende contentcategorieën.', pages: ['contentanalyse','strategisch'] });
      }

      // 3 — Community score < 50% AND distant tone of voice
      const commScore = computeCommunityScore(int.communityAnalyse);
      const tov = ((int.merkidentiteit?.toneOfVoice || '') + ' ' + (int.strategischeContent?.toneOfVoice || '')).toLowerCase();
      const distantWords = ['afstandelijk','minimalistisch','formeel'];
      const isDistant = distantWords.some(w => tov.includes(w));
      if (commScore < 50 && isDistant) {
        insights.push({ id: 'tone-community', type: 'tension', icon: '🗣️', title: 'Tone of voice vs. community', text: 'Afstandelijke tone of voice correleert met lage community score — overweeg een warmere communicatiestijl.', pages: ['community','merkidentiteit'] });
      }

      // 4 — Beperkt budget AND internationale ambitie
      const budget = (int.middelen?.budget || '').toLowerCase();
      const gwDoelgroep = (int.doelgroep?.gewensteDoelgroep || '').toLowerCase();
      const budgetBeperkt = budget.includes('beperkt') || (() => { const m = budget.match(/€\s*([\d.,]+)/); if (!m) return false; return parseFloat(m[1].replace('.','').replace(',','.')) < 1000; })();
      const isInternationaal = gwDoelgroep.includes('internationaal') || gwDoelgroep.includes('europees');
      if (budgetBeperkt && isInternationaal) {
        insights.push({ id: 'budget-ambitie', type: 'tension', icon: '💰', title: 'Budget vs. internationale ambitie', text: 'Spanningsveld gedetecteerd: internationale ambitie met beperkt budget vereist een gefaseerde aanpak.', pages: ['middelen','doelgroep'] });
      }

      return insights;
    }

    // ─── Form UI primitives ───────────────────────────────────────────────────
    function Field({ label, hint, value, onChange, rows = 3 }) {
      return (
        <div className="mb-4">
          <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
          {hint && <p className="text-xs text-gray-400 mb-1 italic">{hint}</p>}
          <textarea
            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
            rows={rows} value={value} onChange={e => onChange(e.target.value)}
          />
        </div>
      );
    }

    function SubSection({ letter, title, subtitle, children }) {
      return (
        <div className="mb-8">
          <div className="flex items-baseline gap-2 mb-1">
            <span className="text-xs font-bold text-gray-300 uppercase tracking-widest w-4 shrink-0">{letter}</span>
            <h3 className="text-base font-semibold text-gray-900">{title}</h3>
          </div>
          {subtitle && <p className="text-xs text-gray-400 mb-4 pl-6">{subtitle}</p>}
          <div className="pl-6">{children}</div>
          <div className="border-b border-gray-100 mt-6" />
        </div>
      );
    }

    function GroupLabel({ label }) {
      return <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mt-5 mb-2 pb-1 border-b border-gray-100">{label}</p>;
    }

    // ─── Dashboard UI primitives ──────────────────────────────────────────────
    function DataRow({ label, value }) {
      const empty = !value || !String(value).trim();
      return (
        <div className="py-3 border-b border-gray-50 last:border-0">
          <p className="text-xs text-gray-400 mb-0.5">{label}</p>
          {empty
            ? <p className="text-sm text-gray-300 italic">—</p>
            : <p className="text-sm text-gray-800 whitespace-pre-wrap leading-relaxed">{value}</p>
          }

    // Performance metric cards — big numbers, no misleading bars
    function PerformancePanel({ data }) {

    // ─── Donut chart (SVG, no library) ────────────────────────────────────────
    const CONTENTMIX_COLORS = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#f43f5e','#06b6d4'];
    const CONTENTMIX_LABELS = ['Promo','Behind the scenes','Community','Storytelling','Events','Memes / cultuur'];

    function DonutChart({ data }) {
      const keys = ['contentmixPromo','contentmixBehindScenes','contentmixCommunity','contentmixStorytelling','contentmixEvents','contentmixMemes'];
      const counts = keys.map(k => Math.max(0, Number(data[k]) || 0));
      const total = counts.reduce((a, b) => a + b, 0);

      const R = 52, cx = 70, cy = 70;
      const C = 2 * Math.PI * R;

      if (total === 0) {
        return (
          <div className="flex flex-col items-center gap-4">
            <svg width="140" height="140" viewBox="0 0 140 140">
              <circle cx={cx} cy={cy} r={R} fill="none" stroke="#f3f4f6" strokeWidth="20" />
              <text x={cx} y={cy + 5} textAnchor="middle" fill="#d1d5db" fontSize="11">Geen data</text>
            </svg>
            <p className="text-xs text-gray-300 italic">Vul aantallen in bij de contentmix</p>
          </div>
        );
      }

      let cumFrac = 0;
      const arcs = counts.map((count, i) => {
        const frac = count / total;
        const dashLen = frac * C;
        const gap = C - dashLen;
        const offset = C * 0.25 - cumFrac * C; // rotate to start at top
        cumFrac += frac;
        return { frac, dashLen, gap, offset, color: CONTENTMIX_COLORS[i], label: CONTENTMIX_LABELS[i], count };
      });

      return (
        <div className="flex flex-col items-center gap-5">
          <div className="relative">
            <svg width="140" height="140" viewBox="0 0 140 140">
              <circle cx={cx} cy={cy} r={R} fill="none" stroke="#f3f4f6" strokeWidth="20" />
              {arcs.map((arc, i) => arc.count > 0 && (
                <circle key={i}
                  cx={cx} cy={cy} r={R}
                  fill="none"
                  stroke={arc.color}
                  strokeWidth="20"
                  strokeDasharray={`${arc.dashLen} ${arc.gap}`}
                  strokeDashoffset={arc.offset}
                  strokeLinecap="butt"
                />
              ))}
              <text x={cx} y={cy - 6} textAnchor="middle" fill="#111827" fontSize="18" fontWeight="700">{total}</text>
              <text x={cx} y={cy + 10} textAnchor="middle" fill="#9ca3af" fontSize="10">posts</text>
            </svg>
          </div>
          <div className="w-full space-y-2">
            {arcs.map((arc, i) => {
              if (!arc.count) return null;
              const warn = arc.frac > 0.6;
              return (
                <div key={i} className={`flex items-center gap-2 rounded-lg ${warn ? 'bg-amber-50 px-2 py-1 -mx-2' : ''}`}>
                  <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: warn ? '#f59e0b' : arc.color }} />
                  <span className={`text-xs flex-1 truncate ${warn ? 'text-amber-700 font-medium' : 'text-gray-600'}`}>{arc.label}</span>
                  <span className={`text-xs font-semibold ${warn ? 'text-amber-700' : 'text-gray-800'}`}>{arc.count}</span>
                  <span className={`text-xs w-9 text-right ${warn ? 'text-amber-600 font-bold' : 'text-gray-400'}`}>{Math.round(arc.frac * 100)}%</span>
                  {warn && <span className="text-xs text-amber-500" title="Te weinig variatie">⚠</span>}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── Format bar card (dashboard) ──────────────────────────────────────────
    function FormatBarCard({ label, value, color }) {
      const v = (value && typeof value === 'object') ? value : emptyFormat();
      const pctStr = v.percentage || '';
      const pctNum = Math.min(100, Math.max(0, parseFloat(pctStr.replace('%','').replace(',','.')) || 0));

      return (
        <div className="py-3 border-b border-gray-50 last:border-0">
          <div className="flex items-center justify-between mb-1.5">
            <span className="text-xs font-semibold text-gray-700">{label}</span>
            <span className="text-xs font-bold text-gray-800">{pctNum > 0 ? `${pctNum}%` : '—'}</span>
          </div>
          <div className="h-2 bg-gray-100 rounded-full overflow-hidden mb-2">
            <div className="h-full rounded-full transition-all duration-500" style={{ width: `${pctNum}%`, backgroundColor: color }} />
          </div>
          {v.uitleg && <p className="text-xs text-gray-500 leading-relaxed mb-1">{v.uitleg}</p>}
          {v.voorbeelden && <p className="text-xs text-gray-400 italic leading-relaxed">{v.voorbeelden}</p>}

    function OrgChart({ team, rollen, werking }) {

    // ─── Badge detection & icon cards ────────────────────────────────────────
    function detectBadge(text) {
      if (!text || !String(text).trim()) return null;
      const t = String(text).toLowerCase();
      const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
      const greenWords  = ['sterk', 'consistent', 'goed', 'hoog'];
      const orangeWords = ['matig', 'gemengd', 'beperkt'];
      const redWords    = ['zwak', 'inconsistent', 'laag', 'geen'];
      for (const w of greenWords)  if (new RegExp(`\\b${w}`).test(t)) return { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200', label: cap(w) };
      for (const w of orangeWords) if (new RegExp(`\\b${w}`).test(t)) return { bg: 'bg-amber-50',   text: 'text-amber-700',   border: 'border-amber-200',   label: cap(w) };
      for (const w of redWords)    if (new RegExp(`\\b${w}`).test(t)) return { bg: 'bg-red-50',     text: 'text-red-600',     border: 'border-red-200',     label: cap(w) };
      return null;
    }

    function BadgePill({ bg, text, border, label }) {

          {label}

    function CommunityMeter({ data }) {
      // Score op basis van 4 velden: elk gevuld = +1, langere tekst = hoger
      const scoreField = (v) => {
        if (!v || !String(v).trim()) return 0;
        const len = String(v).trim().length;
        if (len < 20) return 0.5;
        if (len < 80) return 1;
        return 1.5;
      };
      const rawScore =
        scoreField(data.interactieComments) +

        scoreField(data.userGeneratedContent) +

      return (

// ─── Samenvatting page ────────────────────────────────────────────────────
    function PageSamenvatting({ analysis, allInsights = [] }) {
      const { interneAnalyse: int, externeAnalyse: ext } = analysis;
      const ca = int.contentanalyse;
      const comm = int.communityAnalyse;
      const swot = int.swot;

      // Community score
      const communityPct = computeCommunityScore(comm);
      const commC = communityScoreColor(communityPct);
      const commLabel = communityPct < 25 ? 'Publiek' : communityPct < 50 ? 'Emerging community' : communityPct < 75 ? 'Actieve community' : 'Echte community';

      // Engagement rate
      const erStr = ca.gemiddeldeEngagementRate;
      const erNum = parseEngagementRate(erStr);
      const erC = engagementRateColor(erNum);

      // Contentmix dominant
      const mixKeys = ['contentmixPromo','contentmixBehindScenes','contentmixCommunity','contentmixStorytelling','contentmixEvents','contentmixMemes'];
      const mixLabels = ['Promo','Behind the scenes','Community','Storytelling','Events','Memes / cultuur'];
      const counts = mixKeys.map(k => Number(ca[k]) || 0);
      const total = counts.reduce((a, b) => a + b, 0);
      let dominantLabel = null, dominantPct = 0;
      if (total > 0) {
        const maxIdx = counts.indexOf(Math.max(...counts));
        dominantPct = Math.round((counts[maxIdx] / total) * 100);
        dominantLabel = mixLabels[maxIdx];
      }

      // Doelgroep
      const gewenst = (int.doelgroep.gewensteDoelgroep || '').trim();
      const werkelijk = (int.doelgroep.werkelijkeDoelgroep || '').trim();
      const bothFilled = gewenst && werkelijk;
      const mismatch = bothFilled && gewenst.toLowerCase() !== werkelijk.toLowerCase();

      // SWOT top 2
      const top2Lines = (text) => {
        if (!text || !String(text).trim()) return [];
        return String(text).split('\n').map(l => l.replace(/^[\s\-•*\d.]+/, '').trim()).filter(Boolean).slice(0, 2);
      };
      const topStrengths = top2Lines(swot.strengths);
      const topThreats = top2Lines(swot.threats);

      // Gaps
      const reelsPct = (() => {
        const v = ca.formatsReels;
        if (!v || typeof v !== 'object') return 0;
        const n = parseFloat(String(v.percentage || '').replace('%','').replace(',','.'));
        return isNaN(n) ? 0 : n;
      })();
      const ontbKanalen = (int.kanaalstrategie?.ontbrekendeKanalen || '').trim();
      const ontbSamenw = (ext.samenwerkingen?.ontbrekendeSamenwerkingen || '').trim();

      const gaps = [];
      if (communityPct < 50) gaps.push({ text: 'Community-opbouw vereist aandacht', type: 'warn' });
      if (mismatch) gaps.push({ text: 'Kloof tussen gewenst en werkelijk publiek gedetecteerd', type: 'warn' });
      if (reelsPct < 20 && erNum !== null && erNum < 5) gaps.push({ text: 'Reels onderbenut terwijl engagement laag is — overweeg meer videoformats', type: 'warn' });
      if (ontbKanalen) gaps.push({ text: ontbKanalen, type: 'gap', label: 'Ontbrekende kanalen' });
      if (ontbSamenw) gaps.push({ text: ontbSamenw, type: 'gap', label: 'Ontbrekende samenwerkingen' });

      return (
        <div className="fade-in space-y-4">
          {/* Key metrics */}
          <div className="grid grid-cols-2 gap-3">
            <div className={`${commC.bg} border ${commC.border} rounded-xl p-4`}>
              <p className="text-xs font-medium text-gray-500 mb-2">Community score</p>
              <p className={`text-3xl font-bold ${commC.text}`}>{communityPct}%</p>
              <p className={`text-xs font-semibold mt-1 ${commC.text}`}>{commLabel}</p>
            </div>
            <div className={`${erC.bg} border ${erC.border} rounded-xl p-4`}>
              <p className="text-xs font-medium text-gray-500 mb-2">Engagement rate</p>
              <p className={`text-3xl font-bold ${erC.text}`}>{erStr || '—'}</p>
              {erC.label && <p className={`text-xs font-semibold mt-1 ${erC.text}`}>{erC.label}</p>}
            </div>
          </div>

          {/* Contentmix */}
          {total > 0 && (
            <DCard title="Contentmix">
              <div className="flex items-center justify-between">
                <div>
                  <p className="text-xs text-gray-400 mb-1">Dominante categorie</p>
                  <p className="text-sm font-semibold text-gray-900">{dominantLabel}</p>
                </div>
                <div className="text-right">
                  <p className={`text-2xl font-bold ${dominantPct > 60 ? 'text-amber-500' : 'text-gray-800'}`}>{dominantPct}%</p>
                  {dominantPct > 60 && <p className="text-xs text-amber-500 font-medium">⚠ Te weinig variatie</p>}
                </div>
              </div>
            </DCard>
          )}

          {/* Doelgroep vergelijking */}
          {bothFilled && (
            <DCard title="Doelgroep">
              <div className="grid grid-cols-2 gap-3 mb-3">
                <div className="rounded-lg p-3 bg-blue-50 border border-blue-100">
                  <p className="text-xs font-bold text-blue-500 uppercase tracking-wide mb-1">Gewenst</p>
                  <p className="text-xs text-gray-700 leading-relaxed">{gewenst}</p>
                </div>
                <div className="rounded-lg p-3 bg-amber-50 border border-amber-100">
                  <p className="text-xs font-bold text-amber-500 uppercase tracking-wide mb-1">Werkelijk</p>
                  <p className="text-xs text-gray-700 leading-relaxed">{werkelijk}</p>
                </div>
              </div>
              {mismatch && (
                <div className="bg-orange-50 border border-orange-200 rounded-lg px-3 py-2 flex items-center gap-2">
                  <span className="text-orange-400 text-sm">⚠</span>
                  <p className="text-xs text-orange-600 font-medium">Doelgroep wijkt af van gewenst publiek</p>
                </div>
              )}
            </DCard>
          )}

          {/* SWOT highlights */}
          {(topStrengths.length > 0 || topThreats.length > 0) && (
            <div className="grid grid-cols-2 gap-3">
              {topStrengths.length > 0 && (
                <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-4">
                  <p className="text-xs font-bold text-emerald-600 uppercase tracking-wide mb-3">Top sterktes</p>
                  <ul className="space-y-2">
                    {topStrengths.map((s, i) => (
                      <li key={i} className="text-xs text-gray-700 flex gap-2">
                        <span className="text-emerald-400 shrink-0 font-bold">✓</span>
                        <span className="leading-relaxed">{s}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              )}
              {topThreats.length > 0 && (
                <div className="bg-amber-50 border border-amber-100 rounded-xl p-4">
                  <p className="text-xs font-bold text-amber-600 uppercase tracking-wide mb-3">Top bedreigingen</p>
                  <ul className="space-y-2">
                    {topThreats.map((t, i) => (
                      <li key={i} className="text-xs text-gray-700 flex gap-2">
                        <span className="text-amber-400 shrink-0 font-bold">!</span>
                        <span className="leading-relaxed">{t}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              )}
            </div>
          )}

          {/* Gaps sectie */}
          {gaps.length > 0 ? (
            <DCard title="Gedetecteerde gaps">
              <div className="space-y-3">
                {gaps.map((gap, i) => (
                  <div key={i} className="flex gap-3 items-start">
                    <span className={`mt-0.5 w-5 h-5 rounded-full flex items-center justify-center shrink-0 text-xs font-bold ${gap.type === 'warn' ? 'bg-red-100 text-red-500' : 'bg-gray-100 text-gray-500'}`}>
                      {gap.type === 'warn' ? '!' : '→'}
                    </span>
                    <div>
                      {gap.label && <p className="text-xs font-semibold text-gray-500 mb-0.5">{gap.label}</p>}
                      <p className="text-sm text-gray-700 leading-relaxed">{gap.text}</p>
                    </div>
                  </div>
                ))}
              </div>
            </DCard>
          ) : (
            <div className="text-center py-6 text-gray-400">
              <p className="text-sm italic">Geen gaps gedetecteerd op basis van de huidige data.</p>
            </div>
          )}
          <InzichtenBlok insights={allInsights} />
        </div>
      );
    }
