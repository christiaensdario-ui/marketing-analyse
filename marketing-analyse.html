    function PageConcurrentie({ data }) {
      // visualization-expert: mixed text+bar tables make numeric comparisons instantly scannable.
      // Inline bars added for Posts/week, Stories/week and ER rows — these are the only rows
      // with quantitative values suitable for length encoding. Text rows stay as text.
      const list = Array.isArray(data) ? data : [data];

      // Numeric getters for bar-chart rows
      const getPostsVal   = c => { const n = Number(c.postsAantal);   return n > 0 ? +(n / 4).toFixed(1) : 0; };
      const getStoriesVal = c => { const n = Number(c.storiesAantal); return n > 0 ? +(n / 4).toFixed(1) : 0; };
      const getErVal      = c => parseEngagementRate(getCompetitorEngagementRate(c)) || 0;

      // Max values across all competitors — used to normalise bar widths
      const maxPosts   = Math.max(...list.map(getPostsVal),   0.01);
      const maxStories = Math.max(...list.map(getStoriesVal), 0.01);
      const maxEr      = Math.max(...list.map(getErVal),      0.01);

      const rows = [
        { key: 'positionering', label: 'Positionering' },
        { key: 'branding',      label: 'Branding' },
        { key: 'content',       label: 'Content' },
        { key: 'community',     label: 'Community' },
        {
          key: null, label: 'Posts/week',
          render: c => { const n = Number(c.postsAantal); return n > 0 ? `≈ ${(n / 4).toFixed(1).replace('.0','')}` : ''; },
          getVal: getPostsVal, maxVal: maxPosts, barColor: c => CONTENTMIX_COLORS[list.indexOf(c) % CONTENTMIX_COLORS.length],
        },
        {
          key: null, label: 'Stories/week',
          render: c => { const n = Number(c.storiesAantal); return n > 0 ? `≈ ${(n / 4).toFixed(1).replace('.0','')}` : ''; },
          getVal: getStoriesVal, maxVal: maxStories, barColor: c => CONTENTMIX_COLORS[list.indexOf(c) % CONTENTMIX_COLORS.length],
        },
        {
          key: null, label: 'Engagement (ER)',
          render: c => getCompetitorEngagementRate(c),
          getVal: getErVal, maxVal: maxEr,
          // ER bar color follows benchmark thresholds (red/amber/green)
          barColor: c => { const v = getErVal(c); return v >= 5 ? '#10b981' : v >= 2 ? '#f59e0b' : '#ef4444'; },
        },
        { key: 'differentiatie',label: 'Differentiatie' },
        { key: 'watDoenZijNiet',label: 'Wat doen zij NIET?' },
      ];
      const colW = Math.max(180, Math.floor(280 / list.length));
      const { positive: cPos, total: cTot } = computeSectionHealth(list.flatMap(c => [c.positionering, c.branding, c.content, c.community, c.differentiatie]));
      return (
        <div className="fade-in">
          <div className="flex items-baseline gap-2 mb-3">
            <span className="text-xs font-bold text-gray-300 uppercase tracking-widest">A</span>
            <h4 className="text-sm font-semibold text-gray-800">Concurrentieanalyse</h4>
            <SectionHealthBadge positive={cPos} total={cTot} />
          </div>
          {list.length > 0 && list[0].naam && (
            <DCard title="Vergelijkingsdiagram">
              <ConcurrentieRadar data={list} />
            </DCard>
          )}
          <div className="overflow-x-auto -mx-4 px-4">
            <table className="w-full border-collapse" style={{ minWidth: `${140 + list.length * colW}px` }}>
              <thead>
                <tr>
                  <th className="text-left text-xs font-semibold text-gray-400 uppercase tracking-wide py-2 pr-3 w-32 sticky left-0 bg-gray-50 z-10" />
                  {list.map((c, i) => (
                    <th key={i} className="text-left text-xs font-bold text-gray-800 py-2 px-3 border-l border-gray-100 bg-white" style={{ minWidth: colW }}>
                      <div className="flex items-center gap-1.5">
                        <span className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: CONTENTMIX_COLORS[i % CONTENTMIX_COLORS.length] }} />
                        {c.naam || `Concurrent ${i + 1}`}
                      </div>
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {rows.map((row, ri) => (
                  <tr key={ri} className={ri % 2 === 0 ? 'bg-white' : 'bg-gray-50'}>
                    <td className="text-xs font-semibold text-gray-500 py-3 pr-3 align-top sticky left-0 z-10 border-r border-gray-100" style={{ backgroundColor: 'inherit' }}>
                      {row.label}
                    </td>
                    {list.map((c, i) => {
                      const val = row.render ? row.render(c) : c[row.key];
                      const numVal = row.getVal ? row.getVal(c) : null;
                      const barPct = numVal !== null && row.maxVal > 0 ? (numVal / row.maxVal) * 100 : 0;
                      const bColor = row.barColor ? row.barColor(c) : null;
                      return (
                        <td key={i} className="text-xs text-gray-700 py-3 px-3 align-top border-l border-gray-100 leading-relaxed">
                          <span>{val || <span className="text-gray-300 italic">—</span>}</span>
                          {/* Inline comparison bar for numeric rows — length encoding for comparison */}
                          {numVal !== null && numVal > 0 && (
                            <div className="mt-1.5 h-1.5 bg-gray-100 rounded-full overflow-hidden w-full">
                              <div className="h-full rounded-full transition-all duration-500"
                                style={{ width: `${barPct}%`, backgroundColor: bColor }} />
                            </div>
                          )}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function PageCultureleTrends({ data }) {
      const trendDir = (text) => {

        if (/dal|daalt|afname|achteruit|minder\b|verdwijnt|afneem/.test(t))   return { icon: '↓', color: 'text-red-500' };
        return { icon: '→', color: 'text-gray-400' };
      };
      const trends = [
        { icon: '🎵', label: 'Stijgende populariteit van een genre', value: data.genrePopulariteit },
        { icon: '🕰️', label: 'Nostalgie trends',                     value: data.nostalgieTrends },
        { icon: '🛠️', label: 'DIY cultuur',                          value: data.diyCultuur },
        { icon: '⚖️', label: 'Authenticiteit vs commercialisering',  value: data.authenticiteitVsCommercialisering },
      ];
      return (
        <div className="fade-in space-y-3">
          {(() => { const { positive: sPos, total: sTot } = computeSectionHealth([data.genrePopulariteit, data.nostalgieTrends, data.diyCultuur, data.authenticiteitVsCommercialisering]); return (
          <div className="flex items-baseline gap-2 mb-1">

          ); })()}
          <div className="bg-rose-50 rounded-2xl p-3 space-y-2">

              const dir = trendDir(trend.value);
              const badge = detectBadge(trend.value);

// ─── Samenvatting page ────────────────────────────────────────────────────
    function PageSamenvatting({ analysis, allInsights = [], personas, onNavigateToPersona }) {
      const { interneAnalyse: int, externeAnalyse: ext } = analysis;
      const ca = int.contentanalyse;
      const comm = int.communityAnalyse;

      // Community score
      const communityPct = computeCommunityScore(comm);
      const commC = communityScoreColor(communityPct);
      const commLabel = communityPct < 25 ? 'Publiek' : communityPct < 50 ? 'Emerging community' : communityPct < 75 ? 'Actieve community' : 'Echte community';

      // Engagement rate
      const erStr = getEngagementRate(ca);
      const erNum = parseEngagementRate(erStr);
      const erMissing = !erStr;
      const erC = erStr ? engagementRateColor(erNum) : engagementRateColor(null);
      const erNote = ca.insightsAccess === 'ja'
        ? 'Berekend via Instagram Insights (bereik).'
        : ca.insightsAccess === 'nee'
          ? 'Indicatieve score — publieke data (volgers).'
          : null;

      // Best competitor ER for benchmark
      const competitorErs = (Array.isArray(ext.concurrentieanalyse) ? ext.concurrentieanalyse : [])
        .map(c => parseEngagementRate(getCompetitorEngagementRate(c)))
        .filter(n => n !== null);
      const bestCompetitorEr = competitorErs.length > 0 ? Math.max(...competitorErs) : null;

      // Marktcontext badges
      const marktGrootteStr = (ext.marktSceneAnalyse?.grootteScene || '').trim();
      const marktverzadigingStr = (ext.marktSceneAnalyse?.marktverzadiging || '').toLowerCase().trim();
      const marktBadge = (text) => {
        if (!text) return null;
        const t = text.toLowerCase();
        if (/groei|stijg|opkomst|expand/.test(t)) return { bg: 'bg-emerald-100', text: 'text-emerald-700', border: 'border-emerald-200', label: 'Groeiend' };
        if (/krimp|dalend|daalt|afneem|achteruit/.test(t)) return { bg: 'bg-red-100', text: 'text-red-700', border: 'border-red-200', label: 'Krimpend' };
        if (/verzadigd|overbevolkt/.test(t)) return { bg: 'bg-amber-100', text: 'text-amber-700', border: 'border-amber-200', label: 'Verzadigd' };
        return { bg: 'bg-gray-100', text: 'text-gray-600', border: 'border-gray-200', label: 'Stabiel' };
      };
      const grootteB = marktBadge(marktGrootteStr);
      const verzadigingB = marktBadge(marktverzadigingStr);

      // Middelen parsing
      const budgetStr = (int.middelen?.budget || '').trim();
      const tijdStr = (int.middelen?.tijd || '').trim();
      const parseBudgetNum = (s) => { const m = String(s).replace(/\./g,'').match(/[\d]+/); return m ? parseInt(m[0]) : null; };
      const parseTijdNum = (s) => { const m = String(s).match(/([\d,.]+)\s*(?:uur|u\b)/i); return m ? parseFloat(m[1].replace(',','.')) : null; };
      const budgetNum = parseBudgetNum(budgetStr);
      const tijdNum = parseTijdNum(tijdStr);
      const budgetWarn = budgetNum !== null && budgetNum < 500;
      const tijdWarn = tijdNum !== null && tijdNum < 5;

      // Contentmix
      const mixKeys = ['contentmixPromo','contentmixBehindScenes','contentmixCommunity','contentmixStorytelling','contentmixEvents','contentmixMemes'];
      const mixLabels = ['Promo','Behind the scenes','Community','Storytelling','Events','Memes / cultuur'];
      const counts = mixKeys.map(k => Number(ca[k]) || 0);
      const total = counts.reduce((a, b) => a + b, 0);
      let dominantLabel = null, dominantPct = 0;
      if (total > 0) {
        const maxIdx = counts.indexOf(Math.max(...counts));
        dominantPct = Math.round((counts[maxIdx] / total) * 100);
        dominantLabel = mixLabels[maxIdx];
      }

      // Doelgroep
      const gewenst = (int.doelgroep.gewensteDoelgroep || '').trim();
      const werkelijk = (int.doelgroep.werkelijkeDoelgroep || '').trim();
      const bothFilled = gewenst && werkelijk;
      const mismatch = bothFilled && gewenst.toLowerCase() !== werkelijk.toLowerCase();

      // ── Gezondheidscore ──────────────────────────────────────────────────────
      const maxMixPct = total > 0 ? Math.max(...counts.map(c => (c / total) * 100)) : 0;
      const commFactor  = communityPct >= 70 ? 'pos' : communityPct >= 40 ? 'neu' : 'neg';
      const erFactor    = erNum === null ? 'neu' : erNum >= 5 ? 'pos' : erNum >= 2 ? 'neu' : 'neg';
      const mixFactor   = total === 0 ? 'neu' : maxMixPct <= 50 ? 'pos' : maxMixPct <= 60 ? 'neu' : 'neg';
      const kloofFactor = mismatch ? 'neg' : 'pos';
      const positieven  = [commFactor, erFactor, mixFactor, kloofFactor].filter(f => f === 'pos').length;
      const scoreLetter = ['F','D','C','B','A'][positieven];
      const scoreDescMap = {
        'A': 'Uitstekend merk — alle indicatoren positief',
        'B': 'Sterk merk met gerichte aandachtspunten',
        'C': 'Gemiddeld — meerdere verbeterpunten vereisen aandacht',
        'D': 'Aandacht vereist — fundamentele uitdagingen zichtbaar',
        'F': 'Kritisch — heroriëntatie van strategie aanbevolen',
      };
      const scoreC = ['A','B'].includes(scoreLetter)
        ? { bg: 'bg-emerald-50', border: 'border-emerald-200', letter: 'text-emerald-600', sub: 'text-emerald-700' }
        : scoreLetter === 'C'
          ? { bg: 'bg-amber-50', border: 'border-amber-200', letter: 'text-amber-500', sub: 'text-amber-700' }
          : { bg: 'bg-red-50', border: 'border-red-200', letter: 'text-red-500', sub: 'text-red-700' };
      const scoreFactors = [
        { label: 'Community', factor: commFactor },
        { label: 'Engagement', factor: erFactor },
        { label: 'Contentmix', factor: mixFactor },
        { label: 'Doelgroepkloof', factor: kloofFactor },
      ];

      // Gaps
      const reelsPct = (() => {
        const reelsCount = Math.max(0, Number(ca.formatsReels?.count) || 0);
        if (reelsCount === 0) return 0;
        const totalFormats = ['formatsFoto','formatsVideo','formatsReels','formatsCarousels']
          .reduce((sum, k) => sum + (Math.max(0, Number(ca[k]?.count) || 0)), 0);
        return totalFormats > 0 ? (reelsCount / totalFormats) * 100 : 0;
      })();
      const ontbKanalen = (int.kanaalstrategie?.ontbrekendeKanalen || '').trim();
      const ontbSamenw  = (ext.samenwerkingen?.ontbrekendeSamenwerkingen || '').trim();
      const gaps = [];
      if (communityPct < 50) gaps.push({ text: 'Community-opbouw vereist aandacht', type: 'warn' });
      if (mismatch) gaps.push({ text: 'Kloof tussen gewenst en werkelijk publiek gedetecteerd', type: 'warn' });
      if (reelsPct < 20 && erNum !== null && erNum < 5) gaps.push({ text: 'Reels onderbenut terwijl engagement laag is — overweeg meer videoformats', type: 'warn' });
      if (ontbKanalen) gaps.push({ text: ontbKanalen, type: 'gap', label: 'Ontbrekende kanalen' });
      if (ontbSamenw)  gaps.push({ text: ontbSamenw,  type: 'gap', label: 'Ontbrekende samenwerkingen' });

      // Persona snellinks
      const PERSONA_TYPES = [
        { key: 'persona1', label: 'Kernklant',          colors: 'bg-violet-50 border-violet-200 text-violet-700 hover:bg-violet-100' },
        { key: 'persona2', label: 'Aspirationele klant', colors: 'bg-blue-50 border-blue-200 text-blue-700 hover:bg-blue-100' },
        { key: 'persona3', label: 'Randgeval',           colors: 'bg-emerald-50 border-emerald-200 text-emerald-700 hover:bg-emerald-100' },
        { key: 'persona4', label: 'Conflictpersona',     colors: 'bg-orange-50 border-orange-200 text-orange-700 hover:bg-orange-100' },
      ];
      const hasPersonas = personas && (personas.persona1 || personas.persona2 || personas.persona3);

      return (
        <div className="fade-in space-y-4">

          {/* ── Gezondheidscore ── */}
          <div className={`${scoreC.bg} border ${scoreC.border} rounded-2xl p-5`}>
            <div className="flex items-center gap-2 mb-3">
              <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Overall gezondheidscore</p>
              <Tooltip text="Score op 4 factoren: community score (≥70% positief), engagement rate (≥5% positief), contentmix variatie (geen categorie ≥60% positief) en doelgroepkloof (geen kloof positief). Vier positieven = A · drie = B · twee = C · één = D · nul = F." />
            </div>
            <div className="flex items-center gap-5">
              <p className={`text-7xl font-black leading-none ${scoreC.letter}`}>{scoreLetter}</p>
              <div>
                <p className={`text-sm font-semibold ${scoreC.sub} leading-snug`}>{scoreDescMap[scoreLetter]}</p>
                <div className="flex gap-1.5 mt-2.5 flex-wrap">
                  {scoreFactors.map(({ label, factor }) => (
                    <span key={label} className={`text-xs px-2 py-0.5 rounded-full font-medium border ${
                      factor === 'pos' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' :
                      factor === 'neu' ? 'bg-gray-50 border-gray-200 text-gray-500' :
                                        'bg-red-50 border-red-200 text-red-600'
                    }`}>{label} {factor === 'pos' ? '✓' : factor === 'neg' ? '✗' : '–'}</span>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* ── Key metrics ── */}
          <div className="grid grid-cols-2 gap-3">
            <div className={`${commC.bg} border ${commC.border} rounded-xl p-4`}>
              <div className="flex items-center gap-1 mb-2">
                <p className="text-xs font-medium text-gray-500">Community score</p>
                <Tooltip text="Onder 40% = publiek, 40–70% = actieve community, boven 70% = echte community." />
              </div>
              <p className={`text-3xl font-bold ${commC.text}`}>{communityPct}%</p>
              <p className={`text-xs font-semibold mt-1 ${commC.text}`}>{commLabel}</p>
            </div>
            <div className={`${erC.bg} border ${erC.border} rounded-xl p-4`}>
              <div className="flex items-center gap-1 mb-2">
                <p className="text-xs font-medium text-gray-500">Engagement rate</p>
                <Tooltip text="Onder 2% = laag, 2–5% = gemiddeld, boven 5% = goed — industrie benchmark." />
              </div>
              {erMissing
                ? <p className="text-sm text-gray-400 italic">Vul het vereiste veld in om de engagement rate te berekenen.</p>
                : <p className={`text-3xl font-bold ${erC.text}`}>{erStr || '—'}</p>
              }
              {!erMissing && erC.label && <p className={`text-xs font-semibold mt-1 ${erC.text}`}>{erC.label}</p>}
              {!erMissing && erNote && <p className="text-xs text-gray-400 mt-1 italic">{erNote}</p>}
              {!erMissing && bestCompetitorEr !== null && (
                <div className="flex items-center gap-1.5 mt-2 pt-2 border-t border-gray-200 border-opacity-40">
                  <span className={`font-bold text-base leading-none ${erNum >= bestCompetitorEr ? 'text-emerald-500' : 'text-amber-500'}`}>
                    {erNum >= bestCompetitorEr ? '↑' : '↓'}
                  </span>
                  <p className="text-xs text-gray-500">Beste concurrent: <span className="font-semibold text-gray-700">{bestCompetitorEr.toFixed(2)}%</span></p>
                </div>
              )}
            </div>
          </div>

          {/* ── Contentmix ── */}
          {total > 0 && (
            <DCard title="Contentmix">
              <MiniDonutChart data={ca} />
              {dominantLabel && (

              <p className="text-sm italic">Geen gaps gedetecteerd op basis van de huidige data.</p>

          <InzichtenBlok insights={allInsights} />

          {/* ── Persona snellinks ── */}
          <DCard title="Persona's">

              <div className="grid grid-cols-2 gap-2">
                {PERSONA_TYPES.filter(pt => personas[pt.key]).map(pt => (

        </div>

    }

// ─── Dashboard Screen ─────────────────────────────────────────────────────
    // ─── Persona components ───────────────────────────────────────────────────
    const PERSONA_TABS = ['Profiel', 'Customer Journey', 'Kanaaladvies', 'Doelgroepvergelijking'];
    const JOURNEY_COLORS = ['violet', 'blue', 'emerald', 'amber', 'rose'];

    function PersonaTabEmpty() {
      return (
        <div className="py-8 text-center">
          <p className="text-xs text-gray-400">Regenereer de persona om deze tab te vullen</p>
        </div>
      );
    }

    function PersonaCard({ persona, label, onRefresh, isLoading }) {
      const [activeTab, setActiveTab] = useState('Profiel');
      if (!persona) return null;
      const initials = (persona.naam || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

      function TabProfiel() {
        const rows = [
          { icon: '💡', label: 'Motivaties',   value: persona.motivaties   },
          { icon: '⚡', label: 'Frustraties',  value: persona.frustraties  },
          { icon: '📱', label: 'Mediagebruik', value: persona.mediagebruik },
          { icon: '🛒', label: 'Koopgedrag',   value: persona.koopgedrag   },
        ];
        return (
          <div>
            {persona.quote && (
              <p className="text-sm text-gray-500 italic leading-relaxed mb-4 border-l-2 border-violet-200 pl-3">"{persona.quote}"</p>
            )}
            {persona.bio && (
              <p className="text-xs text-gray-600 leading-relaxed mb-4">{persona.bio}</p>
            )}
            <div className="space-y-3">
              {rows.map(({ icon, label, value }) => (
                <div key={label}>
                  <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-0.5">{icon} {label}</p>
                  <p className="text-xs text-gray-700 leading-relaxed">{value || '—'}</p>
                </div>
              ))}
            </div>
          </div>
        );
      }

      function TabJourney() {
        // Vertical timeline with connector line — visualization-expert: sequential process data
        // is best shown as a flow/timeline. The connector line communicates progression and
        // makes the sequential relationship between steps immediately visible.
        if (!persona.journey || !persona.journey.length) return <PersonaTabEmpty />;
        const bgMap    = { violet: 'bg-violet-50 border-violet-200', blue: 'bg-blue-50 border-blue-200', emerald: 'bg-emerald-50 border-emerald-200', amber: 'bg-amber-50 border-amber-200', rose: 'bg-rose-50 border-rose-200', gray: 'bg-gray-50 border-gray-200' };
        const badgeMap = { violet: 'bg-violet-500 text-white', blue: 'bg-blue-500 text-white', emerald: 'bg-emerald-500 text-white', amber: 'bg-amber-500 text-white', rose: 'bg-rose-500 text-white', gray: 'bg-gray-400 text-white' };
        return (
          <div className="relative">
            {/* Vertical connector line linking all steps — communicates sequential flow */}
            <div className="absolute left-3.5 top-4 bottom-4 w-px bg-gray-200" />
            <div className="space-y-3">
              {persona.journey.map((fase, i) => {
                const color = JOURNEY_COLORS[i] || 'gray';
                return (
                  <div key={i} className="flex gap-3 relative">
                    {/* Step badge sits on the timeline line */}
                    <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shrink-0 z-10 ${badgeMap[color]}`}>
                      {i + 1}
                    </div>
                    <div className={`flex-1 border rounded-xl p-3 ${bgMap[color]}`}>
                      <p className="text-xs font-bold text-gray-800 mb-1">{fase.fase}</p>
                      {fase.beschrijving && <p className="text-xs text-gray-700 leading-relaxed mb-1">{fase.beschrijving}</p>}
                      {fase.voorbeeld && <p className="text-xs text-gray-500 italic leading-relaxed">Voorbeeld: {fase.voorbeeld}</p>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      function TabKanaaladvies() {
        if (!persona.kanaaladvies || !persona.kanaaladvies.length) return <PersonaTabEmpty />;
        const priMap = {
          primair:   { badge: 'bg-emerald-100 text-emerald-700', label: 'Primair' },
          secundair: { badge: 'bg-amber-100 text-amber-700',     label: 'Secundair' },
          optioneel: { badge: 'bg-gray-100 text-gray-600',       label: 'Optioneel' },
        };
        return (
          <div className="space-y-3">
            {persona.kanaaladvies.map((k, i) => {
              const pri = priMap[k.prioriteit] || priMap.optioneel;
              return (
                <div key={i} className="bg-white border border-gray-200 rounded-xl p-3">
                  <div className="flex items-center justify-between mb-2">
                    <p className="text-xs font-bold text-gray-800">{k.platform || '—'}</p>
                    <span className={`text-xs font-semibold px-2 py-0.5 rounded-full ${pri.badge}`}>{pri.label}</span>
                  </div>
                  {k.reden && (
                    <div className="mb-1.5">
                      <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-0.5">Waarom</p>
                      <p className="text-xs text-gray-700 leading-relaxed">{k.reden}</p>
                    </div>
                  )}
                  {k.content && (
                    <div className="mb-1.5">
                      <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-0.5">Content</p>
                      <p className="text-xs text-gray-700 leading-relaxed">{k.content}</p>
                    </div>
                  )}
                  {k.timing && (
                    <div>
                      <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-0.5">Timing</p>
                      <p className="text-xs text-gray-700 leading-relaxed">{k.timing}</p>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        );
      }

      function TabDoelgroepVergelijking() {
        const dv = persona.doelgroepvergelijking;
        if (!dv || (!dv.overeenkomsten && !dv.verschillen && !dv.conclusie)) return <PersonaTabEmpty />;
        return (
          <div className="space-y-3">
            {dv.overeenkomsten && (
              <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3">
                <p className="text-xs font-bold text-emerald-700 mb-1">Overeenkomsten</p>
                <p className="text-xs text-gray-700 leading-relaxed">{dv.overeenkomsten}</p>
              </div>
            )}
            {dv.verschillen && (
              <div className="bg-red-50 border border-red-200 rounded-xl p-3">
                <p className="text-xs font-bold text-red-700 mb-1">Verschillen</p>
                <p className="text-xs text-gray-700 leading-relaxed">{dv.verschillen}</p>
              </div>
            )}
            {dv.conclusie && (
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-3">
                <p className="text-xs font-bold text-amber-700 mb-1">Conclusie voor strategie</p>
                <p className="text-xs text-gray-700 leading-relaxed">{dv.conclusie}</p>
              </div>
            )}
          </div>
        );
      }

      return (
        <div className={`bg-white border border-gray-100 rounded-2xl shadow-sm relative ${isLoading ? 'opacity-50 pointer-events-none' : ''}`}>
          {isLoading && (
            <div className="absolute inset-0 flex items-center justify-center rounded-2xl bg-white/70 z-10">
              <div className="w-6 h-6 border-2 border-gray-200 border-t-gray-800 rounded-full animate-spin" />
            </div>
          )}
          {/* Header */}
          <div className="flex items-start justify-between p-5 pb-3">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-full bg-gradient-to-br from-violet-100 to-blue-100 flex items-center justify-center text-sm font-bold text-violet-700 shrink-0">
                {initials}
              </div>
              <div>
                <p className="text-sm font-bold text-gray-900">{persona.naam}</p>
                <p className="text-xs text-gray-400">{persona.leeftijd} jaar · {label}</p>
              </div>
            </div>
            <button
              onClick={onRefresh}
              title="Genereer opnieuw"
              className="text-xs text-gray-400 hover:text-gray-700 border border-gray-200 rounded-lg px-2.5 py-1.5 transition-colors shrink-0 ml-2"
            >↻</button>
          </div>
          {/* Tab bar */}
          <div className="flex border-b border-gray-100 px-5 gap-3 overflow-x-auto">
            {PERSONA_TABS.map(tab => (
              <button
                key={tab}
                onClick={() => setActiveTab(tab)}
                className={`text-xs font-semibold pb-2.5 border-b-2 whitespace-nowrap transition-colors ${activeTab === tab ? 'border-violet-500 text-violet-700' : 'border-transparent text-gray-400 hover:text-gray-600'}`}
              >{tab}</button>
            ))}
          </div>
          {/* Tab content */}
          <div className="p-5">
            {activeTab === 'Profiel'                && <TabProfiel />}
            {activeTab === 'Customer Journey'       && <TabJourney />}
            {activeTab === 'Kanaaladvies'           && <TabKanaaladvies />}
            {activeTab === 'Doelgroepvergelijking'  && <TabDoelgroepVergelijking />}
          </div>
        </div>
      );
    }

    function PagePersonas({ analysis, personas, onUpdate, apiKey, onSetApiKey }) {
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [loadingOne, setLoadingOne] = useState(null);
      const [localKey, setLocalKey] = useState('');
      const [editingKey, setEditingKey] = useState(false);

      const d = analysis.interneAnalyse?.doelgroep || {};
      const hasData = d.gewensteDoelgroep || d.werkelijkeDoelgroep || d.gedrag;
      const hasKloof = !!(d.gewensteDoelgroep && d.werkelijkeDoelgroep &&
        d.gewensteDoelgroep.trim().toLowerCase() !== d.werkelijkeDoelgroep.trim().toLowerCase());

      useEffect(() => {
        if (apiKey && !personas && !loading && hasData) generateAll();
      }, []); // eslint-disable-line react-hooks/exhaustive-deps

      async function generateAll() {
        const key = apiKey || localKey;
        if (!key) return;
        setLoading(true); setError(null);
        try {
          const text = await callAnthropicAPI(key, [{ role: 'user', content: buildPersonaPrompt(analysis) }], 6000);
          onUpdate({ ...analysis, personas: parseJson(text) });
        } catch (e) { setError(e.message || 'Onbekende fout'); }
        finally { setLoading(false); }
      }

      async function refreshOne(personaKey) {
        const key = apiKey || localKey;
        if (!key) return;
        setLoadingOne(personaKey); setError(null);
        try {
          const text = await callAnthropicAPI(key, [{ role: 'user', content: buildPersonaPrompt(analysis) }], 6000);
          const result = parseJson(text);
          onUpdate({ ...analysis, personas: { ...(personas || {}), [personaKey]: result[personaKey] } });
        } catch (e) { setError(e.message || 'Onbekende fout'); }
        finally { setLoadingOne(null); }
      }

      function saveKey() { onSetApiKey(localKey.trim()); setEditingKey(false); if (localKey.trim() && !personas && hasData) generateAll(); }

      if (!apiKey && !editingKey) {
        return (
          <div className="fade-in">
            <h4 className="text-sm font-semibold text-gray-800 mb-4">Persona's</h4>
            <div className="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm">
              <p className="text-sm font-semibold text-gray-800 mb-1">Anthropic API sleutel vereist</p>
              <p className="text-xs text-gray-500 mb-4 leading-relaxed">Je sleutel wordt alleen lokaal opgeslagen en enkel gebruikt voor AI-generatie. Je vindt hem op <span className="text-gray-700 font-medium">console.anthropic.com</span>.</p>
              <input
                type="password" autoComplete="off"
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition mb-3"
                placeholder="sk-ant-..."
                value={localKey}
                onChange={e => setLocalKey(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && localKey.trim() && saveKey()}
              />
              <button
                onClick={saveKey}
                disabled={!localKey.trim()}
                className="bg-gray-900 text-white text-sm font-medium px-5 py-2 rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-40"
              >Opslaan en genereren</button>
            </div>
          </div>
        );
      }

      return (
        <div className="fade-in">
          <div className="flex items-center justify-between mb-4">
            <h4 className="text-sm font-semibold text-gray-800">Persona's</h4>
            <div className="flex items-center gap-2">
              {!editingKey && (
                <button onClick={() => { setEditingKey(true); setLocalKey(''); }} className="text-xs text-gray-400 hover:text-gray-600 transition-colors border border-gray-200 rounded-lg px-2.5 py-1.5">
                  API sleutel ✎
                </button>
              )}
              {personas && (
                <button onClick={generateAll} disabled={loading} className="inline-flex items-center gap-1 text-xs bg-gray-900 text-white px-3 py-1.5 rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-40">
                  {loading ? <span className="w-3 h-3 border border-white border-t-transparent rounded-full animate-spin inline-block" /> : '↻'} Genereer opnieuw
                </button>
              )}
            </div>
          </div>

          {editingKey && (
            <div className="mb-4 bg-white border border-gray-100 rounded-xl p-4">
              <p className="text-xs text-gray-500 mb-2">API sleutel bijwerken:</p>
              <div className="flex gap-2">
                <input
                  type="password" autoComplete="off"
                  className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
                  placeholder="sk-ant-..."
                  value={localKey}
                  onChange={e => setLocalKey(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && localKey.trim() && saveKey()}
                />
                <button onClick={saveKey} disabled={!localKey.trim()} className="bg-gray-900 text-white text-sm px-4 py-2 rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-40">OK</button>
                <button onClick={() => setEditingKey(false)} className="text-sm text-gray-400 hover:text-gray-600 px-2 transition-colors">✕</button>
              </div>
            </div>
          )}

          {error && (
            <div className="mb-4 bg-red-50 border border-red-200 rounded-xl px-4 py-3 flex items-start gap-2">
              <span className="text-red-400 shrink-0 mt-0.5">⚠</span>
              <p className="text-xs text-red-700 flex-1 leading-relaxed">{error}</p>
              <button onClick={generateAll} className="text-xs text-red-600 hover:text-red-800 font-semibold shrink-0">Opnieuw</button>
            </div>
          )}

          {loading && !personas && (
            <div className="flex flex-col items-center py-16 gap-3">
              <div className="w-8 h-8 border-2 border-gray-200 border-t-gray-800 rounded-full animate-spin" />
              <p className="text-sm text-gray-400">Persona's worden gegenereerd...</p>
            </div>
          )}

          {personas && (
            <div className="space-y-4">
              {[
                { key: 'persona1', label: 'Kernklant' },
                { key: 'persona2', label: 'Aspirationele klant' },
                { key: 'persona3', label: 'Randgeval' },
              ].map(({ key, label }) => (
                <div key={key} id={`persona-card-${key}`}>
                  <PersonaCard
                    persona={personas[key]}
                    label={label}
                    isLoading={loadingOne === key}
                    onRefresh={() => refreshOne(key)}
                  />
                </div>
              ))}
              {hasKloof && personas.persona4 && (
                <>
                  <div className="flex items-center gap-3 pt-2">
                    <div className="h-px flex-1 bg-orange-200" />
                    <span className="text-xs font-semibold text-orange-600 bg-orange-50 border border-orange-200 rounded-full px-3 py-1.5 whitespace-nowrap">
                      Conflictpersona — gegenereerd op basis van gedetecteerde doelgroepkloof
                    </span>
                    <div className="h-px flex-1 bg-orange-200" />
                  </div>
                  <div id="persona-card-persona4">
                    <PersonaCard
                      persona={personas.persona4}
                      label="Conflictpersona"
                      isLoading={loadingOne === 'persona4'}
                      onRefresh={() => refreshOne('persona4')}
                    />
                  </div>
                </>
              )}
            </div>
          )}

          {!personas && !loading && !error && (
            <div className="text-center py-12">
              {!hasData && <p className="text-xs text-gray-400 mb-4">Vul eerst de doelgroepsectie in voordat je persona's genereert.</p>}
              {hasData && <p className="text-xs text-gray-400 mb-4">Klik om persona's te genereren op basis van de doelgroepdata.</p>}
              <button onClick={generateAll} disabled={!hasData} className="bg-gray-900 text-white text-sm font-medium px-5 py-2 rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-40">
                ✦ Genereer persona's
              </button>
            </div>
          )}
        </div>
      );
    }

    const MAIN_TABS = [
      { id: 'samenvatting', label: 'Samenvatting' },
      { id: 'interne',      label: 'Interne Analyse' },
      { id: 'externe',      label: 'Externe Analyse' },

              aria-current={active === t.id ? 'page' : undefined}
              onClick={() => onChange(t.id)}
              className={`whitespace-nowrap flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors flex-shrink-0
                ${active === t.id ? 'bg-gray-900 text-white' : 'text-gray-500 hover:bg-gray-100 hover:text-gray-800'}`}
            >
              <span className={`font-bold ${active === t.id ? 'text-gray-300' : 'text-gray-300'}`}>{t.letter}</span>

    // ─── Export modal ──────────────────────────────────────────────────────────

      { id: 'merkidentiteit', label: 'Merkidentiteit' },
      { id: 'kanalen',        label: 'Kanalen' },
      { id: 'doelgroep',      label: 'Doelgroep' },
      { id: 'content',        label: 'Content' },
      { id: 'strategie',      label: 'Strategie' },
      { id: 'community',      label: 'Community' },
      { id: 'middelen',       label: 'Middelen' },
      { id: 'swot',           label: 'SWOT' },
    ];
    const EXTERN_EXPORT_SECTIONS = [
      { id: 'concurrentie',    label: 'Concurrentie' },
      { id: 'samenwerkingen',  label: 'Samenwerkingen' },
      { id: 'markt',           label: 'Markt/Scene' },
      { id: 'doelgroepgedrag', label: 'Doelgroepgedrag' },
      { id: 'trends',          label: 'Trends' },
    ];
    const ALL_EXPORT_IDS = ['samenvatting','personas',...INTERN_EXPORT_SECTIONS.map(s=>s.id),...EXTERN_EXPORT_SECTIONS.map(s=>s.id)];

    function ExportModal({ analysis, onClose }) {
      const [selected, setSelected] = useState(() => new Set(ALL_EXPORT_IDS));
      const [format, setFormat]     = useState('pdf');
      const [expanded, setExpanded] = useState(false);
      const internIds = INTERN_EXPORT_SECTIONS.map(s => s.id);
      const externIds = EXTERN_EXPORT_SECTIONS.map(s => s.id);
      const allSelected    = ALL_EXPORT_IDS.every(id => selected.has(id));
      const internSelected = internIds.every(id => selected.has(id));
      const externSelected = externIds.every(id => selected.has(id));

      const toggle = (id) => setSelected(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
      const toggleAll = () => setSelected(allSelected ? new Set() : new Set(ALL_EXPORT_IDS));
      const toggleGroup = (ids) => {
        const allIn = ids.every(id => selected.has(id));
        setSelected(prev => { const n = new Set(prev); ids.forEach(id => allIn ? n.delete(id) : n.add(id)); return n; });
      };
      const handleExport = () => {
        if (!selected.size) return;
        if (format === 'pdf') exportPDFFiltered(analysis, selected);
        else exportJSONFiltered(analysis, selected);
        onClose();
      };

      const CheckRow = ({ id, label, bold = false, groupIds = null }) => {
        const checked = groupIds ? groupIds.every(i => selected.has(i)) : selected.has(id);
        const onChange = groupIds ? () => toggleGroup(groupIds) : () => toggle(id);
        return (
          <label className="flex items-center gap-3 cursor-pointer select-none">
            <input type="checkbox" checked={checked} onChange={onChange}
              className="w-4 h-4 rounded accent-gray-900 shrink-0" />

      return (
        <div className="fixed inset-0 bg-black/40 z-50 flex items-end sm:items-center justify-center p-4" onClick={onClose}>

            <div className="flex items-center justify-between px-5 pt-5 pb-4 border-b border-gray-100 shrink-0">

            <div className="flex-1 overflow-y-auto px-5 py-4 space-y-3">

                <CheckRow id="externe_volledig"  label="Externe Analyse (volledig)"  groupIds={externIds} />

                      <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Intern</p>

                        {INTERN_EXPORT_SECTIONS.map(s => (

                            <input type="checkbox" checked={selected.has(s.id)} onChange={() => toggle(s.id)}

                    <button key={f} onClick={() => setFormat(f)}
                      className={`flex-1 py-2 rounded-xl text-sm font-semibold border transition-colors ${format === f ? 'bg-gray-900 text-white border-gray-900' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-50'}`}>

    DashboardScreen.propTypes = {
      analysis: PropTypes.object.isRequired,
      onBack: PropTypes.func.isRequired,
      onEdit: PropTypes.func.isRequired,
    };

    function DashboardScreen({ analysis, onBack, onEdit, onUpdate, apiKey, onSetApiKey }) {

      };

      const renderInternePage = () => {
        const pi = (id) => insights.filter(i => i.pages.includes(id));
        switch (interneTab) {
          case 'organisatie':     return <PageOrganisatie data={int.organisatie} />;
          case 'merkidentiteit':  return <PageMerkidentiteit data={int.merkidentiteit} insights={pi('merkidentiteit')} />;
          case 'kanaalstrategie': return <PageKanaalstrategie data={int.kanaalstrategie || {}} insights={pi('kanaalstrategie')} />;
          case 'doelgroep':       return <PageDoelgroep data={int.doelgroep} insights={pi('doelgroep')} />;

      const renderExternePage = () => {
        switch (externeTab) {

          case 'doelgroepgedrag': return <PageDoelgroepgedrag data={ext.doelgroepgedrag} />;

      return (
        <div className="min-h-screen bg-gray-50 fade-in">

              <div className="flex items-center justify-between gap-3">
                <button
                  onClick={onBack}
                  aria-label="Terug naar overzicht"

                >
                  ←
                </button>
                <div className="flex-1 min-w-0">

                </div>
                <div className="flex items-center gap-2 shrink-0">
                  {/* Export button */}
                  <button
                    onClick={() => setShowExportModal(true)}

                  >

                      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" strokeLinecap="round"/>
                      <polyline points="17 8 12 3 7 8" strokeLinecap="round" strokeLinejoin="round"/>
                      <line x1="12" y1="3" x2="12" y2="15" strokeLinecap="round"/>

                  </button>
                  {showExportModal && <ExportModal analysis={analysis} onClose={() => setShowExportModal(false)} />}
                  <button
                    onClick={onEdit}
                    className="inline-flex items-center gap-1.5 text-xs bg-gray-900 text-white px-3 py-1.5 rounded-lg hover:bg-gray-700 transition-colors"

                    <svg width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" strokeLinecap="round"/>
                      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>

              {/* Main tabs */}
              <div className="flex gap-1 mt-3" role="tablist" aria-label="Analysenavigatie">

            <div className="bg-white border-b border-gray-100">

            {mainTab === 'samenvatting' ? <PageSamenvatting analysis={analysis} allInsights={insights} personas={analysis.personas} onNavigateToPersona={(key) => { setMainTab('personas'); setTimeout(() => { const el = document.getElementById('persona-card-' + key); if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 200); }} /> :
             mainTab === 'interne'      ? renderInternePage() :
             mainTab === 'externe'      ? renderExternePage() :
             mainTab === 'personas'     ? <PagePersonas analysis={analysis} personas={analysis.personas} onUpdate={onUpdate} apiKey={apiKey} onSetApiKey={onSetApiKey} /> :
             null}

    // ─── Progress bar ─────────────────────────────────────────────────────────
    function WizardProgressBar({ step, total, title, completions }) {
      return (
        <div className="max-w-2xl mx-auto px-4">
          <div className="flex items-center justify-between mb-2">
            <span className="text-xs font-medium text-gray-400">Stap {step} van {total}</span>
            <span className="text-sm font-semibold text-gray-800">{title}</span>
          </div>
          <div className="flex gap-1">
            {completions.map((done, i) => (
              <div key={i} className={`h-1.5 rounded-full flex-1 transition-all ${
                i < step - 1
                  ? (done ? 'bg-green-400' : 'bg-gray-300')
                  : i === step - 1 ? 'bg-gray-900' : 'bg-gray-100'
              }`} />
            ))}
          </div>
        </div>
      );
    }

    // ─── Format field (3 sub-fields per format) ───────────────────────────────
    function FormatField({ label, value, onChange, totalFormats }) {
      const v = (value && typeof value === 'object') ? value : emptyFormat();
      const set = (key, val) => onChange({ ...v, [key]: val });
      const count = Math.max(0, Number(v.count) || 0);
      const pctNum = totalFormats > 0 && count > 0 ? Math.round((count / totalFormats) * 100) : 0;
      return (
        <div className="mb-4 border border-gray-100 rounded-xl p-4 bg-gray-50">
          <p className="text-sm font-semibold text-gray-700 mb-3">{label}</p>
          <div className="mb-3">
            <label className="block text-xs font-medium text-gray-500 mb-1">Aantal posts</label>
            <div className="flex items-center gap-3">
              <input
                type="number"
                min="0"
                className="w-24 border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
                placeholder="0"
                value={count === 0 ? '' : count}
                onChange={e => set('count', Math.max(0, parseInt(e.target.value) || 0))}
              />
              {totalFormats > 0 && count > 0 && (
                <span className="text-sm font-semibold text-gray-500">{pctNum}%</span>
              )}
            </div>
          </div>
          <div className="mb-3">
            <label className="block text-xs font-medium text-gray-500 mb-1">Hoe wordt dit format gebruikt?</label>
            <textarea
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
              rows={2}
              value={v.uitleg}
              onChange={e => set('uitleg', e.target.value)}
            />
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-500 mb-1">Voorbeeldcontent (omschrijving of URL)</label>
            <textarea
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
              rows={2}
              value={v.voorbeelden}
              onChange={e => set('voorbeelden', e.target.value)}
            />
          </div>
        </div>
      );
    }

    // ─── Form Screen (8-step wizard) ──────────────────────────────────────────
    FormScreen.propTypes = {
      initial: PropTypes.object,
      onSave: PropTypes.func.isRequired,
      onBack: PropTypes.func.isRequired,
    };

    function FormScreen({ initial, onSave, onBack }) {
      const TOTAL = 8;
      const STEP_TITLES = [
        'Basisinfo',
        'Organisatie & Merkidentiteit',
        'Kanalen & Doelgroep',
        'Contentanalyse',
        'Strategie & Community',
        'Middelen & SWOT',
        'Concurrentieanalyse',
        'Externe Analyse',
      ];

      const [step, setStep] = useState(1);
      const [klantnaam, setKlantnaam] = useState(initial?.klantnaam || '');
      const [sector, setSector] = useState(initial?.sector || '');
      const [data, setData] = useState(() => {
        if (!initial) return emptyData();
        return migrateAnalysis(initial);
      });

      const int = data.interneAnalyse;
      const ext = data.externeAnalyse;

      const si = (section, key, val) =>
        setData(d => ({ ...d, interneAnalyse: { ...d.interneAnalyse, [section]: { ...d.interneAnalyse[section], [key]: val } } }));
      const se = (section, key, val) =>
        setData(d => ({ ...d, externeAnalyse: { ...d.externeAnalyse, [section]: { ...d.externeAnalyse[section], [key]: val } } }));

      const setConcurrent = (i, key, val) => {
        setData(d => {
          const curr = Array.isArray(d.externeAnalyse.concurrentieanalyse) ? d.externeAnalyse.concurrentieanalyse : [emptyCompetitor()];
          return { ...d, externeAnalyse: { ...d.externeAnalyse, concurrentieanalyse: curr.map((c, idx) => idx === i ? { ...c, [key]: val } : c) } };
        });
      };
      const addConcurrent = () => {
        setData(d => {
          const curr = Array.isArray(d.externeAnalyse.concurrentieanalyse) ? d.externeAnalyse.concurrentieanalyse : [emptyCompetitor()];
          if (curr.length >= 5) return d;
          return { ...d, externeAnalyse: { ...d.externeAnalyse, concurrentieanalyse: [...curr, emptyCompetitor()] } };
        });
      };
      const removeConcurrent = (i) => {
        setData(d => {
          const curr = Array.isArray(d.externeAnalyse.concurrentieanalyse) ? d.externeAnalyse.concurrentieanalyse : [emptyCompetitor()];
          if (curr.length <= 1) return d;
          return { ...d, externeAnalyse: { ...d.externeAnalyse, concurrentieanalyse: curr.filter((_, idx) => idx !== i) } };
        });
      };

      const stepComplete = (s) => {
        switch (s) {
          case 1: return klantnaam.trim().length > 0;
          case 2: return !!(int.organisatie.labelType || int.merkidentiteit.huidigePositionering);
          case 3: return !!int.kanaalstrategie.actievePlatformen;
          case 4: return !!(int.contentanalyse.gemiddeldeLikes || int.contentanalyse.contentmixPromo > 0 || int.contentanalyse.frequentiePostsAantal);
          case 5: return !!(int.strategischeContent.positioneringsconsistentie || int.communityAnalyse.interactieComments);
          case 6: return !!(int.middelen.budget || int.swot.strengths);
          case 7: return !!(Array.isArray(ext.concurrentieanalyse) && ext.concurrentieanalyse[0]?.naam);
          case 8: return !!(ext.marktSceneAnalyse.grootteScene || ext.cultureleTrends.genrePopulariteit || ext.doelgroepgedrag.ontdekkingMuziek);
          default: return false;
        }
      };

      const completions = Array.from({ length: TOTAL }, (_, i) => stepComplete(i + 1));
      const scrollTop = () => window.scrollTo({ top: 0, behavior: 'smooth' });
      const next = () => { setStep(s => Math.min(s + 1, TOTAL)); scrollTop(); };
      const prev = () => { setStep(s => Math.max(s - 1, 1)); scrollTop(); };

      const doSave = (goToDashboard = false) => {
        onSave({ ...data, klantnaam: klantnaam.trim() || 'Naamloos', sector: sector.trim() }, goToDashboard);
      };

      const concurrenten = Array.isArray(ext.concurrentieanalyse) ? ext.concurrentieanalyse : [emptyCompetitor()];

      return (
        <div className="min-h-screen bg-gray-50 flex flex-col">
          <div className="sticky top-0 z-10 bg-white border-b border-gray-100 py-4 shadow-sm">
            <WizardProgressBar step={step} total={TOTAL} title={STEP_TITLES[step - 1]} completions={completions} />
          </div>

          <div className="flex-1">

                    <Field label="Andere labels / collectieven" value={ext.marktSceneAnalyse.andereLabels} onChange={v => se('marktSceneAnalyse','andereLabels',v)} rows={2} />
                    <Field label="Marktverzadiging" value={ext.marktSceneAnalyse.marktverzadiging} onChange={v => se('marktSceneAnalyse','marktverzadiging',v)} rows={2} />
                  </SubSection>
                  <SubSection letter="D" title="Doelgroepgedrag" subtitle="Niet alleen wie ze zijn, maar hoe ze handelen.">
                    <Field label="Hoe ontdekken ze muziek?" value={ext.doelgroepgedrag.ontdekkingMuziek} onChange={v => se('doelgroepgedrag','ontdekkingMuziek',v)} rows={3} />
                    <Field label="Welke platformen gebruiken ze?" value={ext.doelgroepgedrag.platformgebruik} onChange={v => se('doelgroepgedrag','platformgebruik',v)} rows={2} />
                    <Field label="Wat motiveert hen?" value={ext.doelgroepgedrag.motivatie} onChange={v => se('doelgroepgedrag','motivatie',v)} rows={2} />
                    <Field label="Wie beïnvloedt hen?" value={ext.doelgroepgedrag.invloeden} onChange={v => se('doelgroepgedrag','invloeden',v)} rows={2} />
                  </SubSection>
                  <SubSection letter="E" title="Culturele trends" subtitle="Voor muzieklabels zeer belangrijk.">
                    <Field label="Stijgende populariteit van een genre" value={ext.cultureleTrends.genrePopulariteit} onChange={v => se('cultureleTrends','genrePopulariteit',v)} rows={2} />
                    <Field label="Nostalgie trends" value={ext.cultureleTrends.nostalgieTrends} onChange={v => se('cultureleTrends','nostalgieTrends',v)} rows={2} />
                    <Field label="DIY cultuur" value={ext.cultureleTrends.diyCultuur} onChange={v => se('cultureleTrends','diyCultuur',v)} rows={2} />
                    <Field label="Authenticiteit vs commercialisering" value={ext.cultureleTrends.authenticiteitVsCommercialisering} onChange={v => se('cultureleTrends','authenticiteitVsCommercialisering',v)} rows={2} />
                  </SubSection>
                </div>
              )}

            </div>
          </div>

          <div className="sticky bottom-0 bg-white border-t border-gray-100 shadow-sm">
            <div className="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
              <button
                onClick={step === 1 ? onBack : prev}
                className="text-sm text-gray-500 hover:text-gray-800 transition-colors"
              >
                ← {step === 1 ? 'Annuleer' : 'Vorige'}
              </button>
              <div className="flex items-center gap-3">
                <button
                  onClick={() => doSave(false)}
                  className="text-sm text-gray-500 border border-gray-200 bg-white px-4 py-2 rounded-lg hover:bg-gray-50 transition-colors"
                >
                  Sla op en sluit
                </button>
                {step < TOTAL ? (
                  <button onClick={next} className="bg-gray-900 text-white text-sm font-medium px-5 py-2.5 rounded-lg hover:bg-gray-700 transition-colors">
                    Volgende →
                  </button>
                ) : (
                  <button onClick={() => doSave(true)} className="bg-gray-900 text-white text-sm font-medium px-5 py-2.5 rounded-lg hover:bg-gray-700 transition-colors">
                    Voltooi analyse →
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Opening Screen ───────────────────────────────────────────────────────
    OpeningScreen.propTypes = {
      analyses: PropTypes.arrayOf(PropTypes.object).isRequired,
      onNew: PropTypes.func.isRequired,
      onImport: PropTypes.func.isRequired,
      onOpen: PropTypes.func.isRequired,
      onDelete: PropTypes.func.isRequired,
      onExport: PropTypes.func.isRequired,
    };

    function OpeningScreen({ analyses, onNew, onImport, onOpen, onDelete, onExport }) {
      const fileRef = useRef();
      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try { onImport(JSON.parse(ev.target.result)); }
          catch { alert('Ongeldig JSON-bestand. Controleer het bestand en probeer opnieuw.'); }
        };
        reader.onerror = () => alert('Kon het bestand niet lezen. Probeer opnieuw.');
        reader.readAsText(file);
        e.target.value = '';
      };

      return (
        <div className="min-h-screen bg-gray-50 fade-in">
          <div className="max-w-2xl mx-auto px-4 py-12">
            <div className="mb-10">
              <h1 className="text-2xl font-bold text-gray-900 tracking-tight">Marketing Analyse</h1>
              <p className="text-sm text-gray-400 mt-1">Opgeslagen analyses</p>
            </div>
            <div className="flex gap-3 mb-8">
              <button onClick={onNew} className="inline-flex items-center gap-2 bg-gray-900 text-white text-sm font-medium px-4 py-2.5 rounded-lg hover:bg-gray-700 transition-colors">
                <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path d="M12 5v14M5 12h14" strokeLinecap="round"/>
                </svg>
                Nieuwe analyse
              </button>
              <button onClick={() => fileRef.current.click()} className="inline-flex items-center gap-2 bg-white border border-gray-200 text-gray-700 text-sm font-medium px-4 py-2.5 rounded-lg hover:bg-gray-50 transition-colors">
                <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" strokeLinecap="round"/>
                  <polyline points="17 8 12 3 7 8" strokeLinecap="round" strokeLinejoin="round"/>
                  <line x1="12" y1="3" x2="12" y2="15" strokeLinecap="round"/>
                </svg>
                Importeer JSON
              </button>
              <input ref={fileRef} type="file" accept=".json" onChange={handleFileChange} className="hidden" />
            </div>

            {analyses.length === 0 ? (
              <div className="text-center py-20 text-gray-300">
                <svg className="mx-auto mb-3 opacity-30" width="40" height="40" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                  <path d="M9 12h6M9 16h6M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                <p className="text-sm">Geen analyses gevonden. Start een nieuwe analyse.</p>
              </div>
            ) : (
              <div className="space-y-2">
                {analyses.map(a => (
                  <div
                    key={a.id}
                    onClick={() => onOpen(a)}
                    onKeyDown={e => (e.key === 'Enter' || e.key === ' ') && onOpen(a)}
                    role="button"
                    tabIndex={0}
                    aria-label={`Open analyse: ${a.klantnaam || 'Naamloos'}`}
                    className="group bg-white border border-gray-100 rounded-xl px-5 py-4 flex items-center justify-between cursor-pointer hover:border-gray-300 hover:shadow-sm transition-all"
                  >
                    <div>
                      <p className="text-sm font-semibold text-gray-900">{a.klantnaam || 'Naamloos'}</p>
                      <p className="text-xs text-gray-400 mt-0.5">{formatDate(a.datum)}</p>
                    </div>
                    <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                      <button
                        onClick={e => { e.stopPropagation(); onExport(a); }}
                        aria-label={`Exporteer analyse: ${a.klantnaam || 'Naamloos'}`}
                        className="text-xs text-gray-400 hover:text-gray-700 px-2.5 py-1.5 rounded-md hover:bg-gray-50 transition-colors"
                      >
                        Export
                      </button>
                      <button
                        onClick={e => { e.stopPropagation(); onDelete(a.id); }}
                        aria-label={`Verwijder analyse: ${a.klantnaam || 'Naamloos'}`}
                        className="text-xs text-gray-400 hover:text-red-500 px-2.5 py-1.5 rounded-md hover:bg-red-50 transition-colors"
                      >
                        Verwijder
                      </button>
                      <span className="text-gray-300 ml-1" aria-hidden="true">→</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── App root ─────────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState('home'); // 'home' | 'dashboard' | 'form'
      const [viewing, setViewing] = useState(null);
      const [editing, setEditing] = useState(null);
      const [apiKey, setApiKeyState] = useState(() => localStorage.getItem('ma_apikey') || '');
      const [analyses, setAnalyses] = useState(() => {
        try { return JSON.parse(localStorage.getItem('ma_analyses') || '[]'); }
        catch { return []; }
      });

      const persist = (list) => {
        try {
          localStorage.setItem('ma_analyses', JSON.stringify(list));
        } catch (e) {
          console.warn('Analyses konden niet worden opgeslagen (localStorage):', e);
        }
        setAnalyses(list);
      };

      const handleSave = (data, goToDashboard = false) => {
        let saved;
        if (editing) {
          saved = { ...data, id: editing.id, datum: editing.datum };
          persist(analyses.map(a => a.id === editing.id ? saved : a));
        } else {
          saved = { ...data, id: generateId(), datum: new Date().toISOString() };
          persist([saved, ...analyses]);
        }
        if (viewing || goToDashboard) {
          setViewing(saved);
          setScreen('dashboard');
        } else {
          setScreen('home');
        }
        setEditing(null);
      };

      const handleSetApiKey = (key) => {
        localStorage.setItem('ma_apikey', key);
        setApiKeyState(key);
      };

      const handleUpdate = (updated) => {
        const newList = analyses.map(a => a.id === updated.id ? updated : a);
        persist(newList);
        setViewing(updated);
      };

      const handleDelete = (id) => {
        if (window.confirm('Deze analyse verwijderen?')) {
          persist(analyses.filter(a => a.id !== id));
        }
      };

      const handleImport = (raw) => {
        const items = Array.isArray(raw) ? raw : [raw];
        const newItems = items.map(d => ({
          ...migrateAnalysis(d),
          id: generateId(),
          datum: d.datum || new Date().toISOString(),
          klantnaam: d.klantnaam || 'Geïmporteerd',
        }));
        persist([...newItems, ...analyses]);
      };

      if (screen === 'dashboard' && viewing) {
        return (
          <DashboardScreen
            analysis={viewing}
            onBack={() => { setViewing(null); setScreen('home'); }}
            onEdit={() => { setEditing(viewing); setScreen('form'); }}
            onUpdate={handleUpdate}
            apiKey={apiKey}
            onSetApiKey={handleSetApiKey}
          />
        );
      }

      if (screen === 'form') {
        return (
          <FormScreen
            initial={editing}
            onSave={handleSave}
            onBack={() => {
              if (viewing) { setScreen('dashboard'); }
              else { setScreen('home'); setEditing(null); }
            }}
          />
        );
      }

      return (
        <OpeningScreen
          analyses={analyses}
          onNew={() => { setEditing(null); setViewing(null); setScreen('form'); }}
          onImport={handleImport}
          onOpen={a => { setViewing(a); setScreen('dashboard'); }}
          onDelete={handleDelete}
          onExport={exportAnalysis}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
