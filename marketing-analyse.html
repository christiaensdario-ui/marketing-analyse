<html lang="nl">
<head>
  <meta charset="UTF-8" />

  <title>Marketing Analyse Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo, useId } = React;

    // ─── Data structure ───────────────────────────────────────────────────────
    const emptyFormat = () => ({ count: '', uitleg: '', voorbeelden: '' });
    const emptyCompetitor = () => ({ naam: '', positionering: '', branding: '', content: '', community: '', postsAantal: '', storiesAantal: '', engagementLikes: '', engagementComments: '', engagementShares: '', engagementVolgers: '', differentiatie: '', watDoenZijNiet: '' });
    const emptyTeamlid = () => ({ naam: '', functietitel: '', rol: '', isLeader: false });

    const emptyData = () => ({
      interneAnalyse: {
        organisatie: { labelType: '', geschiedenis: '', teamleden: [], werking: '' },
        merkidentiteit: { visuelIdentiteit: '', toneOfVoice: '', consistentieBranding: '', waardenMissie: '', huidigePositionering: '' },
        kanaalstrategie: { actievePlatformen: '', onderbouwingPerPlatform: '', primairKanaal: '', ontbrekendeKanalen: '' },
        doelgroep: { wieVolgt: '', leeftijdInteresses: '', gedrag: '', engagement: '', communityInteractie: '', gewensteDoelgroep: '', werkelijkeDoelgroep: '' },
        contentanalyse: {
          contentmixTotaal: 20,
          contentmixPromo: 0, contentmixBehindScenes: 0, contentmixCommunity: 0, contentmixStorytelling: 0, contentmixEvents: 0, contentmixMemes: 0,
          formatsFoto: emptyFormat(), formatsVideo: emptyFormat(), formatsReels: emptyFormat(), formatsCarousels: emptyFormat(),
          frequentiePostsAantal: '', frequentieStoriesAantal: '',
          insightsAccess: '', gemiddeldBereik: '', aantalVolgers: '',
          gemiddeldeLikes: '', gemiddeldeComments: '', gemiddeldeShares: '',
        },
        strategischeContent: { positioneringsconsistentie: '', toneOfVoice: '', storytelling: '', emotie: '', doelgroepresonantie: '', formatstrategie: '' },
        communityAnalyse: { interactieComments: '', terugkerendeFans: '', userGeneratedContent: '', dmInteracties: '', communityBetrokkenheid: '', publiefOfCommunity: '' },
        middelen: { budget: '', tijd: '', team: '', netwerk: '', skills: '' },
        swot: { strengths: '', weaknesses: '', opportunities: '', threats: '' },
      },
      externeAnalyse: {
        concurrentieanalyse: [emptyCompetitor()],
        marktSceneAnalyse: { grootteScene: '', populariteitGenre: '', aantalEvents: '', andereLabels: '', marktverzadiging: '' },
        doelgroepgedrag: { ontdekkingMuziek: '', platformgebruik: '', motivatie: '', invloeden: '' },
        cultureleTrends: { genrePopulariteit: '', nostalgieTrends: '', diyCultuur: '', authenticiteitVsCommercialisering: '' },
        samenwerkingen: { potentielePartners: '', gatekeepers: '', bestaandeSamenwerkingen: '', ontbrekendeSamenwerkingen: '' },
      },
    });

    // Migrate old saved data to new structure
    function migrateAnalysis(raw) {
      const base = emptyData();
      const int = raw.interneAnalyse || {};
      const ext = raw.externeAnalyse || {};

      // Migrate formats: string / old-percentage-object → count-based object
      const migrateFormat = (v) => {
        if (!v || typeof v !== 'object') return emptyFormat();
        if (v.count !== undefined) return { count: v.count, uitleg: v.uitleg || '', voorbeelden: v.voorbeelden || '' };
        // Convert old percentage field to count (basis: 30 posts)
        const pct = parseFloat(String(v.percentage || '').replace('%','').replace(',','.'));
        const count = !isNaN(pct) && pct > 0 ? Math.round(pct / 100 * 30) : '';
        return { count, uitleg: v.uitleg || '', voorbeelden: v.voorbeelden || '' };
      };
      const ca = int.contentanalyse || {};
      const toInt = (v) => { const n = parseInt(v, 10); return isNaN(n) ? 0 : n; };
      const migratedCa = {
        ...base.interneAnalyse.contentanalyse,
        ...ca,
        contentmixTotaal: ca.contentmixTotaal || 20,
        contentmixPromo: toInt(ca.contentmixPromo),
        contentmixBehindScenes: toInt(ca.contentmixBehindScenes),
        contentmixCommunity: toInt(ca.contentmixCommunity),
        contentmixStorytelling: toInt(ca.contentmixStorytelling),
        contentmixEvents: toInt(ca.contentmixEvents),
        contentmixMemes: toInt(ca.contentmixMemes),
        formatsFoto: migrateFormat(ca.formatsFoto),
        formatsVideo: migrateFormat(ca.formatsVideo),
        formatsReels: migrateFormat(ca.formatsReels),
        formatsCarousels: migrateFormat(ca.formatsCarousels),
        // Migrate frequency fields (old free-text 'frequentie' is ignored; new numeric fields preserved)
        frequentiePostsAantal: ca.frequentiePostsAantal !== undefined ? ca.frequentiePostsAantal : '',
        frequentieStoriesAantal: ca.frequentieStoriesAantal !== undefined ? ca.frequentieStoriesAantal : '',
        insightsAccess: ca.insightsAccess || '',
        gemiddeldBereik: ca.gemiddeldBereik || '',
        aantalVolgers: ca.aantalVolgers || '',
        // Migrate renamed performance fields
        gemiddeldeLikes: ca.gemiddeldeLikes || ca.performanceLikes || '',
        gemiddeldeComments: ca.gemiddeldeComments || ca.performanceComments || '',
        gemiddeldeShares: ca.gemiddeldeShares || ca.performanceShares || '',
      };

      // Migrate concurrentieanalyse: flat object → array
      let concurrentieanalyse;
      if (Array.isArray(ext.concurrentieanalyse)) {
        concurrentieanalyse = ext.concurrentieanalyse.map(c => ({ ...emptyCompetitor(), ...c }));
      } else if (ext.concurrentieanalyse && typeof ext.concurrentieanalyse === 'object') {
        concurrentieanalyse = [{ ...emptyCompetitor(), ...ext.concurrentieanalyse }];
      } else {
        concurrentieanalyse = [emptyCompetitor()];
      }

      const result = {
        interneAnalyse: {
          ...base.interneAnalyse,
          ...int,
          organisatie: { ...base.interneAnalyse.organisatie, ...(int.organisatie || {}), teamleden: Array.isArray(int.organisatie?.teamleden) ? int.organisatie.teamleden : [] },
          kanaalstrategie: { ...base.interneAnalyse.kanaalstrategie, ...(int.kanaalstrategie || {}) },
          contentanalyse: migratedCa,
        },
        externeAnalyse: {
          ...base.externeAnalyse,
          ...ext,
          concurrentieanalyse,
          samenwerkingen: { ...base.externeAnalyse.samenwerkingen, ...(ext.samenwerkingen || {}) },
        },
      };
      if (raw.personas) result.personas = raw.personas;
      if (raw.aiSwot)   result.aiSwot   = raw.aiSwot;
      return result;
    }

    function deepMerge(target, source) {
      if (!source || typeof source !== 'object') return target;
      const result = { ...target };
      for (const key in source) {
        if (source[key] !== null && typeof source[key] === 'object' && !Array.isArray(source[key]) && typeof target[key] === 'object') {
          result[key] = deepMerge(target[key], source[key]);
        } else if (source[key] !== undefined) {
          result[key] = source[key];
        }
      }
      return result;
    }

    function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    // ─── Score helpers ────────────────────────────────────────────────────────
    function parseEngagementRate(str) {
      if (!str || !String(str).trim()) return null;
      const m = String(str).match(/[\d,.]+/);
      return m ? parseFloat(m[0].replace(',', '.')) : null;
    }

    function engagementRateColor(rate) {
      if (rate === null) return { bg: 'bg-gray-50', text: 'text-gray-500', border: 'border-gray-200', label: null, color: '#9ca3af' };
      if (rate < 2)  return { bg: 'bg-red-50',     text: 'text-red-600',     border: 'border-red-200',     label: 'Laag',      color: '#ef4444' };
      if (rate <= 5) return { bg: 'bg-amber-50',   text: 'text-amber-600',   border: 'border-amber-200',   label: 'Gemiddeld', color: '#f59e0b' };
      return               { bg: 'bg-emerald-50', text: 'text-emerald-600', border: 'border-emerald-200', label: 'Goed',      color: '#10b981' };
    }

    function computeCommunityScore(data) {
      const scoreField = (v) => {
        if (!v || !String(v).trim()) return 0;
        const len = String(v).trim().length;
        if (len < 20) return 0.5;
        if (len < 80) return 1;
        return 1.5;
      };
      const raw =
        scoreField(data.interactieComments) +
        scoreField(data.terugkerendeFans) +
        scoreField(data.userGeneratedContent) +
        scoreField(data.communityBetrokkenheid);
      return Math.min(100, Math.round((raw / 6) * 100));
    }

    function communityScoreColor(pct) {
      if (pct < 40)  return { color: '#ef4444', text: 'text-red-600',     bg: 'bg-red-50',     border: 'border-red-200',     label: 'Laag' };
      if (pct <= 70) return { color: '#f59e0b', text: 'text-amber-600',   bg: 'bg-amber-50',   border: 'border-amber-200',   label: 'Groeiend' };
      return               { color: '#10b981', text: 'text-emerald-600', bg: 'bg-emerald-50', border: 'border-emerald-200', label: 'Sterk' };
    }

    // ─── Engagement rate berekening (uitsluitend automatisch) ────────────────
    function getEngagementRate(ca) {
      if (!ca) return '';
      const toNum = v => parseFloat(String(v || '').replace(/[^\d.,]/g,'').replace(',','.')) || 0;
      const likes    = toNum(ca.gemiddeldeLikes);
      const comments = toNum(ca.gemiddeldeComments);
      const shares   = toNum(ca.gemiddeldeShares);
      if (ca.insightsAccess === 'ja') {
        const bereik = toNum(ca.gemiddeldBereik);
        if (bereik > 0 && (likes + comments + shares) > 0)
          return (((likes + comments + shares) / bereik) * 100).toFixed(2) + '%';
      } else if (ca.insightsAccess === 'nee') {
        const volgers = toNum(ca.aantalVolgers);
        if (volgers > 0 && (likes + comments) > 0)
          return (((likes + comments) / volgers) * 100).toFixed(2) + '%';
      }
      return '';
    }

    function getCompetitorEngagementRate(c) {
      if (!c) return '';
      const toNum = v => parseFloat(String(v || '').replace(/[^\d.,]/g,'').replace(',','.')) || 0;
      const likes    = toNum(c.engagementLikes);
      const comments = toNum(c.engagementComments);
      const volgers  = toNum(c.engagementVolgers);
      if (volgers > 0 && (likes + comments) > 0)
        return (((likes + comments) / volgers) * 100).toFixed(2) + '%';
      return '';
    }

    // ─── Anthropic API ────────────────────────────────────────────────────────
    async function callAnthropicAPI(apiKey, messages, maxTokens = 2000) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: maxTokens, messages }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `API fout ${res.status}`);
      }
      return (await res.json()).content[0].text;
    }

    function parseJson(text) {
      const m = text.match(/\{[\s\S]*\}/);
      if (!m) throw new Error('Geen geldige JSON ontvangen van de API.');
      return JSON.parse(m[0]);
    }

    function buildPersonaPrompt(analysis) {
      const d  = analysis.interneAnalyse?.doelgroep || {};
      const dg = analysis.externeAnalyse?.doelgroepgedrag || {};
      const ks = analysis.interneAnalyse?.kanaalstrategie || {};
      const mk = analysis.interneAnalyse?.merkidentiteit || {};
      const concurrenten = (Array.isArray(analysis.externeAnalyse?.concurrentieanalyse)
        ? analysis.externeAnalyse.concurrentieanalyse : []).map(c => c.naam).filter(Boolean).join(', ') || '—';
      const kloof = !!(d.gewensteDoelgroep && d.werkelijkeDoelgroep &&
        d.gewensteDoelgroep.trim().toLowerCase() !== d.werkelijkeDoelgroep.trim().toLowerCase());

      const personaSchema = `{"naam":"","leeftijd":0,"bio":"","motivaties":"","frustraties":"","mediagebruik":"","koopgedrag":"","quote":"","journey":[{"fase":"Ontdekking","beschrijving":"","voorbeeld":""},{"fase":"Overweging","beschrijving":"","voorbeeld":""},{"fase":"Beslissing","beschrijving":"","voorbeeld":""},{"fase":"Aankoop","beschrijving":"","voorbeeld":""},{"fase":"Terugkeer","beschrijving":"","voorbeeld":""}],"kanaaladvies":[{"platform":"","reden":"","content":"","timing":"","prioriteit":"primair"},{"platform":"","reden":"","content":"","timing":"","prioriteit":"secundair"},{"platform":"","reden":"","content":"","timing":"","prioriteit":"optioneel"}],"doelgroepvergelijking":{"overeenkomsten":"","verschillen":"","conclusie":""}}`;

      return `Genereer ${kloof ? 'vier' : 'drie'} buyer personas voor muziekmerk '${analysis.klantnaam || 'onbekend'}'. Elke persona moet een volledig andere achtergrond, motivatie en gedragsprofiel hebben — geen twee persona's mogen op elkaar lijken.

Analysedata:
Gewenste doelgroep: ${d.gewensteDoelgroep || '—'}
Werkelijke doelgroep: ${d.werkelijkeDoelgroep || '—'}
Leeftijd / interesses: ${d.leeftijdInteresses || '—'}
Gedrag: ${d.gedrag || '—'}
Motivatie / engagement: ${d.engagement || '—'}
Community interactie: ${d.communityInteractie || '—'}
Platformgebruik: ${dg.platformgebruik || '—'}
Beïnvloeders: ${dg.invloeden || '—'}
Motivaties (marktdata): ${dg.motivatie || '—'}
Actieve platformen merk: ${ks.actievePlatformen || '—'}
Merkwaarden / missie: ${mk.waardenMissie || '—'}
Positionering: ${mk.huidigePositionering || '—'}
Concurrenten: ${concurrenten}

Schrijf in het Nederlands. Geef de output UITSLUITEND als geldig JSON, geen extra tekst.

Persona-definities:
- Persona 1 — Kernklant: de persoon die het merk nu al bereikt en bedient. Gebaseerd op de WERKELIJKE doelgroep.
- Persona 2 — Aspirationele klant: de persoon die het merk wil bereiken maar nog niet heeft. Gebaseerd op de GEWENSTE doelgroep.
- Persona 3 — Randgeval: een verrassend segment dat NIET expliciet voorkomt in de doelgroepdata maar logisch voortvloeit uit de combinatie van merkidentiteit, culturele trends en concurrentiedata. Dit is de persona die de gebruiker niet had verwacht.${kloof ? `
- Persona 4 — Conflictpersona: vertegenwoordigt de spanning tussen gewenste doelgroep (${d.gewensteDoelgroep}) en werkelijke doelgroep (${d.werkelijkeDoelgroep}). Dit is iemand die het merk bereikt maar niet wil bereiken, of omgekeerd. Beschrijf de achterliggende spanning in bio en motivaties. Geef in doelgroepvergelijking aan wat dit voor de strategie betekent.` : ''}

Voor elke persona:
- journey: 5 fases (Ontdekking→Overweging→Beslissing→Aankoop→Terugkeer). Beschrijving = wat de persona doet/denkt. Voorbeeld = concreet scenario.
- kanaaladvies: 3 platformen met prioriteit (primair/secundair/optioneel). Reden, content, timing per platform.
- doelgroepvergelijking: vergelijk met de WERKELIJKE doelgroep. Overeenkomsten, verschillen, conclusie.

{"persona1":${personaSchema},"persona2":${personaSchema},"persona3":${personaSchema}${kloof ? `,"persona4":${personaSchema}` : ''}}`;
    }

    function buildSwotPrompt(analysis) {
      const int = analysis.interneAnalyse || {};
      const ext = analysis.externeAnalyse || {};
      const sw  = int.swot || {};
      const mk  = int.merkidentiteit || {};
      const er  = getEngagementRate(int.contentanalyse || {});
      const concNamen = (Array.isArray(ext.concurrentieanalyse) ? ext.concurrentieanalyse : []).map(c => c.naam).filter(Boolean).join(', ') || '—';
      return `Analyseer de volgende data voor muziekmerk '${analysis.klantnaam || 'onbekend'}' en stel een onafhankelijke SWOT op. Vergelijk daarna met de SWOT van de gebruiker en geef maximaal 3 punten met de grootste verschillen.

Analysedata:
- Merkwaarden/missie: ${mk.waardenMissie || '—'}
- Positionering: ${mk.huidigePositionering || '—'}
- Gewenste doelgroep: ${int.doelgroep?.gewensteDoelgroep || '—'}
- Engagement rate: ${er || '—'}
- Budget: ${int.middelen?.budget || '—'}
- Actieve platformen: ${int.kanaalstrategie?.actievePlatformen || '—'}
- Marktverzadiging: ${ext.marktSceneAnalyse?.marktverzadiging || '—'}
- Concurrenten: ${concNamen}
- Culturele trends: ${ext.cultureleTrends?.genrePopulariteit || '—'}

SWOT van de gebruiker:
Strengths: ${sw.strengths || '—'}
Weaknesses: ${sw.weaknesses || '—'}
Opportunities: ${sw.opportunities || '—'}

Schrijf in het Nederlands. Geef de output UITSLUITEND als geldig JSON, geen extra tekst.
Voor "vergelijking": geef maximaal 3 items als array. Elk item heeft:
- "titel": 3-5 woorden die het verschil samenvatten (bijv. "Storytelling anders beoordeeld")
- "tekst": 1-2 zinnen uitleg van het verschil
- "type": "critical" als de AI kritischer is dan de gebruiker, "opportunity" als de AI een kans ziet die de gebruiker niet noemde

{"strengths":"","weaknesses":"","opportunities":"","threats":"","vergelijking":[{"titel":"","tekst":"","type":"critical"}]}`;
    }

    // Parse vergelijking — handles both new array format and legacy string format
    function parseVergelijking(v) {
      if (!v) return [];
      if (Array.isArray(v)) return v;
      // Legacy: plain string, split on dash-prefixed lines
      const items = String(v).split(/\n[-•–]\s*/).map(s => s.replace(/^[-•–]\s*/, '').trim()).filter(Boolean);
      return items.map(raw => {
        const colonIdx = raw.indexOf(':');
        let titel, tekst;
        if (colonIdx > 0 && colonIdx < 60) {
          titel = raw.slice(0, colonIdx).trim();
          tekst  = raw.slice(colonIdx + 1).trim();
        } else {
          const words = raw.split(/\s+/);
          titel = words.slice(0, Math.min(5, words.length)).join(' ');
          tekst  = words.length > 5 ? words.slice(5).join(' ') : raw;
        }
        const lower = raw.toLowerCase();
        const type = ['kans','ziet','mogelijkheid','potentieel','overzie','benut'].some(w => lower.includes(w))
          ? 'opportunity' : 'critical';
        return { titel, tekst, type };
      });
    }

    function exportAnalysis(analysis) {
      const json = JSON.stringify(analysis, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `analyse-${(analysis.klantnaam || 'export').replace(/\s+/g, '-')}-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ─── PDF export ───────────────────────────────────────────────────────────
    function escHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function pdfField(label, value) {
      const v = String(value || '').trim();
      if (!v) return `<div class="f"><div class="fl">${escHtml(label)}</div><span class="em">—</span></div>`;
      return `<div class="f"><div class="fl">${escHtml(label)}</div><div class="fv">${escHtml(v).replace(/\n/g,'<br>')}</div></div>`;
    }
    function exportPDF(analysis) {
      const { interneAnalyse: int, externeAnalyse: ext, klantnaam, datum } = analysis;
      const ca = int.contentanalyse;
      const competitors = Array.isArray(ext.concurrentieanalyse) ? ext.concurrentieanalyse : [ext.concurrentieanalyse || {}];
      const compErVal = (c) => { const l=parseFloat(String(c.engagementLikes||'').replace(',','.'));const cm=parseFloat(String(c.engagementComments||'').replace(',','.'));const v=parseFloat(String(c.engagementVolgers||'').replace(',','.')); return v>0&&(l+cm)>0?((l+cm)/v*100).toFixed(2)+'% (publieke data)':'—'; };
      const compRows = [['Positionering','positionering'],['Branding','branding'],['Content','content'],['Community','community'],['Differentiatie','differentiatie'],['Wat doen zij NIET?','watDoenZijNiet']];
      const compPostsVal = (c) => { const n=Number(c.postsAantal); return n>0?`≈ ${(n/4).toFixed(1).replace('.0','')} per week (${n} in 4 weken)`:'—'; };
      const compStoriesVal = (c) => { const n=Number(c.storiesAantal); return n>0?`≈ ${(n/4).toFixed(1).replace('.0','')} per week (${n} in 4 weken)`:'—'; };
      const compTable = `<table><thead><tr><th></th>${competitors.map((c,i)=>`<th>${escHtml(c.naam||`Concurrent ${i+1}`)}</th>`).join('')}</tr></thead><tbody><tr><td><strong>Posts/week</strong></td>${competitors.map(c=>`<td>${escHtml(compPostsVal(c))}</td>`).join('')}</tr><tr><td><strong>Stories/week</strong></td>${competitors.map(c=>`<td>${escHtml(compStoriesVal(c))}</td>`).join('')}</tr>${compRows.map(([label,key])=>`<tr><td><strong>${label}</strong></td>${competitors.map(c=>`<td>${escHtml(c[key]||'—')}</td>`).join('')}</tr>`).join('')}<tr><td><strong>Engagement (ER)</strong></td>${competitors.map(c=>`<td>${escHtml(compErVal(c))}</td>`).join('')}</tr></tbody></table>`;
      const dateStr = new Date(datum).toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});
      const html = `<!DOCTYPE html><html lang="nl"><head><meta charset="UTF-8"><title>${escHtml(klantnaam||'Analyse')}</title><style>

    function exportJSONFiltered(analysis, sections) {
      const { interneAnalyse: int, externeAnalyse: ext, klantnaam, datum, id, personas, aiSwot } = analysis;
      const result = { klantnaam, datum, id };
      const internMap = { organisatie:'organisatie', merkidentiteit:'merkidentiteit', kanalen:'kanaalstrategie', doelgroep:'doelgroep', content:'contentanalyse', strategie:'strategischeContent', community:'communityAnalyse', middelen:'middelen', swot:'swot' };
      const externMap = { concurrentie:'concurrentieanalyse', samenwerkingen:'samenwerkingen', markt:'marktSceneAnalyse', doelgroepgedrag:'doelgroepgedrag', trends:'cultureleTrends' };
      const internData = {};
      for (const [sid, key] of Object.entries(internMap)) { if (sections.has(sid)) internData[key] = int[key]; }
      const externData = {};
      for (const [sid, key] of Object.entries(externMap)) { if (sections.has(sid)) externData[key] = ext[key]; }
      if (Object.keys(internData).length) result.interneAnalyse = internData;
      if (Object.keys(externData).length) result.externeAnalyse = externData;
      if (sections.has('personas') && personas) result.personas = personas;
      if (sections.has('swot') && aiSwot) result.aiSwot = aiSwot;
      const json = JSON.stringify(result, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `analyse-${(klantnaam||'export').replace(/\s+/g,'-')}-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ─── Insights detection ───────────────────────────────────────────────────
    function detectInsights(analysis) {
      const insights = [];
      const int = analysis.interneAnalyse || {};
      const ext = analysis.externeAnalyse || {};

      // Gedeelde helpers — eenmalig berekend, veilig herbruikbaar
      const budget = (int.middelen?.budget || '').toLowerCase();
      const budgetBeperkt = budget.includes('beperkt') || (() => {
        const m = budget.match(/€\s*([\d.,]+)/);
        if (!m) return false;
        return parseFloat(m[1].replace(/\./g, '').replace(',', '.')) < 500;
      })();
      const erNum = parseEngagementRate(getEngagementRate(int.contentanalyse || {}));
      const commScore = computeCommunityScore(int.communityAnalyse || {});
      const mixKeys = ['contentmixPromo','contentmixBehindScenes','contentmixCommunity','contentmixStorytelling','contentmixEvents','contentmixMemes'];
      const cnts = mixKeys.map(k => Number(int.contentanalyse?.[k]) || 0);
      const mixTot = cnts.reduce((a, b) => a + b, 0);

      // ── 1 — Kanaal mismatch ────────────────────────────────────────────────
      try {
        const doelgroepPlatforms = (
          (ext.doelgroepgedrag?.platformgebruik || '') + ' ' + (int.doelgroep?.gedrag || '')
        ).toLowerCase();
        const actieveKanalen = (int.kanaalstrategie?.actievePlatformen || '').toLowerCase();
        const platforms = ['tiktok','instagram','youtube','twitter','linkedin','facebook','snapchat','spotify','soundcloud','discord','twitch','pinterest','reddit','threads'];
        let found = null;
        for (const p of platforms) {
          if (doelgroepPlatforms.includes(p) && !actieveKanalen.includes(p)) { found = p; break; }
        }
        if (found) insights.push({
          id: 'kanaal-mismatch', type: 'tension', icon: '📱', title: 'Kanaal mismatch',
          text: `Mismatch gedetecteerd: ${found.charAt(0).toUpperCase() + found.slice(1)} wordt gebruikt door je doelgroep maar ontbreekt in je kanaalstrategie.`,
          pages: ['doelgroep','kanaalstrategie']
        });
      } catch (_) {}

      // ── 2 — Promo > 50% EN zwakke emotie / resonantie ─────────────────────
      try {
        const promoPct = mixTot > 0 ? (cnts[0] / mixTot) * 100 : 0;
        const emotie = (int.strategischeContent?.emotie || '').toLowerCase();
        const resonantie = (int.strategischeContent?.doelgroepresonantie || '').toLowerCase();
        const weakWords = ['zwak','laag','beperkt','geen','matig','weinig'];
        const emotieWeak = weakWords.some(w => emotie.includes(w) || resonantie.includes(w));
        if (promoPct > 50 && emotieWeak) insights.push({
          id: 'promo-emotie', type: 'tension', icon: '📢', title: 'Hoge promofocus',
          text: 'Hoge promofocus gecombineerd met lage emotionele resonantie — overweeg meer verbindende contentcategorieën.',
          pages: ['contentanalyse','strategisch']
        });
      } catch (_) {}

      // ── 3 — Community score < 50% EN afstandelijke tone of voice ──────────
      try {
        const tov = (
          (int.merkidentiteit?.toneOfVoice || '') + ' ' + (int.strategischeContent?.toneOfVoice || '')
        ).toLowerCase();
        const isDistant = ['afstandelijk','minimalistisch','formeel'].some(w => tov.includes(w));
        if (commScore < 50 && isDistant) insights.push({
          id: 'tone-community', type: 'tension', icon: '🗣️', title: 'Tone of voice vs. community',
          text: 'Afstandelijke tone of voice correleert met lage community score — overweeg een warmere communicatiestijl.',
          pages: ['community','merkidentiteit']
        });
      } catch (_) {}

      // ── 4 — Beperkt budget EN internationale ambitie ───────────────────────
      try {
        const gwDoelgroep = (int.doelgroep?.gewensteDoelgroep || '').toLowerCase();
        const isInternationaal = ['internationaal','mainstream','europees'].some(w => gwDoelgroep.includes(w));
        if (budgetBeperkt && isInternationaal) insights.push({
          id: 'budget-ambitie', type: 'tension', icon: '💰', title: 'Budget vs. internationale ambitie',
          text: 'Spanningsveld gedetecteerd: internationale ambitie met beperkt budget vereist een gefaseerde aanpak.',
          pages: ['middelen','doelgroep']
        });
      } catch (_) {}

      // ── 5 — Hoge postfrequentie EN lage engagement rate ───────────────────
      try {
        const postsAantal = Number(int.contentanalyse?.frequentiePostsAantal) || 0;
        const hogeFreq = postsAantal > 0 && (postsAantal / 4) > 5;
        if (hogeFreq && erNum !== null && erNum < 5) insights.push({
          id: 'freq-engagement', type: 'urgent', icon: '⚠️', title: 'Frequentie vs. engagement',
          text: 'Hoge postfrequentie met lage engagement — meer posts lossen dit niet op, focus op contentkwaliteit.',
          pages: ['contentanalyse']
        });
      } catch (_) {}

      // ── 6 — Concurrentie gap sluit aan op eigen positionering ─────────────
      try {
        const positionering = (
          (int.merkidentiteit?.huidigePositionering || '') + ' ' + (int.merkidentiteit?.waardenMissie || '')
        ).toLowerCase();
        const concurrenten = Array.isArray(ext.concurrentieanalyse) ? ext.concurrentieanalyse : [];
        const keywords = (positionering.match(/\b[a-z\u00e0-\u024f]{4,}\b/g) || []);
        const gapMatch = positionering.trim() && concurrenten.some(c => {
          const watNiet = (c.watDoenZijNiet || '').toLowerCase();
          return watNiet && keywords.some(kw => watNiet.includes(kw));
        });
        if (gapMatch) insights.push({
          id: 'concurrentie-gap', type: 'opportunity', icon: '🎯', title: 'Strategische positioneringskans',
          text: 'Jouw positionering sluit aan op een gap die concurrenten laten liggen — dit is een strategische kans.',
          pages: ['concurrentie','merkidentiteit']
        });
      } catch (_) {}

      // ── 7 — Weinig UGC EN hoge community score ─────────────────────────────
      try {
        const ugc = (int.communityAnalyse?.userGeneratedContent || '').toLowerCase();
        const ugcLaag = ['zelden','geen','weinig','nauwelijks','niet'].some(w => ugc.includes(w));
        if (ugcLaag && ugc.trim() && commScore > 60) insights.push({
          id: 'ugc-community', type: 'opportunity', icon: '✍️', title: 'UGC potentieel onbenut',
          text: 'Hoge community score maar weinig UGC — stimuleer volgers om zelf content te maken.',
          pages: ['community']
        });
      } catch (_) {}

      // ── 8 — Verzadigde markt EN beperkt budget ────────────────────────────
      try {
        const markt = (ext.marktSceneAnalyse?.marktverzadiging || '').toLowerCase();
        const verzadigd = ['hoge verzadiging','hoog','veel concurrentie','verzadigd','oververzadigd'].some(w => markt.includes(w));
        if (verzadigd && markt.trim() && budgetBeperkt) insights.push({
          id: 'markt-middelen', type: 'urgent', icon: '🔴', title: 'Verzadigde markt, beperkt budget',
          text: 'Verzadigde markt met beperkt budget vereist een zeer scherpe niche-focus.',
          pages: ['markt','middelen']
        });
      } catch (_) {}

      // ── 9 — Groeiende trend ondervertegenwoordigd in contentmix ───────────
      try {
        const TREND_NAMEN = {
          genrePopulariteit: 'stijgende genre-populariteit',
          nostalgieTrends: 'nostalgie-trend',
          diyCultuur: 'DIY-cultuur',
          authenticiteitVsCommercialisering: 'authenticiteit vs commercialisering',
        };
        const trendVelden = [
          { key: 'genrePopulariteit',              value: (ext.cultureleTrends?.genrePopulariteit              || '').toLowerCase() },
          { key: 'nostalgieTrends',                value: (ext.cultureleTrends?.nostalgieTrends                || '').toLowerCase() },
          { key: 'diyCultuur',                     value: (ext.cultureleTrends?.diyCultuur                     || '').toLowerCase() },
          { key: 'authenticiteitVsCommercialisering', value: (ext.cultureleTrends?.authenticiteitVsCommercialisering || '').toLowerCase() },
        ];
        const groeiendeWords = ['groeiend','stijgend','groei','stijgt','toename','opkomst','populairder'];
        const groeiendeVelden = trendVelden.filter(t => t.value.trim() && groeiendeWords.some(w => t.value.includes(w)));
        const hasGroeiend = groeiendeVelden.length > 0;
        const heeftGap = mixTot > 0 && cnts.some(c => (c / mixTot) * 100 < 10);
        if (hasGroeiend && heeftGap) {
          const trendNamen = groeiendeVelden.map(t => TREND_NAMEN[t.key]).join(' en ');
          insights.push({
            id: 'trend-contentmix', type: 'opportunity', icon: '📈', title: 'Groeiende trend onderbenut',
            text: `Groeiende trend gedetecteerd: ${trendNamen} is ondervertegenwoordigd in je contentmix — overweeg dit te benutten.`,
            pages: ['trends','contentanalyse']
          });
        }
      } catch (_) {}

      return insights;
    }

    // ─── Form UI primitives ───────────────────────────────────────────────────
    function Field({ label, hint, value, onChange, rows = 3 }) {
      const id = useId();
      return (
        <div className="mb-4">
          <label htmlFor={id} className="block text-sm font-medium text-gray-700 mb-1">{label}</label>

            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
            rows={rows} value={value} onChange={e => onChange(e.target.value)}
          />
        </div>
      );

      hint: PropTypes.string,
      value: PropTypes.string,
      onChange: PropTypes.func.isRequired,
      rows: PropTypes.number,
    };

          {subtitle && <p className="text-xs text-gray-400 mb-4 pl-6">{subtitle}</p>}

          <div className="border-b border-gray-100 mt-6" />
        </div>
      );
    }
    SubSection.propTypes = {
      letter: PropTypes.string,
      title: PropTypes.string.isRequired,
      subtitle: PropTypes.string,
      children: PropTypes.node,
    };

    function GroupLabel({ label, tooltip }) {
      return (
        <div className="flex items-center gap-1 mt-5 mb-2 pb-1 border-b border-gray-100">
          <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide">{label}</p>
          {tooltip && <Tooltip text={tooltip} />}
        </div>
      );
    }
    GroupLabel.propTypes = { label: PropTypes.string.isRequired, tooltip: PropTypes.string };

    // ─── Dashboard UI primitives ──────────────────────────────────────────────
    function DataRow({ label, value }) {
      const empty = !value || !String(value).trim();
      return (
        <div className="py-3 border-b border-gray-50 last:border-0">
          <p className="text-xs text-gray-400 mb-0.5">{label}</p>

    function DCard({ title, letter, children }) {

            <div className="flex items-baseline gap-2 mb-4 pb-3 border-b border-gray-50">

            </div>

          {children}
        </div>
      );

    DCard.propTypes = {
      title: PropTypes.string,
      letter: PropTypes.string,
      children: PropTypes.node,

    // SWOT 2×2 grid
    const SWOT_QUADS = [
      { key: 'strengths',    label: 'Strengths',    bg: 'bg-emerald-50', border: 'border-emerald-100', text: 'text-emerald-700' },
      { key: 'weaknesses',   label: 'Weaknesses',   bg: 'bg-red-50',     border: 'border-red-100',     text: 'text-red-600'     },
      { key: 'opportunities',label: 'Opportunities', bg: 'bg-blue-50',    border: 'border-blue-100',    text: 'text-blue-700'    },
      { key: 'threats',      label: 'Threats',      bg: 'bg-amber-50',   border: 'border-amber-100',   text: 'text-amber-700'   },
    ];

    function SwotBlock({ swot }) {
      return (
        <div className="grid grid-cols-2 gap-3">
          {SWOT_QUADS.map(q => (
            <div key={q.key} className={`${q.bg} border ${q.border} rounded-xl p-4`}>
              <p className={`text-xs font-bold uppercase tracking-wide mb-2 ${q.text}`}>{q.label}</p>

    function SwotBlockNarrow({ swot }) {
      return (
        <div className="space-y-2">
          {SWOT_QUADS.map(q => (
            <div key={q.key} className={`${q.bg} border ${q.border} rounded-xl p-3`}>
              <p className={`text-xs font-bold uppercase tracking-wide mb-1 ${q.text}`}>{q.label}</p>
              <p className="text-xs text-gray-700 whitespace-pre-wrap leading-relaxed">
                {(swot || {})[q.key] || <span className="text-gray-300 italic">—</span>}
              </p>
            </div>
          ))}

    // Performance metric cards — big numbers, no misleading bars
    function PerformancePanel({ data }) {
      const erStr = getEngagementRate(data);
      const erNum = parseEngagementRate(erStr);
      const erc = erStr ? engagementRateColor(erNum) : engagementRateColor(null);
      const erMissing = !erStr;
      const erNote = data.insightsAccess === 'ja'
        ? 'Berekend via Instagram Insights (bereik).'
        : data.insightsAccess === 'nee'
          ? 'Indicatieve score — berekend op basis van publieke data (volgers).'
          : null;
      const metrics = [
        { label: 'Likes',    value: data.gemiddeldeLikes,    color: '#3b82f6' },
        { label: 'Comments', value: data.gemiddeldeComments, color: '#8b5cf6' },
        { label: 'Shares',   value: data.gemiddeldeShares,   color: '#10b981' },
      ];
      // Parse numeric values for proportional bars — shows engagement type distribution
      // visualization-expert: relative bars make comparisons scannable without reading numbers
      const toN = v => parseFloat(String(v || '0').replace(/[^\d.,]/g, '').replace(',', '.')) || 0;
      const vals = metrics.map(m => toN(m.value));
      const maxVal = Math.max(...vals, 1);
      return (
        <div className="space-y-4">
          <div className="grid grid-cols-3 gap-3">
            {metrics.map((m, i) => (
              <div key={i} className="bg-gray-50 border border-gray-100 rounded-xl p-3 text-center">
                <p className="text-lg font-bold text-gray-900 truncate">{m.value || '—'}</p>
                <p className="text-xs text-gray-400 mt-1 mb-2">{m.label}</p>
                {/* Proportional bar: shows relative distribution of engagement types */}
                <div className="h-1.5 bg-gray-200 rounded-full overflow-hidden">
                  <div className="h-full rounded-full transition-all duration-500"
                    style={{ width: vals[i] > 0 ? `${(vals[i] / maxVal) * 100}%` : '0%', backgroundColor: m.color }} />
                </div>
              </div>
            ))}
          </div>
          <div className={`${erc.bg} border ${erc.border} rounded-xl p-4 flex items-center justify-between`}>
            <div>
              <div className="flex items-center gap-1 mb-1">
                <p className="text-xs font-medium text-gray-500">Engagement rate</p>
                <Tooltip text="Onder 2% = laag, 2–5% = gemiddeld, boven 5% = goed — gebaseerd op industrie benchmark voor sociale media." />
              </div>
              {erMissing
                ? <p className="text-sm text-gray-400 italic">Vul het vereiste veld in om de engagement rate te berekenen.</p>
                : <p className={`text-2xl font-bold ${erc.text}`}>{erStr || '—'}</p>
              }
              {!erMissing && erNote && <p className="text-xs text-gray-400 mt-1 italic">{erNote}</p>}
            </div>
            {!erMissing && erc.label && (
              <span className={`text-xs font-semibold px-2.5 py-1 rounded-full border ${erc.bg} ${erc.text} ${erc.border}`}>
                {erc.label}
              </span>
            )}
          </div>
        </div>
      );
    }

    // ─── Donut chart (SVG, no library) ────────────────────────────────────────
    const CONTENTMIX_COLORS = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#f43f5e','#06b6d4'];
    const CONTENTMIX_LABELS = ['Promo','Behind the scenes','Community','Storytelling','Events','Memes / cultuur'];

    function DonutChart({ data }) {
      const keys = ['contentmixPromo','contentmixBehindScenes','contentmixCommunity','contentmixStorytelling','contentmixEvents','contentmixMemes'];
      const counts = keys.map(k => Math.max(0, Number(data[k]) || 0));
      const total = counts.reduce((a, b) => a + b, 0);

      const R = 52, cx = 70, cy = 70;
      const C = 2 * Math.PI * R;

      if (total === 0) {
        return (
          <div className="flex flex-col items-center gap-4">
            <svg width="140" height="140" viewBox="0 0 140 140">
              <circle cx={cx} cy={cy} r={R} fill="none" stroke="#f3f4f6" strokeWidth="20" />
              <text x={cx} y={cy + 5} textAnchor="middle" fill="#d1d5db" fontSize="11">Geen data</text>
            </svg>
            <p className="text-xs text-gray-300 italic">Vul aantallen in bij de contentmix</p>
          </div>
        );
      }

      let cumFrac = 0;
      const arcs = counts.map((count, i) => {
        const frac = count / total;
        const dashLen = frac * C;
        const gap = C - dashLen;
        const offset = C * 0.25 - cumFrac * C; // rotate to start at top
        cumFrac += frac;
        return { frac, dashLen, gap, offset, color: CONTENTMIX_COLORS[i], label: CONTENTMIX_LABELS[i], count };
      });

      return (
        <div className="flex flex-col items-center gap-5">
          <div className="relative">
            <svg width="140" height="140" viewBox="0 0 140 140">
              <circle cx={cx} cy={cy} r={R} fill="none" stroke="#f3f4f6" strokeWidth="20" />
              {arcs.map((arc, i) => arc.count > 0 && (
                <circle key={i}
                  cx={cx} cy={cy} r={R}
                  fill="none"
                  stroke={arc.color}
                  strokeWidth="20"
                  strokeDasharray={`${arc.dashLen} ${arc.gap}`}
                  strokeDashoffset={arc.offset}
                  strokeLinecap="butt"
                />
              ))}
              <text x={cx} y={cy - 6} textAnchor="middle" fill="#111827" fontSize="18" fontWeight="700">{total}</text>
              <text x={cx} y={cy + 10} textAnchor="middle" fill="#9ca3af" fontSize="10">posts</text>
            </svg>
          </div>
          <div className="w-full space-y-2">
            {arcs.map((arc, i) => {
              if (!arc.count) return null;
              const warn = arc.frac > 0.6;
              return (
                <div key={i} className={`flex items-center gap-2 rounded-lg ${warn ? 'bg-amber-50 px-2 py-1 -mx-2' : ''}`}>
                  <span className="w-2.5 h-2.5 rounded-full shrink-0" style={{ backgroundColor: warn ? '#f59e0b' : arc.color }} />
                  <span className={`text-xs flex-1 truncate ${warn ? 'text-amber-700 font-medium' : 'text-gray-600'}`}>{arc.label}</span>
                  <span className={`text-xs font-semibold ${warn ? 'text-amber-700' : 'text-gray-800'}`}>{arc.count}</span>
                  <span className={`text-xs w-9 text-right ${warn ? 'text-amber-600 font-bold' : 'text-gray-400'}`}>{Math.round(arc.frac * 100)}%</span>
                  {warn && <span className="text-xs text-amber-500" title="Te weinig variatie">⚠</span>}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── Mini donut chart (samenvatting, smaller variant) ─────────────────────
    function MiniDonutChart({ data }) {
      const keys = ['contentmixPromo','contentmixBehindScenes','contentmixCommunity','contentmixStorytelling','contentmixEvents','contentmixMemes'];
      const counts = keys.map(k => Math.max(0, Number(data[k]) || 0));
      const total = counts.reduce((a, b) => a + b, 0);
      if (total === 0) return null;
      const R = 36, cx = 50, cy = 50, C = 2 * Math.PI * R;
      let cumFrac = 0;
      const arcs = counts.map((count, i) => {
        const frac = count / total;
        const dashLen = frac * C;
        const offset = C * 0.25 - cumFrac * C;
        cumFrac += frac;
        return { frac, dashLen, gap: C - dashLen, offset, color: CONTENTMIX_COLORS[i], label: CONTENTMIX_LABELS[i], count };
      });
      return (
        <div className="flex items-center gap-4">
          <div className="shrink-0">
            <svg width="100" height="100" viewBox="0 0 100 100">
              <circle cx={cx} cy={cy} r={R} fill="none" stroke="#f3f4f6" strokeWidth="16" />
              {arcs.map((arc, i) => arc.count > 0 && (
                <circle key={i} cx={cx} cy={cy} r={R} fill="none"
                  stroke={arc.color} strokeWidth="16"
                  strokeDasharray={`${arc.dashLen} ${arc.gap}`}
                  strokeDashoffset={arc.offset} strokeLinecap="butt"
                />
              ))}
            </svg>
          </div>
          <div className="flex-1 space-y-1.5">
            {arcs.filter(a => a.count > 0).map((arc, i) => {
              const warn = arc.frac > 0.6;
              return (
                <div key={i} className="flex items-center gap-1.5">
                  <span className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: warn ? '#f59e0b' : arc.color }} />
                  <span className={`text-xs flex-1 truncate ${warn ? 'text-amber-700 font-medium' : 'text-gray-600'}`}>{arc.label}</span>
                  <span className={`text-xs font-semibold ${warn ? 'text-amber-600' : 'text-gray-500'}`}>{Math.round(arc.frac * 100)}%</span>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── Format bar card (dashboard) ──────────────────────────────────────────
    function FormatBarCard({ label, value, color, totalFormats }) {
      const v = (value && typeof value === 'object') ? value : emptyFormat();
      const count = Math.max(0, Number(v.count) || 0);
      const pctNum = totalFormats > 0 && count > 0 ? Math.round((count / totalFormats) * 100) : 0;
      const hasAny = count > 0 || v.uitleg || v.voorbeelden;
      return (
        <div className="py-3 border-b border-gray-50 last:border-0">
          <div className="flex items-center justify-between mb-1.5">
            <span className="text-xs font-semibold text-gray-700">{label}</span>
            <span className="text-xs font-bold text-gray-800">
              {count > 0 ? `${count} posts · ${pctNum}%` : '—'}
            </span>
          </div>
          <div className="h-2 bg-gray-100 rounded-full overflow-hidden mb-2">
            <div className="h-full rounded-full transition-all duration-500" style={{ width: `${pctNum}%`, backgroundColor: color }} />
          </div>
          {v.uitleg && <p className="text-xs text-gray-500 leading-relaxed mb-1">{v.uitleg}</p>}
          {v.voorbeelden && <p className="text-xs text-gray-400 italic leading-relaxed">{v.voorbeelden}</p>}
          {!hasAny && <p className="text-xs text-gray-300 italic">—</p>}
        </div>
      );
    }

    // Tag chip list (parses comma/newline separated)
    function TagList({ text }) {
      if (!text || !String(text).trim()) return <span className="text-sm text-gray-300 italic">—</span>;
      const tags = String(text).split(/[,\n]+/).map(t => t.trim()).filter(Boolean);
      if (!tags.length) return <span className="text-sm text-gray-300 italic">—</span>;
      return (
        <div className="flex flex-wrap gap-1.5">
          {tags.map((t, i) => (
            <span key={i} className="bg-gray-100 text-gray-600 text-xs px-2.5 py-1 rounded-full">{t}</span>
          ))}
        </div>
      );
    }

    // Middelen resource cards
    function MiddelenGrid({ data }) {
      const items = [
        { label: 'Budget',  value: data.budget,  icon: '💰' },
        { label: 'Tijd',    value: data.tijd,    icon: '⏱' },
        { label: 'Team',    value: data.team,    icon: '👥' },
        { label: 'Netwerk', value: data.netwerk, icon: '🔗' },
        { label: 'Skills',  value: data.skills,  icon: '🛠' },
      ];
      return (
        <div className="grid grid-cols-2 gap-2">
          {items.map((item, i) => (
            <div key={i} className={`bg-gray-50 border border-gray-100 rounded-xl p-3 ${i === 4 ? 'col-span-2' : ''}`}>
              <p className="text-xs text-gray-400 mb-1">{item.icon} {item.label}</p>
              <p className="text-sm text-gray-800 leading-relaxed">{item.value || <span className="text-gray-300 italic">—</span>}</p>
            </div>
          ))}
        </div>
      );
    }

    // ─── Insight card ─────────────────────────────────────────────────────────
    const INSIGHT_COLORS = {
      tension:     { bg: 'bg-orange-50', border: 'border-orange-200', title: 'text-orange-700', text: 'text-orange-800', tag: 'bg-orange-100 text-orange-700', stripe: 'bg-orange-400' },
      opportunity: { bg: 'bg-blue-50',   border: 'border-blue-200',   title: 'text-blue-700',   text: 'text-blue-800',   tag: 'bg-blue-100 text-blue-700',   stripe: 'bg-blue-400'   },
      urgent:      { bg: 'bg-red-50',    border: 'border-red-200',    title: 'text-red-700',    text: 'text-red-800',    tag: 'bg-red-100 text-red-700',    stripe: 'bg-red-500'    },
    };
    // visualization-expert: type labels + left stripe make urgency/type scannable at a glance
    // without needing to read the content — pre-attentive visual encoding via color + position
    const INSIGHT_TYPE_LABELS = { tension: 'Spanningsveld', opportunity: 'Kans', urgent: 'Urgent' };

    function InsightCard({ insight }) {
      const c = INSIGHT_COLORS[insight.type] || INSIGHT_COLORS.opportunity;
      return (
        <div className={`rounded-xl border ${c.border} overflow-hidden flex`}>
          {/* Left color stripe: encodes urgency type pre-attentively via color + thickness */}
          <div className={`w-1 shrink-0 ${c.stripe}`} />
          <div className={`flex-1 p-4 ${c.bg}`}>
            <div className="flex items-start gap-3">
              <span className="text-base shrink-0 mt-0.5" aria-hidden="true">{insight.icon}</span>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-1">
                  <p className={`text-xs font-bold ${c.title}`}>{insight.title}</p>
                  <span className={`text-xs font-semibold px-1.5 py-0.5 rounded-full ml-auto shrink-0 ${c.tag}`}>
                    {INSIGHT_TYPE_LABELS[insight.type] || insight.type}
                  </span>
                </div>
                <p className={`text-xs leading-relaxed ${c.text}`}>{insight.text}</p>
              </div>
            </div>
          </div>
        </div>
      );
    }
    InsightCard.propTypes = {
      insight: PropTypes.shape({
        id: PropTypes.string.isRequired,
        type: PropTypes.oneOf(['tension', 'opportunity', 'urgent']).isRequired,
        icon: PropTypes.string.isRequired,
        title: PropTypes.string.isRequired,
        text: PropTypes.string.isRequired,
        pages: PropTypes.arrayOf(PropTypes.string).isRequired,
      }).isRequired,
    };

    // Herbruikbaar inline inzichten-blok voor subpagina's
    function PageInsights({ insights }) {
      if (!insights || !insights.length) return null;
      return (
        <div className="space-y-2">
          {insights.map(i => <InsightCard key={i.id} insight={i} />)}
        </div>
      );
    }
    PageInsights.propTypes = {
      insights: PropTypes.array,
    };

    function InzichtenBlok({ insights, title = 'Automatische inzichten' }) {
      if (!insights || !insights.length) return null;
      const n = insights.length;
      const countBg = n >= 5 ? 'bg-red-100 text-red-600' : n >= 3 ? 'bg-amber-100 text-amber-600' : 'bg-gray-100 text-gray-500';
      return (
        <DCard>
          <div className="flex items-center justify-between mb-4 pb-3 border-b border-gray-50">
            <h4 className="text-sm font-semibold text-gray-800">{title}</h4>
            <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${countBg}`}>
              {n} {n === 1 ? 'inzicht' : 'inzichten'} gedetecteerd
            </span>
          </div>
          <div className="space-y-3">
            {insights.map(i => <InsightCard key={i.id} insight={i} />)}
          </div>
        </DCard>
      );
    }

    // ─── Org chart (SVG boomstructuur) ───────────────────────────────────────
    function OrgChart({ teamleden, team, rollen, werking }) {
      const [activeIdx, setActiveIdx] = useState(null);
      const descRef = useRef(null);

      // Resolve members: prefer teamleden array, fallback to old text parsing
      let members = [];
      if (Array.isArray(teamleden) && teamleden.some(m => m.naam || m.functietitel)) {
        members = teamleden.filter(m => m.naam || m.functietitel);
      } else if (team) {
        const parsed = String(team).split(/[,\n]+/).map(m => m.trim()).filter(Boolean);
        members = parsed.map((n, i) => ({ naam: n, functietitel: '', rol: '', isLeader: i === 0 }));
      }

      const hasData = members.length > 0 || werking;
      if (!hasData) return <p className="text-sm text-gray-300 italic text-center py-3">—</p>;

      const leaderIdx = members.findIndex(m => m.isLeader);
      const leader = leaderIdx >= 0 ? members[leaderIdx] : members[0];
      const rest = members.filter(m => m !== leader);
      const restCount = rest.length;
      const leaderOrigIdx = members.indexOf(leader);
      const restOrigIdxs = rest.map(m => members.indexOf(m));

      const handleNodeClick = (origIdx) => {
        setActiveIdx(origIdx);
        setTimeout(() => {
          if (descRef.current) descRef.current.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 60);
      };

      // Compact bubbels — scaled via viewBox so ze altijd op pagina passen
      const NW = 90, NH = 42, H_GAP = 6, VGAP = 34, TOP = 8;
      const totalRestW = restCount > 0 ? restCount * NW + Math.max(0, restCount - 1) * H_GAP : 0;
      const svgW = Math.max(NW + 20, totalRestW + 20);
      const cx = svgW / 2;
      const leadX = cx - NW / 2;
      const leadY = TOP;
      const hBarY = leadY + NH + Math.floor(VGAP / 2);
      const restY = leadY + NH + VGAP;
      const restStartX = restCount > 0 ? (svgW - totalRestW) / 2 : 0;
      const treeH = restCount > 0 ? restY + NH + TOP + 4 : leadY + NH + TOP + 4;
      const trunc = (s, max) => !s ? '' : s.length > max ? s.slice(0, max - 1) + '…' : s;

      const hasDescriptions = members.some(m => m.rol);

      return (
        <div>
          {/* SVG organogram — viewBox zorgt dat het altijd past zonder scroll */}
          <svg
            viewBox={`0 0 ${svgW} ${treeH}`}
            width="100%" preserveAspectRatio="xMidYMid meet"
            style={{ display: 'block', overflow: 'visible' }}
          >
            {/* Leader node */}
            {leader && (
              <g onClick={() => handleNodeClick(leaderOrigIdx)} style={{ cursor: 'pointer' }}>
                <rect
                  x={leadX} y={leadY} width={NW} height={NH} rx="8"
                  fill={activeIdx === leaderOrigIdx ? '#1d4ed8' : '#111827'}
                  stroke={activeIdx === leaderOrigIdx ? '#3b82f6' : 'none'}
                  strokeWidth="2"
                />
                {leader.functietitel
                  ? <>
                      <text x={cx} y={leadY + 14} textAnchor="middle" fill="#9ca3af" fontSize="7" fontWeight="700" letterSpacing="0.07em">
                        {trunc(leader.functietitel.toUpperCase(), 14)}
                      </text>
                      <text x={cx} y={leadY + 30} textAnchor="middle" fill="white" fontSize="11" fontWeight="600">
                        {trunc(leader.naam || 'Teamleader', 13)}
                      </text>
                    </>
                  : <text x={cx} y={leadY + 25} textAnchor="middle" fill="white" fontSize="11" fontWeight="600">
                      {trunc(leader.naam || 'Teamleader', 13)}
                    </text>
                }
                <title>{[leader.naam, leader.functietitel].filter(Boolean).join(' · ')}</title>
              </g>
            )}

            {/* Verticale lijn omlaag */}
            {leader && restCount > 0 && (
              <line x1={cx} y1={leadY + NH} x2={cx} y2={hBarY} stroke="#d1d5db" strokeWidth="1.5" />
            )}

            {/* Horizontale balk */}
            {restCount > 1 && (
              <line
                x1={restStartX + NW / 2} y1={hBarY}
                x2={restStartX + (restCount - 1) * (NW + H_GAP) + NW / 2} y2={hBarY}
                stroke="#d1d5db" strokeWidth="1.5"
              />
            )}

            {/* Teamlid bubbels */}
            {rest.map((m, i) => {
              const origIdx = restOrigIdxs[i];
              const nx = restStartX + i * (NW + H_GAP);
              const midX = nx + NW / 2;
              const isActive = activeIdx === origIdx;
              return (
                <g key={i} onClick={() => handleNodeClick(origIdx)} style={{ cursor: 'pointer' }}>
                  <line x1={midX} y1={hBarY} x2={midX} y2={restY} stroke="#d1d5db" strokeWidth="1.5" />
                  <rect
                    x={nx} y={restY} width={NW} height={NH} rx="7"
                    fill={isActive ? '#eff6ff' : 'white'}
                    stroke={isActive ? '#3b82f6' : '#374151'}
                    strokeWidth={isActive ? '2' : '1.5'}
                  />
                  {m.functietitel
                    ? <>
                        <text x={midX} y={restY + 14} textAnchor="middle" fill="#9ca3af" fontSize="7" fontWeight="600" letterSpacing="0.06em">
                          {trunc(m.functietitel.toUpperCase(), 14)}
                        </text>
                        <text x={midX} y={restY + 30} textAnchor="middle" fill="#111827" fontSize="11" fontWeight="500">
                          {trunc(m.naam || '—', 13)}
                        </text>
                      </>
                    : <text x={midX} y={restY + 25} textAnchor="middle" fill="#111827" fontSize="11" fontWeight="500">
                        {trunc(m.naam || '—', 13)}
                      </text>
                  }
                  <title>{[m.naam, m.functietitel].filter(Boolean).join(' · ')}</title>
                </g>
              );
            })}
          </svg>

          {/* Beslissingsproces — aparte stijl, gestippelde lijn, duidelijk onderscheiden */}
          {werking && (
            <div className="flex flex-col items-center mt-1">
              <div className="w-px h-5" style={{ borderLeft: '2px dashed #93c5fd' }} />
              <div className="w-full bg-blue-50 border-2 border-blue-300 rounded-2xl px-4 py-3">
                <div className="flex items-center gap-1.5 mb-1">
                  <span className="text-blue-400 text-sm leading-none">⚙️</span>
                  <p className="text-xs font-bold text-blue-600 uppercase tracking-wide">Beslissingsproces</p>
                </div>
                <p className="text-xs text-gray-700 leading-relaxed">{werking}</p>
              </div>
            </div>
          )}

          {/* Backward compat: old rollen tekst */}
          {rollen && !(Array.isArray(teamleden) && teamleden.length > 0) && (
            <div className="flex flex-col items-center mt-1">
              <div className="w-px h-5" style={{ borderLeft: '2px dashed #d1d5db' }} />
              <div className="w-full bg-gray-50 border border-gray-100 rounded-xl p-3">
                <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Rollen &amp; verantwoordelijkheden</p>
                <p className="text-xs text-gray-600 leading-relaxed">{rollen}</p>
              </div>
            </div>
          )}

          {/* Functiebeschrijvingen sectie — scroll doel bij klik op bubbel */}
          {hasDescriptions && (
            <div ref={descRef} className="mt-4 pt-3 border-t border-gray-100">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Functiebeschrijvingen</p>
              <div className="space-y-2">
                {members.map((m, origIdx) => {
                  if (!m.rol) return null;
                  const isActive = activeIdx === origIdx;
                  return (
                    <div
                      key={origIdx}
                      className={`rounded-xl p-3 border transition-all duration-150 ${
                        isActive ? 'border-blue-400 bg-blue-50 shadow-sm' : 'border-gray-100 bg-white'
                      }`}
                    >
                      <div className="flex items-center gap-2 mb-1 flex-wrap">
                        {m.isLeader && (
                          <span className="text-xs bg-gray-900 text-white px-2 py-0.5 rounded-full shrink-0">Teamleader</span>
                        )}
                        <p className="text-xs font-semibold text-gray-800">{m.naam || '—'}</p>
                        {m.functietitel && <span className="text-xs text-gray-400">· {m.functietitel}</span>}
                      </div>
                      <p className="text-xs text-gray-600 leading-relaxed">{m.rol}</p>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── Team editor (form) ───────────────────────────────────────────────────
    function TeamEditor({ value, onChange }) {
      const MAX = 10;
      const teamleden = Array.isArray(value) ? value : [];

      const add = () => {
        if (teamleden.length >= MAX) return;
        const isFirst = teamleden.length === 0;
        onChange([...teamleden, { ...emptyTeamlid(), isLeader: isFirst }]);
      };

      const remove = (i) => {
        const updated = teamleden.filter((_, idx) => idx !== i);
        // If we removed the leader, assign to first remaining
        if (teamleden[i]?.isLeader && updated.length > 0 && !updated.some(m => m.isLeader)) {
          updated[0] = { ...updated[0], isLeader: true };
        }
        onChange(updated);
      };

      const update = (i, key, val) => {
        onChange(teamleden.map((m, idx) => idx === i ? { ...m, [key]: val } : m));
      };

      const setLeader = (i) => {
        onChange(teamleden.map((m, idx) => ({ ...m, isLeader: idx === i })));
      };

      return (
        <div className="mb-4">
          {teamleden.length === 0 ? (
            <p className="text-sm text-gray-400 italic text-center py-3 mb-3">Nog geen teamleden toegevoegd.</p>
          ) : (
            <div className="space-y-3 mb-3">
              {teamleden.map((m, i) => (
                <div key={i} className={`border rounded-xl p-4 ${m.isLeader ? 'border-gray-800 bg-gray-50' : 'border-gray-100 bg-white'}`}>
                  <div className="flex items-center justify-between mb-3">
                    <span className="text-xs font-semibold text-gray-400 uppercase tracking-wide flex items-center gap-1.5">
                      Teamlid {i + 1}
                      {m.isLeader && <span className="bg-gray-900 text-white text-xs px-2 py-0.5 rounded-full">Teamleader</span>}
                    </span>
                    <button type="button" onClick={() => remove(i)} className="text-xs text-red-400 hover:text-red-600 transition-colors">Verwijder</button>
                  </div>
                  <div className="grid grid-cols-2 gap-3 mb-2">
                    <div>
                      <label className="block text-xs font-medium text-gray-500 mb-1">Naam</label>
                      <input
                        className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
                        value={m.naam}
                        onChange={e => update(i, 'naam', e.target.value)}
                        placeholder="Voornaam Achternaam"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-gray-500 mb-1">Functietitel</label>
                      <input
                        className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
                        value={m.functietitel}
                        onChange={e => update(i, 'functietitel', e.target.value)}
                        placeholder="bijv. Creative Director"
                      />
                    </div>
                  </div>
                  <div className="mb-3">
                    <label className="block text-xs font-medium text-gray-500 mb-1">Rol / verantwoordelijkheid</label>
                    <input
                      className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
                      value={m.rol}
                      onChange={e => update(i, 'rol', e.target.value)}
                      placeholder="Korte beschrijving van de rol"
                    />
                  </div>
                  <label className="flex items-center gap-2 cursor-pointer select-none">
                    <input
                      type="checkbox"
                      checked={!!m.isLeader}
                      onChange={e => { if (e.target.checked) setLeader(i); }}
                      className="accent-gray-800"
                    />
                    <span className="text-sm text-gray-700">Dit is de teamleader</span>
                  </label>
                </div>
              ))}
            </div>
          )}
          {teamleden.length < MAX && (
            <button
              type="button"
              onClick={add}
              className="w-full border border-dashed border-gray-300 rounded-xl py-3 text-sm text-gray-400 hover:border-gray-500 hover:text-gray-600 transition-colors"
            >
              + Voeg teamlid toe
            </button>
          )}
          <p className="text-xs text-gray-400 mt-2">{teamleden.length}/{MAX} teamleden</p>
        </div>
      );
    }

    // ─── Section health score helpers ────────────────────────────────────────
    function computeSectionHealth(values) {
      let positive = 0, total = 0;
      for (const v of values) {
        const b = detectBadge ? detectBadge(v) : null;
        if (b) { total++; if (b.bg === 'bg-emerald-50') positive++; }
      }
      return { positive, total };
    }

    function SectionHealthBadge({ positive, total }) {
      if (total === 0) return null;
      const allPos = positive === total;
      const cls = allPos
        ? 'bg-emerald-50 text-emerald-700 border-emerald-200'
        : positive === 0
          ? 'bg-red-50 text-red-600 border-red-200'
          : 'bg-amber-50 text-amber-700 border-amber-200';
      return (
        <span className={`text-xs font-semibold px-1.5 py-0.5 rounded-full border ml-1 ${cls}`}>
          {positive}/{total}
        </span>
      );
    }

    // ─── Competitor radar score helpers ──────────────────────────────────────
    function scoreTextVeld(text) {
      if (!text || !String(text).trim()) return 1;
      const t = String(text).toLowerCase();
      const pos = ['sterk', 'hoog', 'actief', 'goed', 'uitstekend', 'groot', 'veel', 'consistent', 'professioneel', 'uniek', 'innovatief', 'top', 'stijgend', 'groeiend', 'scherp', 'duidelijk'];
      const neg = ['laag', 'zwak', 'weinig', 'geen', 'beperkt', 'matig', 'nauwelijks', 'slecht', 'afwezig', 'minimaal', 'ontbreekt', 'onduidelijk'];
      const posCount = pos.filter(w => t.includes(w)).length;
      const negCount = neg.filter(w => t.includes(w)).length;
      const net = posCount - negCount;
      if (net >= 2) return 5;
      if (net === 1) return 4;
      if (net === 0 && (posCount > 0 || negCount > 0)) return 3;
      if (net === -1) return 2;
      if (net <= -2) return 1;
      return String(text).trim().length > 10 ? 3 : 1;
    }

    function erToRadarScore(erStr) {
      const n = parseEngagementRate(erStr);
      if (n === null) return 1;
      if (n >= 8) return 5;
      if (n >= 5) return 4;
      if (n >= 2) return 3;
      if (n >= 1) return 2;
      return 1;
    }

    // ─── Concurrentie radar diagram ───────────────────────────────────────────
    function ConcurrentieRadar({ data }) {
      const list = Array.isArray(data) ? data : [data];
      const hasAny = list.some(c => c.naam);
      if (!hasAny) return null;

      const AXES = ['Positionering', 'Content', 'Community', 'Engagement', 'Differentiatie'];
      const N = AXES.length;
      const CX = 120, CY = 115, R = 85;
      const COLORS = ['#3b82f6','#8b5cf6','#10b981','#f59e0b','#f43f5e'];

      const angleFor = i => ((i * 360 / N) - 90) * Math.PI / 180;
      const pt = (i, r) => ({
        x: +(CX + r * Math.cos(angleFor(i))).toFixed(2),
        y: +(CY + r * Math.sin(angleFor(i))).toFixed(2),
      });

      const scores = list.map(c => [
        scoreTextVeld(c.positionering),
        scoreTextVeld(c.content),
        scoreTextVeld(c.community),
        erToRadarScore(getCompetitorEngagementRate(c)),
        scoreTextVeld(c.differentiatie),
      ]);

      const svgW = CX * 2 + 10;
      const svgH = CY * 2 + 15;

      return (
        <div className="mb-6">
          <div className="flex justify-center overflow-x-auto">
            <svg width={svgW} height={svgH} viewBox={`0 0 ${svgW} ${svgH}`}>
              {/* Grid pentagons */}
              {[1,2,3,4,5].map(level => {
                const r = (level / 5) * R;
                const pts = Array.from({length: N}, (_, i) => `${pt(i, r).x},${pt(i, r).y}`).join(' ');
                return <polygon key={level} points={pts} fill="none" stroke={level === 5 ? '#e5e7eb' : '#f3f4f6'} strokeWidth="1" />;
              })}
              {/* Axis lines */}
              {Array.from({length: N}, (_, i) => {
                const p = pt(i, R);
                return <line key={i} x1={CX} y1={CY} x2={p.x} y2={p.y} stroke="#e5e7eb" strokeWidth="1" />;
              })}
              {/* Axis labels */}
              {Array.from({length: N}, (_, i) => {
                const p = pt(i, R + 14);
                const xOff = Math.abs(p.x - CX) < 8 ? 'middle' : p.x < CX ? 'end' : 'start';
                return (
                  <text key={i} x={p.x} y={p.y} textAnchor={xOff} dominantBaseline="middle"
                    fill="#6b7280" fontSize="9" fontWeight="500">
                    {AXES[i]}
                  </text>
                );
              })}
              {/* Competitor polygons */}
              {scores.map((score, ci) => {
                const pts = score.map((s, i) => { const p = pt(i, (s / 5) * R); return `${p.x},${p.y}`; }).join(' ');
                const color = COLORS[ci % COLORS.length];
                return (
                  <polygon key={ci} points={pts}
                    fill={color} fillOpacity="0.12"
                    stroke={color} strokeWidth="2" strokeOpacity="0.85"
                  />
                );
              })}
            </svg>
          </div>
          {/* Legend */}
          <div className="flex flex-wrap gap-3 justify-center mt-2">
            {list.filter(c => c.naam).map((c, i) => (
              <div key={i} className="flex items-center gap-1.5">
                <span className="w-3 h-3 rounded-full shrink-0" style={{ backgroundColor: COLORS[i % COLORS.length] }} />
                <span className="text-xs text-gray-600">{c.naam}</span>
              </div>
            ))}
          </div>
          <p className="text-xs text-gray-400 text-center mt-1.5 italic">Scores op basis van sleutelwoorden in tekstvelden (1–5). Engagement berekend via likes + comments / volgers.</p>
        </div>
      );
    }

    // ─── Badge detection & icon cards ────────────────────────────────────────
    const _cap = s => s.charAt(0).toUpperCase() + s.slice(1);
    const BADGE_RULES = [
      { words: ['sterk', 'consistent', 'goed', 'hoog'],  bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-200' },
      { words: ['matig', 'gemengd', 'beperkt'],          bg: 'bg-amber-50',   text: 'text-amber-700',   border: 'border-amber-200'   },
      { words: ['zwak', 'inconsistent', 'laag', 'geen'], bg: 'bg-red-50',     text: 'text-red-600',     border: 'border-red-200'     },

      if (!text || !String(text).trim()) return null;
      const t = String(text).toLowerCase();
      for (const rule of BADGE_RULES) {
        for (const { re, word } of rule.patterns) {
          if (re.test(t)) return { bg: rule.bg, text: rule.text, border: rule.border, label: _cap(word) };
        }

      return null;
    }

    function CommunityMeter({ data }) {
      // Arc gauge replaces linear bar — visualization-expert: arc/gauge communicates
      // "position on a bounded scale" more intuitively than a bar for KPI health scores.
      // Zone boundaries at 40% and 70% are shown as tick marks on the arc.
      const pct = computeCommunityScore(data);
      const label = pct < 25 ? 'Publiek' : pct < 50 ? 'Emerging community' : pct < 75 ? 'Actieve community' : 'Echte community';
      const color = pct < 40 ? '#ef4444' : pct <= 70 ? '#f59e0b' : '#10b981';

      // SVG arc geometry: semi-circle from left (180°) to right (0°) over the top.
      // Point at angle d°: x = cx + R·cos(d°), y = cy − R·sin(d°)  (−sin because SVG y goes down).
      // sweep-flag=0 (CCW in SVG screen coords) draws the upper semi-circle.
      const R = 50, cx = 80, cy = 78;
      const toRad = d => d * Math.PI / 180;
      const px = d => +(cx + R * Math.cos(toRad(d))).toFixed(2);
      const py = d => +(cy - R * Math.sin(toRad(d))).toFixed(2);
      const lx = px(180), ly = py(180);   // left start (180°)
      const rx = px(0),   ry = py(0);     // right end (0°)
      const fa = 180 - (pct / 100) * 180; // fill angle
      const fx = px(fa),  fy = py(fa);    // fill endpoint

      // Tick marks at zone boundaries: 40% → angle 108°, 70% → angle 54°
      const tk = (d, r) => ({ x: +(cx + r * Math.cos(toRad(d))).toFixed(2), y: +(cy - r * Math.sin(toRad(d))).toFixed(2) });
      const t40i = tk(108, R-6), t40o = tk(108, R+6);
      const t70i = tk(54,  R-6), t70o = tk(54,  R+6);

      return (
        <div className="bg-white border border-gray-100 rounded-xl p-5 shadow-sm">
          <div className="flex items-center gap-1 mb-3">
            <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Community score</p>
            <Tooltip text="Onder 40% = publiek, 40–70% = actieve community, boven 70% = echte community — score gebaseerd op interactie in comments, terugkerende fans, UGC en betrokkenheid." />
          </div>
          <div className="flex justify-center">
            <svg width="160" height="96" viewBox="0 0 160 96">
              {/* Background track: full upper semi-circle */}
              <path d={`M ${lx} ${ly} A ${R} ${R} 0 0 0 ${rx} ${ry}`}
                fill="none" stroke="#f3f4f6" strokeWidth="14" strokeLinecap="butt" />
              {/* Filled arc to current score value */}
              {pct > 0 && (
                <path d={`M ${lx} ${ly} A ${R} ${R} 0 0 0 ${fx} ${fy}`}
                  fill="none" stroke={color} strokeWidth="14" strokeLinecap="round" />
              )}
              {/* Zone boundary ticks at 40% and 70% */}
              <line x1={t40i.x} y1={t40i.y} x2={t40o.x} y2={t40o.y} stroke="#e5e7eb" strokeWidth="2" />
              <line x1={t70i.x} y1={t70i.y} x2={t70o.x} y2={t70o.y} stroke="#e5e7eb" strokeWidth="2" />
              {/* Score text centered inside the gauge */}
              <text x={cx} y={cy - 5} textAnchor="middle" fill="#111827" fontSize="24" fontWeight="800">{pct}%</text>
              <text x={cx} y={cy + 9} textAnchor="middle" fill={color} fontSize="8.5" fontWeight="700" letterSpacing="0.5">{label.toUpperCase()}</text>
              {/* Edge labels */}
              <text x={lx + 3} y={ly + 13} textAnchor="start" fill="#d1d5db" fontSize="7">0</text>
              <text x={rx - 3} y={ry + 13} textAnchor="end" fill="#d1d5db" fontSize="7">100</text>
            </svg>
          </div>
          <p className="text-xs text-gray-400 mt-1 italic text-center">
            Interactie · Terugkerende fans · UGC · Betrokkenheid
          </p>
        </div>
      );
    }

                            );
