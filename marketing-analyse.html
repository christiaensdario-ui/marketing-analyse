    function DashboardScreen({ analysis, onBack, onEdit }) {
      const [mainTab, setMainTab] = useState('samenvatting');
      const [interneTab, setInterneTab] = useState('organisatie');
      const [externeTab, setExterneTab] = useState('concurrentie');
      const [showExportMenu, setShowExportMenu] = useState(false);
      const exportMenuRef = useRef();
      const { interneAnalyse: int, externeAnalyse: ext } = analysis;
      const insights = detectInsights(analysis);

      useEffect(() => {
        if (!showExportMenu) return;
        const handler = (e) => { if (!exportMenuRef.current?.contains(e.target)) setShowExportMenu(false); };
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, [showExportMenu]);

      const handleMainTab = (tab) => {
        setMainTab(tab);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const renderInternePage = () => {
        const pi = (id) => insights.filter(i => i.pages.includes(id));
        switch (interneTab) {
          case 'organisatie':     return <PageOrganisatie data={int.organisatie} />;
          case 'merkidentiteit':  return <PageMerkidentiteit data={int.merkidentiteit} insights={pi('merkidentiteit')} />;
          case 'kanaalstrategie': return <PageKanaalstrategie data={int.kanaalstrategie || {}} insights={pi('kanaalstrategie')} />;
          case 'doelgroep':       return <PageDoelgroep data={int.doelgroep} insights={pi('doelgroep')} />;
          case 'contentanalyse':  return <PageContentanalyse data={int.contentanalyse} insights={pi('contentanalyse')} />;
          case 'strategisch':     return <PageStrategischeContent data={int.strategischeContent} insights={pi('strategisch')} />;
          case 'community':       return <PageCommunity data={int.communityAnalyse} insights={pi('community')} />;
          case 'middelen':        return <PageMiddelen data={int.middelen} insights={pi('middelen')} />;
          case 'swot':            return <PageSwot data={int.swot} />;
          default:                return null;
        }
      };

      const renderExternePage = () => {
        switch (externeTab) {
          case 'concurrentie':    return <PageConcurrentie data={ext.concurrentieanalyse} />;
          case 'samenwerkingen':  return <PageSamenwerkingen data={ext.samenwerkingen || {}} />;
          case 'markt':           return <PageMarkt data={ext.marktSceneAnalyse} />;
          case 'doelgroepgedrag': return <PageDoelgroepgedrag data={ext.doelgroepgedrag} />;
          case 'trends':          return <PageCultureleTrends data={ext.cultureleTrends} />;
          default:                return null;
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 fade-in">
          {/* Header */}
          <div className="bg-white border-b border-gray-100 sticky top-0 z-10">
            <div className="max-w-2xl mx-auto px-4 py-3">
              <div className="flex items-center justify-between gap-3">
                <button
                  onClick={onBack}
                  className="text-sm text-gray-400 hover:text-gray-700 transition-colors flex items-center gap-1 shrink-0"
                >
                  ←
                </button>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-bold text-gray-900 truncate">{analysis.klantnaam || 'Naamloos'}</p>
                  <p className="text-xs text-gray-400">{formatDate(analysis.datum)}</p>
                </div>
                <div className="flex items-center gap-2 shrink-0">
                  {/* Split export button */}
                  <div ref={exportMenuRef} className="relative">
                    <div className="flex items-center border border-gray-200 bg-white rounded-lg overflow-hidden">
                      <button
                        onClick={() => exportPDF(analysis)}
                        className="inline-flex items-center gap-1.5 text-xs text-gray-500 px-3 py-1.5 hover:bg-gray-50 transition-colors border-r border-gray-200"
                      >
                        <svg width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" strokeLinecap="round"/>
                          <polyline points="17 8 12 3 7 8" strokeLinecap="round" strokeLinejoin="round"/>
                          <line x1="12" y1="3" x2="12" y2="15" strokeLinecap="round"/>
                        </svg>
                        PDF
                      </button>
                      <button
                        onClick={() => setShowExportMenu(m => !m)}
                        className="text-gray-400 px-2 py-1.5 hover:bg-gray-50 transition-colors text-xs"
                        aria-label="Meer exportopties"
                      >▾</button>
                    </div>
                    {showExportMenu && (
                      <div className="absolute right-0 top-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg z-50 py-1 min-w-max">
                        <button
                          onClick={() => { exportAnalysis(analysis); setShowExportMenu(false); }}
                          className="w-full text-left text-xs text-gray-600 px-4 py-2 hover:bg-gray-50 transition-colors"
                        >
                          JSON exporteren
                        </button>
                      </div>
                    )}
                  </div>
                  <button
                    onClick={onEdit}
                    className="inline-flex items-center gap-1.5 text-xs bg-gray-900 text-white px-3 py-1.5 rounded-lg hover:bg-gray-700 transition-colors"
                  >
                    <svg width="12" height="12" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" strokeLinecap="round"/>
                      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                    Bewerken
                  </button>
                </div>
              </div>

              {/* Main tabs */}
              <div className="flex gap-1 mt-3">
                {[
                  { id: 'samenvatting', label: 'Samenvatting' },
                  { id: 'interne',      label: 'Interne Analyse' },
                  { id: 'externe',      label: 'Externe Analyse' },
                ].map(t => (
                  <button
                    key={t.id}
                    onClick={() => handleMainTab(t.id)}
                    className={`px-4 py-1.5 rounded-lg text-xs font-semibold transition-colors
                      ${mainTab === t.id ? 'bg-gray-100 text-gray-900' : 'text-gray-400 hover:text-gray-700'}`}
                  >
                    {t.label}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {/* Sub-tab bar — alleen bij interne/externe */}
          {mainTab !== 'samenvatting' && (
            <div className="bg-white border-b border-gray-100">
              <div className="max-w-2xl mx-auto px-4 py-2">
                {mainTab === 'interne'
                  ? <SubTabBar tabs={INTERNE_TABS} active={interneTab} onChange={setInterneTab} />
                  : <SubTabBar tabs={EXTERNE_TABS} active={externeTab} onChange={setExterneTab} />
                }
              </div>
            </div>
          )}

          {/* Content */}
          <div className="max-w-2xl mx-auto px-4 py-6">
            {mainTab === 'samenvatting' ? <PageSamenvatting analysis={analysis} allInsights={insights} /> :
             mainTab === 'interne' ? renderInternePage() : renderExternePage()}
          </div>
        </div>
      );
    }

    // ─── Progress bar ─────────────────────────────────────────────────────────
    function ProgressBar({ step, total }) {
      const labels = ['Interne Analyse', 'Externe Analyse', 'Opslaan'];
      const pct = ((step - 1) / (total - 1)) * 100;
      return (
        <div className="mb-8">
          <div className="flex justify-between mb-3">
            {labels.map((label, i) => {
              const done = i < step - 1;
              const active = i === step - 1;
              return (
                <div key={i} className="flex flex-col items-center gap-1" style={{ flex: 1 }}>
                  <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold transition-colors
                    ${done ? 'bg-gray-800 text-white' : active ? 'bg-gray-900 text-white ring-2 ring-gray-300' : 'bg-gray-100 text-gray-400'}`}>
                    {done ? '✓' : i + 1}
                  </div>
                  <span className={`text-xs text-center leading-tight ${active ? 'text-gray-800 font-medium' : 'text-gray-400'}`}>
                    {label}
                  </span>
                </div>
              );
            })}
          </div>
          <div className="h-1 bg-gray-100 rounded-full">
            <div className="h-1 bg-gray-800 rounded-full transition-all duration-400" style={{ width: `${pct}%` }} />
          </div>
        </div>
      );
    }

    // ─── Format field (3 sub-fields per format) ───────────────────────────────
    function FormatField({ label, value, onChange }) {
      const v = (value && typeof value === 'object') ? value : emptyFormat();
      const set = (key, val) => onChange({ ...v, [key]: val });
      return (
        <div className="mb-4 border border-gray-100 rounded-xl p-4 bg-gray-50">
          <p className="text-sm font-semibold text-gray-700 mb-3">{label}</p>
          <div className="mb-3">
            <label className="block text-xs font-medium text-gray-500 mb-1">Percentage van totale content</label>
            <input
              type="text"
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
              placeholder="bijv. 40%"
              value={v.percentage}
              onChange={e => set('percentage', e.target.value)}
            />
          </div>
          <div className="mb-3">
            <label className="block text-xs font-medium text-gray-500 mb-1">Hoe wordt dit format gebruikt?</label>
            <textarea
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
              rows={2}
              value={v.uitleg}
              onChange={e => set('uitleg', e.target.value)}
            />
          </div>
          <div>
            <label className="block text-xs font-medium text-gray-500 mb-1">Voorbeeldcontent (omschrijving of URL)</label>
            <textarea
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
              rows={2}
              value={v.voorbeelden}
              onChange={e => set('voorbeelden', e.target.value)}
            />
          </div>
        </div>
      );
    }

    // ─── Step 1: Interne Analyse form ─────────────────────────────────────────
    function InterneAnalyseForm({ data, onChange }) {
      const s = (section, key, val) => onChange({ ...data, [section]: { ...data[section], [key]: val } });
      return (
        <div className="fade-in">
          <SubSection letter="A" title="Organisatie / structuur" subtitle="Bepaalt middelen en mogelijkheden.">
            <Field label="Wat voor label / bedrijf is het?" value={data.organisatie.labelType} onChange={v => s('organisatie','labelType',v)} rows={2} />
            <Field label="Geschiedenis van het merk" value={data.organisatie.geschiedenis} onChange={v => s('organisatie','geschiedenis',v)} rows={4} />
            <Field label="Team / leden" value={data.organisatie.team} onChange={v => s('organisatie','team',v)} rows={2} />
            <Field label="Rollen en managementstructuur" value={data.organisatie.rollenManagement} onChange={v => s('organisatie','rollenManagement',v)} rows={2} />
            <Field label="Werking (hoe beslissingen worden genomen)" value={data.organisatie.werking} onChange={v => s('organisatie','werking',v)} rows={2} />
          </SubSection>
          <SubSection letter="B" title="Merkidentiteit">
            <Field label="Visuele identiteit (logo, kleuren, stijl)" value={data.merkidentiteit.visuelIdentiteit} onChange={v => s('merkidentiteit','visuelIdentiteit',v)} rows={2} />
            <Field label="Tone of voice" value={data.merkidentiteit.toneOfVoice} onChange={v => s('merkidentiteit','toneOfVoice',v)} rows={2} />
            <Field label="Consistentie van branding" value={data.merkidentiteit.consistentieBranding} onChange={v => s('merkidentiteit','consistentieBranding',v)} rows={2} />
            <Field label="Waarden en missie" value={data.merkidentiteit.waardenMissie} onChange={v => s('merkidentiteit','waardenMissie',v)} rows={3} />
            <Field label="Huidige positionering" hint="Wat probeert dit merk te zijn?" value={data.merkidentiteit.huidigePositionering} onChange={v => s('merkidentiteit','huidigePositionering',v)} rows={3} />
          </SubSection>
          <SubSection letter="C" title="Kanaalstrategie" subtitle="Op welke kanalen is het merk actief en waarom?">
            <Field label="Actieve platformen" hint="Welke sociale media / kanalen gebruikt het merk?" value={data.kanaalstrategie.actievePlatformen} onChange={v => s('kanaalstrategie','actievePlatformen',v)} rows={2} />
            <Field label="Strategische onderbouwing per platform" hint="Waarom wordt elk platform ingezet? Wat is het doel?" value={data.kanaalstrategie.onderbouwingPerPlatform} onChange={v => s('kanaalstrategie','onderbouwingPerPlatform',v)} rows={4} />
            <Field label="Primair kanaal" hint="Waar zit de meeste focus en energie?" value={data.kanaalstrategie.primairKanaal} onChange={v => s('kanaalstrategie','primairKanaal',v)} rows={2} />
            <Field label="Ontbrekende kanalen" hint="Welke kanalen worden niet gebruikt maar zijn wel relevant?" value={data.kanaalstrategie.ontbrekendeKanalen} onChange={v => s('kanaalstrategie','ontbrekendeKanalen',v)} rows={2} />
          </SubSection>
          <SubSection letter="D" title="Doelgroep (huidige)">
            <Field label="Wie volgt het merk nu?" value={data.doelgroep.wieVolgt} onChange={v => s('doelgroep','wieVolgt',v)} rows={2} />
            <Field label="Leeftijd / interesses" value={data.doelgroep.leeftijdInteresses} onChange={v => s('doelgroep','leeftijdInteresses',v)} rows={2} />
            <Field label="Gedrag" value={data.doelgroep.gedrag} onChange={v => s('doelgroep','gedrag',v)} rows={2} />
            <Field label="Engagement" value={data.doelgroep.engagement} onChange={v => s('doelgroep','engagement',v)} rows={2} />
            <Field label="Community interactie" value={data.doelgroep.communityInteractie} onChange={v => s('doelgroep','communityInteractie',v)} rows={2} />
            <Field label="Gewenste doelgroep" value={data.doelgroep.gewensteDoelgroep} onChange={v => s('doelgroep','gewensteDoelgroep',v)} rows={2} />
            <Field label="Werkelijke doelgroep" value={data.doelgroep.werkelijkeDoelgroep} onChange={v => s('doelgroep','werkelijkeDoelgroep',v)} rows={2} />
          </SubSection>
          <SubSection letter="E" title="Contentanalyse" subtitle="Analyse van bestaande content.">
            <GroupLabel label="Contentmix" />
            {(() => {
              const ca = data.contentanalyse;
              const sc = (key, val) => s('contentanalyse', key, val);
              const mixKeys = ['contentmixPromo','contentmixBehindScenes','contentmixCommunity','contentmixStorytelling','contentmixEvents','contentmixMemes'];
              const mixLabels = ['Promo','Behind the scenes','Community','Storytelling','Events','Memes / cultuur'];
              const werkelijkTotaal = mixKeys.reduce((sum, k) => sum + (Number(ca[k]) || 0), 0);
              return (
                <div>
                  <div className="mb-4">
                    <label className="block text-sm font-medium text-gray-700 mb-1">Aantal geanalyseerde posts</label>
                    <select
                      className="border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
                      value={ca.contentmixTotaal}
                      onChange={e => sc('contentmixTotaal', Number(e.target.value))}
                    >
                      {[10, 20, 30, 50].map(n => <option key={n} value={n}>{n} posts</option>)}
                    </select>
                    {werkelijkTotaal > 0 && werkelijkTotaal !== ca.contentmixTotaal && (
                      <p className="text-xs text-amber-500 mt-1">Totaal van ingevulde aantallen: {werkelijkTotaal} (wordt gebruikt voor percentages)</p>
                    )}
                  </div>
                  <div className="space-y-2">
                    {mixKeys.map((key, i) => {
                      const count = Number(ca[key]) || 0;
                      const pct = werkelijkTotaal > 0 ? Math.round((count / werkelijkTotaal) * 100) : 0;
                      return (
                        <div key={key} className="flex items-center gap-3">
                          <span className="w-2 h-2 rounded-full shrink-0" style={{ backgroundColor: CONTENTMIX_COLORS[i] }} />
                          <label className="text-sm text-gray-700 flex-1">{mixLabels[i]}</label>
                          <input
                            type="number"
                            min="0"
                            className="w-20 border border-gray-200 rounded-lg px-2 py-1.5 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition text-center"
                            value={count === 0 ? '' : count}
                            placeholder="0"
                            onChange={e => sc(key, Math.max(0, parseInt(e.target.value) || 0))}
                          />
                          <span className="text-xs text-gray-400 w-9 text-right">{pct > 0 ? `${pct}%` : '—'}</span>
                        </div>
                      );
                    })}
                  </div>
                  {werkelijkTotaal > 0 && (
                    <p className="text-xs text-gray-400 mt-3">Totaal: {werkelijkTotaal} posts</p>
                  )}
                </div>
              );
            })()}
            <GroupLabel label="Formats" />
            <FormatField label="Foto" value={data.contentanalyse.formatsFoto} onChange={v => s('contentanalyse','formatsFoto',v)} />
            <FormatField label="Video" value={data.contentanalyse.formatsVideo} onChange={v => s('contentanalyse','formatsVideo',v)} />
            <FormatField label="Reels" value={data.contentanalyse.formatsReels} onChange={v => s('contentanalyse','formatsReels',v)} />
            <FormatField label="Carousels" value={data.contentanalyse.formatsCarousels} onChange={v => s('contentanalyse','formatsCarousels',v)} />
            <GroupLabel label="Frequentie" />
            <Field label="Hoe vaak wordt er gepost?" value={data.contentanalyse.frequentie} onChange={v => s('contentanalyse','frequentie',v)} rows={2} />
            <GroupLabel label="Performance (gemiddelden)" />
            <Field label="Gemiddelde likes" value={data.contentanalyse.gemiddeldeLikes} onChange={v => s('contentanalyse','gemiddeldeLikes',v)} rows={2} />
            <Field label="Gemiddelde comments" value={data.contentanalyse.gemiddeldeComments} onChange={v => s('contentanalyse','gemiddeldeComments',v)} rows={2} />
            <Field label="Gemiddelde shares" value={data.contentanalyse.gemiddeldeShares} onChange={v => s('contentanalyse','gemiddeldeShares',v)} rows={2} />
            <Field label="Gemiddelde engagement rate" value={data.contentanalyse.gemiddeldeEngagementRate} onChange={v => s('contentanalyse','gemiddeldeEngagementRate',v)} rows={2} />
          </SubSection>
          <SubSection letter="G" title="Strategische contentanalyse" subtitle="Niet alleen cijfers, maar ook inhoud.">
            <Field label="Positioneringsconsistentie" value={data.strategischeContent.positioneringsconsistentie} onChange={v => s('strategischeContent','positioneringsconsistentie',v)} rows={3} />
            <Field label="Tone of voice" value={data.strategischeContent.toneOfVoice} onChange={v => s('strategischeContent','toneOfVoice',v)} rows={3} />
            <Field label="Storytelling" value={data.strategischeContent.storytelling} onChange={v => s('strategischeContent','storytelling',v)} rows={3} />
            <Field label="Emotie" value={data.strategischeContent.emotie} onChange={v => s('strategischeContent','emotie',v)} rows={3} />
            <Field label="Doelgroepresonantie" value={data.strategischeContent.doelgroepresonantie} onChange={v => s('strategischeContent','doelgroepresonantie',v)} rows={3} />
            <Field label="Formatstrategie" value={data.strategischeContent.formatstrategie} onChange={v => s('strategischeContent','formatstrategie',v)} rows={3} />
          </SubSection>
          <SubSection letter="H" title="Community analyse">
            <Field label="Interactie in comments" value={data.communityAnalyse.interactieComments} onChange={v => s('communityAnalyse','interactieComments',v)} rows={2} />
            <Field label="Terugkerende fans" value={data.communityAnalyse.terugkerendeFans} onChange={v => s('communityAnalyse','terugkerendeFans',v)} rows={2} />
            <Field label="User generated content" value={data.communityAnalyse.userGeneratedContent} onChange={v => s('communityAnalyse','userGeneratedContent',v)} rows={2} />
            <Field label="DM interacties" value={data.communityAnalyse.dmInteracties} onChange={v => s('communityAnalyse','dmInteracties',v)} rows={2} />
            <Field label="Community betrokkenheid" value={data.communityAnalyse.communityBetrokkenheid} onChange={v => s('communityAnalyse','communityBetrokkenheid',v)} rows={2} />
            <Field label="Is dit een publiek of een echte community?" hint="Onderbouw je antwoord." value={data.communityAnalyse.publiefOfCommunity} onChange={v => s('communityAnalyse','publiefOfCommunity',v)} rows={4} />
          </SubSection>
          <SubSection letter="I" title="Middelen (resources)" subtitle="Dit bepaalt wat realistisch is.">
            <Field label="Budget" value={data.middelen.budget} onChange={v => s('middelen','budget',v)} rows={2} />
            <Field label="Tijd" value={data.middelen.tijd} onChange={v => s('middelen','tijd',v)} rows={2} />
            <Field label="Team" value={data.middelen.team} onChange={v => s('middelen','team',v)} rows={2} />
            <Field label="Netwerk" value={data.middelen.netwerk} onChange={v => s('middelen','netwerk',v)} rows={2} />
            <Field label="Skills (design, video, etc.)" value={data.middelen.skills} onChange={v => s('middelen','skills',v)} rows={2} />
          </SubSection>
          <SubSection letter="J" title="SWOT analyse" subtitle="Pas nadat je alles onderzocht hebt.">
            <Field label="Strengths — sterktes van het merk" value={data.swot.strengths} onChange={v => s('swot','strengths',v)} rows={4} />
            <Field label="Weaknesses — interne zwaktes" value={data.swot.weaknesses} onChange={v => s('swot','weaknesses',v)} rows={4} />
            <Field label="Opportunities — externe kansen" value={data.swot.opportunities} onChange={v => s('swot','opportunities',v)} rows={4} />
            <Field label="Threats — externe bedreigingen" value={data.swot.threats} onChange={v => s('swot','threats',v)} rows={4} />
          </SubSection>
        </div>
      );
    }

    // ─── Step 2: Externe Analyse form ─────────────────────────────────────────
    function ExterneAnalyseForm({ data, onChange }) {
      const s = (section, key, val) => onChange({ ...data, [section]: { ...data[section], [key]: val } });

      const concurrenten = Array.isArray(data.concurrentieanalyse) ? data.concurrentieanalyse : [emptyCompetitor()];
      const setConcurrent = (i, key, val) => {
        const updated = concurrenten.map((c, idx) => idx === i ? { ...c, [key]: val } : c);
        onChange({ ...data, concurrentieanalyse: updated });
      };
      const addConcurrent = () => {
        if (concurrenten.length >= 5) return;
        onChange({ ...data, concurrentieanalyse: [...concurrenten, emptyCompetitor()] });
      };
      const removeConcurrent = (i) => {
        if (concurrenten.length <= 1) return;
        onChange({ ...data, concurrentieanalyse: concurrenten.filter((_, idx) => idx !== i) });
      };

      return (
        <div className="fade-in">
          <SubSection letter="A" title="Concurrentieanalyse" subtitle="Voeg tot 5 concurrenten toe.">
            {concurrenten.map((c, i) => (
              <div key={i} className="mb-6 border border-gray-100 rounded-xl p-4 bg-white">
                <div className="flex items-center justify-between mb-3">
                  <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Concurrent {i + 1}</p>
                  {concurrenten.length > 1 && (
                    <button
                      type="button"
                      onClick={() => removeConcurrent(i)}
                      className="text-xs text-red-400 hover:text-red-600 transition-colors"
                    >
                      Verwijder
                    </button>
                  )}
                </div>
                <Field label="Naam concurrent" value={c.naam} onChange={v => setConcurrent(i,'naam',v)} rows={1} />
                <Field label="Positionering" value={c.positionering} onChange={v => setConcurrent(i,'positionering',v)} rows={3} />
                <Field label="Branding" value={c.branding} onChange={v => setConcurrent(i,'branding',v)} rows={3} />
                <Field label="Content" value={c.content} onChange={v => setConcurrent(i,'content',v)} rows={3} />
                <Field label="Community" value={c.community} onChange={v => setConcurrent(i,'community',v)} rows={3} />
                <Field label="Engagement" value={c.engagement} onChange={v => setConcurrent(i,'engagement',v)} rows={3} />
                <Field label="Differentiatie" value={c.differentiatie} onChange={v => setConcurrent(i,'differentiatie',v)} rows={3} />
                <Field label="Wat doen zij NIET?" hint="Daar zit vaak jouw kans." value={c.watDoenZijNiet} onChange={v => setConcurrent(i,'watDoenZijNiet',v)} rows={3} />
              </div>
            ))}
            {concurrenten.length < 5 && (
              <button
                type="button"
                onClick={addConcurrent}
                className="w-full border border-dashed border-gray-200 rounded-xl py-3 text-sm text-gray-400 hover:border-gray-400 hover:text-gray-600 transition-colors"
              >
                + Voeg concurrent toe
              </button>
            )}
          </SubSection>
          <SubSection letter="B" title="Samenwerkingen en netwerk" subtitle="Wie zijn de sleutelfiguren en partners?">
            <Field label="Potentiële partners" hint="Artiesten, labels, merken, media…" value={data.samenwerkingen.potentielePartners} onChange={v => s('samenwerkingen','potentielePartners',v)} rows={3} />
            <Field label="Gatekeepers in de scene" hint="Bloggers, curatoren, booking agents, promotors…" value={data.samenwerkingen.gatekeepers} onChange={v => s('samenwerkingen','gatekeepers',v)} rows={3} />
            <Field label="Bestaande samenwerkingen en resultaten" value={data.samenwerkingen.bestaandeSamenwerkingen} onChange={v => s('samenwerkingen','bestaandeSamenwerkingen',v)} rows={4} />
            <Field label="Ontbrekende samenwerkingen" hint="Welke connecties ontbreken nog?" value={data.samenwerkingen.ontbrekendeSamenwerkingen} onChange={v => s('samenwerkingen','ontbrekendeSamenwerkingen',v)} rows={3} />
          </SubSection>
          <SubSection letter="C" title="Markt / scene analyse">
            <Field label="Grootte van de scene" value={data.marktSceneAnalyse.grootteScene} onChange={v => s('marktSceneAnalyse','grootteScene',v)} rows={2} />
            <Field label="Populariteit van het genre" value={data.marktSceneAnalyse.populariteitGenre} onChange={v => s('marktSceneAnalyse','populariteitGenre',v)} rows={2} />
            <Field label="Aantal events" value={data.marktSceneAnalyse.aantalEvents} onChange={v => s('marktSceneAnalyse','aantalEvents',v)} rows={2} />
            <Field label="Andere labels / collectieven" value={data.marktSceneAnalyse.andereLabels} onChange={v => s('marktSceneAnalyse','andereLabels',v)} rows={2} />
            <Field label="Marktverzadiging" value={data.marktSceneAnalyse.marktverzadiging} onChange={v => s('marktSceneAnalyse','marktverzadiging',v)} rows={2} />
          </SubSection>
          <SubSection letter="D" title="Doelgroepgedrag" subtitle="Niet alleen wie ze zijn, maar hoe ze handelen.">
            <Field label="Hoe ontdekken ze muziek?" value={data.doelgroepgedrag.ontdekkingMuziek} onChange={v => s('doelgroepgedrag','ontdekkingMuziek',v)} rows={3} />
            <Field label="Welke platformen gebruiken ze?" value={data.doelgroepgedrag.platformgebruik} onChange={v => s('doelgroepgedrag','platformgebruik',v)} rows={3} />
            <Field label="Wat motiveert hen?" value={data.doelgroepgedrag.motivatie} onChange={v => s('doelgroepgedrag','motivatie',v)} rows={3} />
            <Field label="Wie beïnvloedt hen?" value={data.doelgroepgedrag.invloeden} onChange={v => s('doelgroepgedrag','invloeden',v)} rows={3} />
          </SubSection>
          <SubSection letter="E" title="Culturele trends" subtitle="Voor muzieklabels zeer belangrijk.">
            <Field label="Stijgende populariteit van een genre" value={data.cultureleTrends.genrePopulariteit} onChange={v => s('cultureleTrends','genrePopulariteit',v)} rows={3} />
            <Field label="Nostalgie trends" value={data.cultureleTrends.nostalgieTrends} onChange={v => s('cultureleTrends','nostalgieTrends',v)} rows={3} />
            <Field label="DIY cultuur" value={data.cultureleTrends.diyCultuur} onChange={v => s('cultureleTrends','diyCultuur',v)} rows={3} />
            <Field label="Authenticiteit vs commercialisering" value={data.cultureleTrends.authenticiteitVsCommercialisering} onChange={v => s('cultureleTrends','authenticiteitVsCommercialisering',v)} rows={3} />
          </SubSection>
        </div>
      );
    }

    // ─── Form Screen ──────────────────────────────────────────────────────────
    function FormScreen({ initial, onSave, onBack }) {
      const TOTAL = 3;
      const [step, setStep] = useState(1);
      const [klantnaam, setKlantnaam] = useState(initial?.klantnaam || '');
      const [data, setData] = useState(() => {
        if (!initial) return emptyData();
        return migrateAnalysis(initial);
      });

      const top = () => window.scrollTo({ top: 0, behavior: 'smooth' });
      const next = () => { setStep(s => s + 1); top(); };
      const prev = () => { setStep(s => s - 1); top(); };

      const handleSave = () => onSave({ ...data, klantnaam: klantnaam.trim() });

      const handleExport = () => exportAnalysis({
        ...data,
        klantnaam: klantnaam.trim() || 'export',
        datum: initial?.datum || new Date().toISOString(),
      });

      return (
        <div className="min-h-screen bg-gray-50">
          <div className="max-w-2xl mx-auto px-4 py-10">
            <button onClick={onBack} className="text-sm text-gray-400 hover:text-gray-700 mb-6 transition-colors inline-flex items-center gap-1">
              ← Terug
            </button>
            <ProgressBar step={step} total={TOTAL} />

            {step === 1 && (
              <>
                <div className="mb-6">
                  <h2 className="text-xl font-bold text-gray-900">1. Interne Brandanalyse</h2>
                  <p className="text-sm text-gray-400 mt-1">Wat het merk intern is en doet.</p>
                </div>
                <InterneAnalyseForm data={data.interneAnalyse} onChange={v => setData(d => ({ ...d, interneAnalyse: v }))} />
              </>
            )}
            {step === 2 && (
              <>
                <div className="mb-6">
                  <h2 className="text-xl font-bold text-gray-900">2. Externe Analyse</h2>
                  <p className="text-sm text-gray-400 mt-1">De omgeving van het merk.</p>
                </div>
                <ExterneAnalyseForm data={data.externeAnalyse} onChange={v => setData(d => ({ ...d, externeAnalyse: v }))} />
              </>
            )}
            {step === 3 && (
              <div className="fade-in">
                <div className="mb-6">
                  <h2 className="text-xl font-bold text-gray-900">Analyse opslaan</h2>
                  <p className="text-sm text-gray-400 mt-1">Geef de analyse een naam.</p>
                </div>
                <div className="bg-white border border-gray-100 rounded-xl p-6 shadow-sm">
                  <label className="block text-sm font-medium text-gray-700 mb-2">Klantnaam</label>
                  <input
                    type="text" autoFocus
                    className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
                    placeholder="bijv. Studio Lumière"
                    value={klantnaam}
                    onChange={e => setKlantnaam(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && klantnaam.trim() && handleSave()}
                  />
                  <p className="text-xs text-gray-400 mt-2">Deze naam verschijnt in het overzicht.</p>
                </div>
              </div>
            )}

            <div className="flex justify-between items-center mt-10 pt-6 border-t border-gray-100">
              <button onClick={step === 1 ? onBack : prev} className="text-sm text-gray-500 hover:text-gray-800 transition-colors">
                ← Vorige
              </button>
              <div className="flex items-center gap-3">
                {step === 3 && (
                  <button onClick={handleExport} className="text-sm text-gray-500 border border-gray-200 bg-white px-4 py-2 rounded-lg hover:bg-gray-50 transition-colors">
                    Exporteer JSON
                  </button>
                )}
                {step < TOTAL ? (
                  <button onClick={next} className="bg-gray-900 text-white text-sm font-medium px-5 py-2.5 rounded-lg hover:bg-gray-700 transition-colors">
                    Volgende →
                  </button>
                ) : (
                  <button onClick={handleSave} disabled={!klantnaam.trim()} className="bg-gray-900 text-white text-sm font-medium px-5 py-2.5 rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                    Opslaan
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Opening Screen ───────────────────────────────────────────────────────
    function OpeningScreen({ analyses, onNew, onImport, onOpen, onDelete, onExport }) {
      const fileRef = useRef();
      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try { onImport(JSON.parse(ev.target.result)); }
          catch { alert('Ongeldig JSON-bestand. Controleer het bestand en probeer opnieuw.'); }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      return (
        <div className="min-h-screen bg-gray-50 fade-in">
          <div className="max-w-2xl mx-auto px-4 py-12">
            <div className="mb-10">
              <h1 className="text-2xl font-bold text-gray-900 tracking-tight">Marketing Analyse</h1>
              <p className="text-sm text-gray-400 mt-1">Opgeslagen analyses</p>
            </div>
            <div className="flex gap-3 mb-8">
              <button onClick={onNew} className="inline-flex items-center gap-2 bg-gray-900 text-white text-sm font-medium px-4 py-2.5 rounded-lg hover:bg-gray-700 transition-colors">
                <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path d="M12 5v14M5 12h14" strokeLinecap="round"/>
                </svg>
                Nieuwe analyse
              </button>
              <button onClick={() => fileRef.current.click()} className="inline-flex items-center gap-2 bg-white border border-gray-200 text-gray-700 text-sm font-medium px-4 py-2.5 rounded-lg hover:bg-gray-50 transition-colors">
                <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" strokeLinecap="round"/>
                  <polyline points="17 8 12 3 7 8" strokeLinecap="round" strokeLinejoin="round"/>
                  <line x1="12" y1="3" x2="12" y2="15" strokeLinecap="round"/>
                </svg>
                Importeer JSON
              </button>
              <input ref={fileRef} type="file" accept=".json" onChange={handleFileChange} className="hidden" />
            </div>

            {analyses.length === 0 ? (
              <div className="text-center py-20 text-gray-300">
                <svg className="mx-auto mb-3 opacity-30" width="40" height="40" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                  <path d="M9 12h6M9 16h6M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                <p className="text-sm">Geen analyses gevonden. Start een nieuwe analyse.</p>
              </div>
            ) : (
              <div className="space-y-2">
                {analyses.map(a => (
                  <div key={a.id} onClick={() => onOpen(a)}
                    className="group bg-white border border-gray-100 rounded-xl px-5 py-4 flex items-center justify-between cursor-pointer hover:border-gray-300 hover:shadow-sm transition-all">
                    <div>
                      <p className="text-sm font-semibold text-gray-900">{a.klantnaam || 'Naamloos'}</p>
                      <p className="text-xs text-gray-400 mt-0.5">{formatDate(a.datum)}</p>
                    </div>
                    <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                      <button onClick={e => { e.stopPropagation(); onExport(a); }}
                        className="text-xs text-gray-400 hover:text-gray-700 px-2.5 py-1.5 rounded-md hover:bg-gray-50 transition-colors">
                        Export
                      </button>
                      <button onClick={e => { e.stopPropagation(); onDelete(a.id); }}
                        className="text-xs text-gray-400 hover:text-red-500 px-2.5 py-1.5 rounded-md hover:bg-red-50 transition-colors">
                        Verwijder
                      </button>
                      <span className="text-gray-300 ml-1">→</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── App root ─────────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState('home'); // 'home' | 'dashboard' | 'form'
      const [viewing, setViewing] = useState(null);
      const [editing, setEditing] = useState(null);
      const [analyses, setAnalyses] = useState(() => {
        try { return JSON.parse(localStorage.getItem('ma_analyses') || '[]'); }
        catch { return []; }
      });

      const persist = (list) => {
        localStorage.setItem('ma_analyses', JSON.stringify(list));
        setAnalyses(list);
      };

      const handleSave = (data) => {
        let saved;
        if (editing) {
          saved = { ...data, id: editing.id, datum: editing.datum };
          persist(analyses.map(a => a.id === editing.id ? saved : a));
        } else {
          saved = { ...data, id: generateId(), datum: new Date().toISOString() };
          persist([saved, ...analyses]);
        }
        // If we came from dashboard, return there with updated data
        if (viewing) {
          setViewing(saved);
          setScreen('dashboard');
        } else {
          setScreen('home');
        }
        setEditing(null);
      };

      const handleDelete = (id) => {
        if (window.confirm('Deze analyse verwijderen?')) {
          persist(analyses.filter(a => a.id !== id));
        }
      };

      const handleImport = (raw) => {
        const items = Array.isArray(raw) ? raw : [raw];
        const newItems = items.map(d => ({
          ...migrateAnalysis(d),
          id: generateId(),
          datum: d.datum || new Date().toISOString(),
          klantnaam: d.klantnaam || 'Geïmporteerd',
        }));
        persist([...newItems, ...analyses]);
      };

      if (screen === 'dashboard' && viewing) {
        return (
          <DashboardScreen
            analysis={viewing}
            onBack={() => { setViewing(null); setScreen('home'); }}
            onEdit={() => { setEditing(viewing); setScreen('form'); }}
          />
        );
      }

      if (screen === 'form') {
        return (
          <FormScreen
            initial={editing}
            onSave={handleSave}
            onBack={() => {
              if (viewing) { setScreen('dashboard'); }
              else { setScreen('home'); setEditing(null); }
            }}
          />
        );
      }

      return (
        <OpeningScreen
          analyses={analyses}
          onNew={() => { setEditing(null); setViewing(null); setScreen('form'); }}
          onImport={handleImport}
          onOpen={a => { setViewing(a); setScreen('dashboard'); }}
          onDelete={handleDelete}
          onExport={exportAnalysis}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
