<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketing Analyse Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    textarea { resize: vertical; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.18s ease-out; }
    * { box-sizing: border-box; }
    .subtab-bar::-webkit-scrollbar { display: none; }
    .subtab-bar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ─── Data structure ───────────────────────────────────────────────────────
    const emptyData = () => ({
      interneAnalyse: {
        organisatie: { labelType: '', geschiedenis: '', team: '', rollenManagement: '', werking: '' },
        merkidentiteit: { visuelIdentiteit: '', toneOfVoice: '', consistentieBranding: '', waardenMissie: '', huidigePositionering: '' },
        doelgroep: { wieVolgt: '', leeftijdInteresses: '', gedrag: '', engagement: '', communityInteractie: '', gewensteDoelgroep: '', werkelijkeDoelgroep: '' },
        contentanalyse: {
          contentmixPromo: '', contentmixBehindScenes: '', contentmixCommunity: '', contentmixStorytelling: '', contentmixEvents: '', contentmixMemes: '',
          formatsFoto: '', formatsVideo: '', formatsReels: '', formatsCarousels: '',
          frequentie: '',
          performanceLikes: '', performanceComments: '', performanceShares: '', performanceEngagementRate: '',
        },
        strategischeContent: { positioneringsconsistentie: '', toneOfVoice: '', storytelling: '', emotie: '', doelgroepresonantie: '', formatstrategie: '' },
        communityAnalyse: { interactieComments: '', terugkerendeFans: '', userGeneratedContent: '', dmInteracties: '', communityBetrokkenheid: '', publiefOfCommunity: '' },
        middelen: { budget: '', tijd: '', team: '', netwerk: '', skills: '' },
        swot: { strengths: '', weaknesses: '', opportunities: '', threats: '' },
      },
      externeAnalyse: {
        concurrentieanalyse: { positionering: '', branding: '', content: '', community: '', engagement: '', differentiatie: '', watDoenZijNiet: '' },
        marktSceneAnalyse: { grootteScene: '', populariteitGenre: '', aantalEvents: '', andereLabels: '', marktverzadiging: '' },
        doelgroepgedrag: { ontdekkingMuziek: '', platformgebruik: '', motivatie: '', invloeden: '' },
        cultureleTrends: { genrePopulariteit: '', nostalgieTrends: '', diyCultuur: '', authenticiteitVsCommercialisering: '' },
        platformAnalyse: { instagramReach: '', tiktokDiscoverability: '', spotifyAlgoritmes: '', youtubeCultuur: '' },
      },
    });

    function deepMerge(target, source) {
      if (!source || typeof source !== 'object') return target;
      const result = { ...target };
      for (const key in source) {
        if (source[key] !== null && typeof source[key] === 'object' && !Array.isArray(source[key]) && typeof target[key] === 'object') {
          result[key] = deepMerge(target[key], source[key]);
        } else if (source[key] !== undefined) {
          result[key] = source[key];
        }
      }
      return result;
    }

    function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('nl-NL', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function exportAnalysis(analysis) {
      const json = JSON.stringify(analysis, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `analyse-${(analysis.klantnaam || 'export').replace(/\s+/g, '-')}-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // ─── Form UI primitives ───────────────────────────────────────────────────
    function Field({ label, hint, value, onChange, rows = 3 }) {
      return (
        <div className="mb-4">
          <label className="block text-sm font-medium text-gray-700 mb-1">{label}</label>
          {hint && <p className="text-xs text-gray-400 mb-1 italic">{hint}</p>}
          <textarea
            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 bg-white focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
            rows={rows} value={value} onChange={e => onChange(e.target.value)}
          />
        </div>
      );
    }

    function SubSection({ letter, title, subtitle, children }) {
      return (
        <div className="mb-8">
          <div className="flex items-baseline gap-2 mb-1">
            <span className="text-xs font-bold text-gray-300 uppercase tracking-widest w-4 shrink-0">{letter}</span>
            <h3 className="text-base font-semibold text-gray-900">{title}</h3>
          </div>
          {subtitle && <p className="text-xs text-gray-400 mb-4 pl-6">{subtitle}</p>}
          <div className="pl-6">{children}</div>
          <div className="border-b border-gray-100 mt-6" />
        </div>
      );
    }

    function GroupLabel({ label }) {
      return <p className="text-xs font-semibold text-gray-500 uppercase tracking-wide mt-5 mb-2 pb-1 border-b border-gray-100">{label}</p>;
    }

    // ─── Dashboard UI primitives ──────────────────────────────────────────────
    function DataRow({ label, value }) {
      const empty = !value || !String(value).trim();
      return (
        <div className="py-3 border-b border-gray-50 last:border-0">
          <p className="text-xs text-gray-400 mb-0.5">{label}</p>
          {empty
            ? <p className="text-sm text-gray-300 italic">—</p>
            : <p className="text-sm text-gray-800 whitespace-pre-wrap leading-relaxed">{value}</p>
          }
        </div>
      );
    }

    function DCard({ title, letter, children }) {
      return (
        <div className="bg-white border border-gray-100 rounded-xl p-5 shadow-sm mb-4">
          {(title || letter) && (
            <div className="flex items-baseline gap-2 mb-4 pb-3 border-b border-gray-50">
              {letter && <span className="text-xs font-bold text-gray-300 uppercase tracking-widest">{letter}</span>}
              {title && <h4 className="text-sm font-semibold text-gray-800">{title}</h4>}
            </div>
          )}
          {children}
        </div>
      );
    }

    // SWOT 2×2 grid
    function SwotBlock({ swot }) {
      const quads = [
        { key: 'strengths',    label: 'Strengths',    bg: 'bg-emerald-50', border: 'border-emerald-100', text: 'text-emerald-700' },
        { key: 'weaknesses',   label: 'Weaknesses',   bg: 'bg-red-50',     border: 'border-red-100',     text: 'text-red-600'     },
        { key: 'opportunities',label: 'Opportunities', bg: 'bg-blue-50',    border: 'border-blue-100',    text: 'text-blue-700'    },
        { key: 'threats',      label: 'Threats',      bg: 'bg-amber-50',   border: 'border-amber-100',   text: 'text-amber-700'   },
      ];
      return (
        <div className="grid grid-cols-2 gap-3">
          {quads.map(q => (
            <div key={q.key} className={`${q.bg} border ${q.border} rounded-xl p-4`}>
              <p className={`text-xs font-bold uppercase tracking-wide mb-2 ${q.text}`}>{q.label}</p>
              <p className="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">
                {swot[q.key] || <span className="text-gray-300 italic">—</span>}
              </p>
            </div>
          ))}
        </div>
      );
    }

    // Performance metric cards + optional bars
    function PerformancePanel({ data }) {
      const metrics = [
        { label: 'Likes',           value: data.performanceLikes },
        { label: 'Comments',        value: data.performanceComments },
        { label: 'Shares',          value: data.performanceShares },
        { label: 'Engagement Rate', value: data.performanceEngagementRate },
      ];
      const extractNum = str => { const m = str && str.match(/[\d,.]+/); return m ? parseFloat(m[0].replace(',', '.')) : null; };
      const nums = metrics.map(m => extractNum(m.value));
      const hasNums = nums.some(n => n !== null);
      const maxNum = hasNums ? Math.max(...nums.filter(n => n !== null), 1) : 1;

      return (
        <div className="space-y-4">
          {metrics.map((m, i) => (
            <div key={i}>
              <div className="flex justify-between items-baseline mb-1.5">
                <span className="text-xs font-medium text-gray-500">{m.label}</span>
                <span className="text-sm font-semibold text-gray-800">{m.value || '—'}</span>
              </div>
              {hasNums && (
                <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                  <div
                    className="h-full bg-gray-700 rounded-full transition-all duration-500"
                    style={{ width: nums[i] !== null ? `${(nums[i] / maxNum) * 100}%` : '0%' }}
                  />
                </div>
              )}
            </div>
          ))}
        </div>
      );
    }

    // Contentmix grid
    function ContentmixGrid({ data }) {
      const items = [
        { label: 'Promo',            value: data.contentmixPromo },
        { label: 'Behind the scenes', value: data.contentmixBehindScenes },
        { label: 'Community',        value: data.contentmixCommunity },
        { label: 'Storytelling',     value: data.contentmixStorytelling },
        { label: 'Events',           value: data.contentmixEvents },
        { label: 'Memes / cultuur',  value: data.contentmixMemes },
      ];
      return (
        <div className="grid grid-cols-2 gap-2">
          {items.map((item, i) => (
            <div key={i} className="bg-gray-50 rounded-lg p-3 border border-gray-100">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">{item.label}</p>
              <p className="text-sm text-gray-700 leading-relaxed">{item.value || <span className="text-gray-300 italic">—</span>}</p>
            </div>
          ))}
        </div>
      );
    }

    // Tag chip list (parses comma/newline separated)
    function TagList({ text }) {
      if (!text || !String(text).trim()) return <span className="text-sm text-gray-300 italic">—</span>;
      const tags = String(text).split(/[,\n]+/).map(t => t.trim()).filter(Boolean);
      if (!tags.length) return <span className="text-sm text-gray-300 italic">—</span>;
      return (
        <div className="flex flex-wrap gap-1.5">
          {tags.map((t, i) => (
            <span key={i} className="bg-gray-100 text-gray-600 text-xs px-2.5 py-1 rounded-full">{t}</span>
          ))}
        </div>
      );
    }

    // Middelen resource cards
    function MiddelenGrid({ data }) {
      const items = [
        { label: 'Budget',  value: data.budget,  icon: '💰' },
        { label: 'Tijd',    value: data.tijd,    icon: '⏱' },
        { label: 'Team',    value: data.team,    icon: '👥' },
        { label: 'Netwerk', value: data.netwerk, icon: '🔗' },
        { label: 'Skills',  value: data.skills,  icon: '🛠' },
      ];
      return (
        <div className="grid grid-cols-2 gap-2">
          {items.map((item, i) => (
            <div key={i} className={`bg-gray-50 border border-gray-100 rounded-xl p-3 ${i === 4 ? 'col-span-2' : ''}`}>
              <p className="text-xs text-gray-400 mb-1">{item.icon} {item.label}</p>
              <p className="text-sm text-gray-800 leading-relaxed">{item.value || <span className="text-gray-300 italic">—</span>}</p>
            </div>
          ))}
        </div>
      );
    }

    // ─── Dashboard sub-pages ──────────────────────────────────────────────────
    function PageOrganisatie({ data }) {
      return (
        <div className="fade-in">
          <DCard letter="A" title="Organisatie / structuur">
            <DataRow label="Wat voor label / bedrijf is het?" value={data.labelType} />
            <DataRow label="Geschiedenis van het merk" value={data.geschiedenis} />
            <DataRow label="Team / leden" value={data.team} />
            <DataRow label="Rollen en managementstructuur" value={data.rollenManagement} />
            <DataRow label="Werking (hoe beslissingen worden genomen)" value={data.werking} />
          </DCard>
        </div>
      );
    }

    function PageMerkidentiteit({ data }) {
      return (
        <div className="fade-in">
          <DCard letter="B" title="Merkidentiteit">
            <DataRow label="Visuele identiteit (logo, kleuren, stijl)" value={data.visuelIdentiteit} />
            <DataRow label="Tone of voice" value={data.toneOfVoice} />
            <DataRow label="Consistentie van branding" value={data.consistentieBranding} />
            <DataRow label="Waarden en missie" value={data.waardenMissie} />
            <DataRow label="Huidige positionering" value={data.huidigePositionering} />
          </DCard>
        </div>
      );
    }

    function PageDoelgroep({ data }) {
      return (
        <div className="fade-in space-y-4">
          <DCard letter="C" title="Doelgroep (huidige)">
            <DataRow label="Wie volgt het merk nu?" value={data.wieVolgt} />
            <DataRow label="Leeftijd / interesses" value={data.leeftijdInteresses} />
            <DataRow label="Gedrag" value={data.gedrag} />
            <DataRow label="Engagement" value={data.engagement} />
            <DataRow label="Community interactie" value={data.communityInteractie} />
          </DCard>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Gewenste doelgroep</p>
              <p className="text-sm text-gray-800 leading-relaxed">{data.gewensteDoelgroep || <span className="text-gray-300 italic">—</span>}</p>
            </div>
            <div className="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
              <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Werkelijke doelgroep</p>
              <p className="text-sm text-gray-800 leading-relaxed">{data.werkelijkeDoelgroep || <span className="text-gray-300 italic">—</span>}</p>
            </div>
          </div>
        </div>
      );
    }

    function PageContentanalyse({ data }) {
      return (
        <div className="fade-in space-y-4">
          <DCard letter="D" title="Contentmix">
            <ContentmixGrid data={data} />
          </DCard>
          <DCard title="Formats">
            <div className="flex flex-wrap gap-2">
              {[
                { label: 'Foto',      value: data.formatsFoto },
                { label: 'Video',     value: data.formatsVideo },
                { label: 'Reels',     value: data.formatsReels },
                { label: 'Carousels', value: data.formatsCarousels },
              ].map((f, i) => (
                <div key={i} className="bg-gray-50 border border-gray-100 rounded-lg px-3 py-2 min-w-[120px] flex-1">
                  <p className="text-xs text-gray-400 mb-1">{f.label}</p>
                  <p className="text-sm text-gray-700">{f.value || <span className="text-gray-300 italic">—</span>}</p>
                </div>
              ))}
            </div>
          </DCard>
          <DCard title="Frequentie">
            <p className="text-sm text-gray-800 leading-relaxed">{data.frequentie || <span className="text-gray-300 italic">—</span>}</p>
          </DCard>
          <DCard title="Performance">
            <PerformancePanel data={data} />
          </DCard>
        </div>
      );
    }

    function PageStrategischeContent({ data }) {
      const items = [
        { label: 'Positioneringsconsistentie', value: data.positioneringsconsistentie },
        { label: 'Tone of voice',              value: data.toneOfVoice },
        { label: 'Storytelling',               value: data.storytelling },
        { label: 'Emotie',                     value: data.emotie },
        { label: 'Doelgroepresonantie',        value: data.doelgroepresonantie },
        { label: 'Formatstrategie',            value: data.formatstrategie },
      ];
      return (
        <div className="fade-in">
          <DCard letter="E" title="Strategische contentanalyse">
            {items.map((item, i) => <DataRow key={i} label={item.label} value={item.value} />)}
          </DCard>
        </div>
      );
    }

    function PageCommunity({ data }) {
      return (
        <div className="fade-in space-y-4">
          <DCard letter="F" title="Community analyse">
            <DataRow label="Interactie in comments" value={data.interactieComments} />
            <DataRow label="DM interacties" value={data.dmInteracties} />
          </DCard>
          <DCard title="Community betrokkenheid">
            <p className="text-xs text-gray-400 mb-2">Terugkerende fans</p>
            <TagList text={data.terugkerendeFans} />
            <p className="text-xs text-gray-400 mt-4 mb-2">User generated content</p>
            <TagList text={data.userGeneratedContent} />
            <p className="text-xs text-gray-400 mt-4 mb-2">Community betrokkenheid</p>
            <TagList text={data.communityBetrokkenheid} />
          </DCard>
          <DCard title="Publiek of echte community?">
            <p className="text-sm text-gray-800 whitespace-pre-wrap leading-relaxed">
              {data.publiefOfCommunity || <span className="text-gray-300 italic">—</span>}
            </p>
          </DCard>
        </div>
      );
    }

    function PageMiddelen({ data }) {
      return (
        <div className="fade-in">
          <DCard letter="G" title="Middelen (resources)">
            <MiddelenGrid data={data} />
          </DCard>
        </div>
      );
    }

    function PageSwot({ data }) {
      return (
        <div className="fade-in">
          <div className="mb-4 flex items-baseline gap-2">
            <span className="text-xs font-bold text-gray-300 uppercase tracking-widest">H</span>
            <h4 className="text-sm font-semibold text-gray-800">SWOT analyse</h4>
          </div>
          <SwotBlock swot={data} />
        </div>
      );
    }

    function PageConcurrentie({ data }) {
      return (
        <div className="fade-in">
          <DCard letter="A" title="Concurrentieanalyse">
            <DataRow label="Positionering" value={data.positionering} />
            <DataRow label="Branding" value={data.branding} />
            <DataRow label="Content" value={data.content} />
            <DataRow label="Community" value={data.community} />
            <DataRow label="Engagement" value={data.engagement} />
            <DataRow label="Differentiatie" value={data.differentiatie} />
          </DCard>
          <DCard title="Wat doen zij NIET?">
            <p className="text-sm text-gray-800 whitespace-pre-wrap leading-relaxed">
              {data.watDoenZijNiet || <span className="text-gray-300 italic">—</span>}
            </p>
          </DCard>
        </div>
      );
    }

    function PageMarkt({ data }) {
      return (
        <div className="fade-in">
          <DCard letter="B" title="Markt / scene analyse">
            <DataRow label="Grootte van de scene" value={data.grootteScene} />
            <DataRow label="Populariteit van het genre" value={data.populariteitGenre} />
            <DataRow label="Aantal events" value={data.aantalEvents} />
            <DataRow label="Andere labels / collectieven" value={data.andereLabels} />
            <DataRow label="Marktverzadiging" value={data.marktverzadiging} />
          </DCard>
        </div>
      );
    }

    function PageDoelgroepgedrag({ data }) {
      return (
        <div className="fade-in">
          <DCard letter="C" title="Doelgroepgedrag">
            <DataRow label="Hoe ontdekken ze muziek?" value={data.ontdekkingMuziek} />
            <DataRow label="Welke platformen gebruiken ze?" value={data.platformgebruik} />
            <DataRow label="Wat motiveert hen?" value={data.motivatie} />
            <DataRow label="Wie beïnvloedt hen?" value={data.invloeden} />
          </DCard>
        </div>
      );
    }

    function PageCultureleTrends({ data }) {
      const items = [
        { label: 'Stijgende populariteit van een genre', value: data.genrePopulariteit },
        { label: 'Nostalgie trends',                     value: data.nostalgieTrends },
        { label: 'DIY cultuur',                          value: data.diyCultuur },
        { label: 'Authenticiteit vs commercialisering',  value: data.authenticiteitVsCommercialisering },
      ];
      return (
        <div className="fade-in">
          <DCard letter="D" title="Culturele trends">
            {items.map((item, i) => <DataRow key={i} label={item.label} value={item.value} />)}
          </DCard>
        </div>
      );
    }

    function PagePlatformen({ data }) {
      const platforms = [
        { label: 'Instagram', sub: 'Reach',           value: data.instagramReach,          icon: '📸' },
        { label: 'TikTok',    sub: 'Discoverability', value: data.tiktokDiscoverability,    icon: '🎵' },
        { label: 'Spotify',   sub: 'Algoritmes',      value: data.spotifyAlgoritmes,        icon: '🎧' },
        { label: 'YouTube',   sub: 'Cultuur',         value: data.youtubeCultuur,           icon: '▶️' },
      ];
      return (
        <div className="fade-in space-y-3">
          <div className="flex items-baseline gap-2 mb-4">
            <span className="text-xs font-bold text-gray-300 uppercase tracking-widest">E</span>
            <h4 className="text-sm font-semibold text-gray-800">Platform analyse</h4>
          </div>
          {platforms.map((p, i) => (
            <div key={i} className="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
              <div className="flex items-center gap-2 mb-2">
                <span className="text-base">{p.icon}</span>
                <p className="text-sm font-semibold text-gray-800">{p.label}</p>
                <span className="text-xs text-gray-400">{p.sub}</span>
              </div>
              <p className="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">
                {p.value || <span className="text-gray-300 italic">—</span>}
              </p>
            </div>
          ))}
        </div>
      );
    }

    // ─── Dashboard Screen ─────────────────────────────────────────────────────
    const INTERNE_TABS = [
      { id: 'organisatie',     label: 'Organisatie',    letter: 'A' },
      { id: 'merkidentiteit',  label: 'Merkidentiteit', letter: 'B' },
      { id: 'doelgroep',       label: 'Doelgroep',      letter: 'C' },
      { id: 'contentanalyse',  label: 'Content',        letter: 'D' },
      { id: 'strategisch',     label: 'Strategie',      letter: 'E' },
      { id: 'community',       label: 'Community',      letter: 'F' },
      { id: 'middelen',        label: 'Middelen',        letter: 'G' },
      { id: 'swot',            label: 'SWOT',           letter: 'H' },
    ];

    const EXTERNE_TABS = [
      { id: 'concurrentie',    label: 'Concurrentie',   letter: 'A' },
      { id: 'markt',           label: 'Markt / Scene',  letter: 'B' },
      { id: 'doelgroepgedrag', label: 'Doelgroepgedrag', letter: 'C' },
      { id: 'trends',          label: 'Trends',         letter: 'D' },
      { id: 'platformen',      label: 'Platformen',     letter: 'E' },
    ];

    function SubTabBar({ tabs, active, onChange }) {
      const ref = useRef();
      useEffect(() => {
        const el = ref.current?.querySelector('[data-active="true"]');
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }, [active]);
      return (
        <div ref={ref} className="subtab-bar flex gap-1 overflow-x-auto pb-1">
          {tabs.map(t => (
            <button
              key={t.id}
              data-active={active === t.id}
              onClick={() => onChange(t.id)}
              className={`whitespace-nowrap flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors flex-shrink-0

    // ─── Progress bar ─────────────────────────────────────────────────────────
    function ProgressBar({ step, total }) {
      const labels = ['Interne Analyse', 'Externe Analyse', 'Opslaan'];
      const pct = ((step - 1) / (total - 1)) * 100;
      return (
        <div className="mb-8">
          <div className="flex justify-between mb-3">
            {labels.map((label, i) => {
              const done = i < step - 1;
              const active = i === step - 1;
              return (
                <div key={i} className="flex flex-col items-center gap-1" style={{ flex: 1 }}>
                  <div className={`w-7 h-7 rounded-full flex items-center justify-center text-xs font-semibold transition-colors
                    ${done ? 'bg-gray-800 text-white' : active ? 'bg-gray-900 text-white ring-2 ring-gray-300' : 'bg-gray-100 text-gray-400'}`}>
                    {done ? '✓' : i + 1}
                  </div>
                  <span className={`text-xs text-center leading-tight ${active ? 'text-gray-800 font-medium' : 'text-gray-400'}`}>
                    {label}
                  </span>
                </div>
              );
            })}
          </div>
          <div className="h-1 bg-gray-100 rounded-full">
            <div className="h-1 bg-gray-800 rounded-full transition-all duration-400" style={{ width: `${pct}%` }} />
          </div>
        </div>
      );
    }

    // ─── Form Screen ──────────────────────────────────────────────────────────
    function FormScreen({ initial, onSave, onBack }) {
      const TOTAL = 3;
      const [step, setStep] = useState(1);
      const [klantnaam, setKlantnaam] = useState(initial?.klantnaam || '');
      const [data, setData] = useState(() => {
        const base = emptyData();
        if (!initial) return base;
        return {
          interneAnalyse: deepMerge(base.interneAnalyse, initial.interneAnalyse),
          externeAnalyse: deepMerge(base.externeAnalyse, initial.externeAnalyse),
        };
      });

      const top = () => window.scrollTo({ top: 0, behavior: 'smooth' });
      const next = () => { setStep(s => s + 1); top(); };
      const prev = () => { setStep(s => s - 1); top(); };

      const handleSave = () => onSave({ ...data, klantnaam: klantnaam.trim() });

      const handleExport = () => exportAnalysis({
        ...data,
        klantnaam: klantnaam.trim() || 'export',
        datum: initial?.datum || new Date().toISOString(),
      });

      return (
        <div className="min-h-screen bg-gray-50">
          <div className="max-w-2xl mx-auto px-4 py-10">
            <button onClick={onBack} className="text-sm text-gray-400 hover:text-gray-700 mb-6 transition-colors inline-flex items-center gap-1">
              ← Terug
            </button>
            <ProgressBar step={step} total={TOTAL} />

            {step === 1 && (
              <>
                <div className="mb-6">
                  <h2 className="text-xl font-bold text-gray-900">1. Interne Brandanalyse</h2>
                  <p className="text-sm text-gray-400 mt-1">Wat het merk intern is en doet.</p>
                </div>
                <InterneAnalyseForm data={data.interneAnalyse} onChange={v => setData(d => ({ ...d, interneAnalyse: v }))} />
              </>
            )}
            {step === 2 && (
              <>
                <div className="mb-6">
                  <h2 className="text-xl font-bold text-gray-900">2. Externe Analyse</h2>
                  <p className="text-sm text-gray-400 mt-1">De omgeving van het merk.</p>
                </div>
                <ExterneAnalyseForm data={data.externeAnalyse} onChange={v => setData(d => ({ ...d, externeAnalyse: v }))} />
              </>
            )}
            {step === 3 && (
              <div className="fade-in">
                <div className="mb-6">
                  <h2 className="text-xl font-bold text-gray-900">Analyse opslaan</h2>
                  <p className="text-sm text-gray-400 mt-1">Geef de analyse een naam.</p>
                </div>
                <div className="bg-white border border-gray-100 rounded-xl p-6 shadow-sm">
                  <label className="block text-sm font-medium text-gray-700 mb-2">Klantnaam</label>
                  <input
                    type="text" autoFocus
                    className="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-300 transition"
                    placeholder="bijv. Studio Lumière"
                    value={klantnaam}
                    onChange={e => setKlantnaam(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && klantnaam.trim() && handleSave()}
                  />
                  <p className="text-xs text-gray-400 mt-2">Deze naam verschijnt in het overzicht.</p>
                </div>
              </div>
            )}

            <div className="flex justify-between items-center mt-10 pt-6 border-t border-gray-100">
              <button onClick={step === 1 ? onBack : prev} className="text-sm text-gray-500 hover:text-gray-800 transition-colors">
                ← Vorige
              </button>
              <div className="flex items-center gap-3">
                {step === 3 && (
                  <button onClick={handleExport} className="text-sm text-gray-500 border border-gray-200 bg-white px-4 py-2 rounded-lg hover:bg-gray-50 transition-colors">
                    Exporteer JSON
                  </button>
                )}
                {step < TOTAL ? (
                  <button onClick={next} className="bg-gray-900 text-white text-sm font-medium px-5 py-2.5 rounded-lg hover:bg-gray-700 transition-colors">
                    Volgende →
                  </button>
                ) : (
                  <button onClick={handleSave} disabled={!klantnaam.trim()} className="bg-gray-900 text-white text-sm font-medium px-5 py-2.5 rounded-lg hover:bg-gray-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                    Opslaan
                  </button>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── Opening Screen ───────────────────────────────────────────────────────
    function OpeningScreen({ analyses, onNew, onImport, onOpen, onDelete, onExport }) {
      const fileRef = useRef();
      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try { onImport(JSON.parse(ev.target.result)); }
          catch { alert('Ongeldig JSON-bestand. Controleer het bestand en probeer opnieuw.'); }
        };
        reader.readAsText(file);
        e.target.value = '';
      };

      return (
        <div className="min-h-screen bg-gray-50 fade-in">
          <div className="max-w-2xl mx-auto px-4 py-12">
            <div className="mb-10">
              <h1 className="text-2xl font-bold text-gray-900 tracking-tight">Marketing Analyse</h1>
              <p className="text-sm text-gray-400 mt-1">Opgeslagen analyses</p>
            </div>
            <div className="flex gap-3 mb-8">
              <button onClick={onNew} className="inline-flex items-center gap-2 bg-gray-900 text-white text-sm font-medium px-4 py-2.5 rounded-lg hover:bg-gray-700 transition-colors">
                <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path d="M12 5v14M5 12h14" strokeLinecap="round"/>
                </svg>
                Nieuwe analyse
              </button>
              <button onClick={() => fileRef.current.click()} className="inline-flex items-center gap-2 bg-white border border-gray-200 text-gray-700 text-sm font-medium px-4 py-2.5 rounded-lg hover:bg-gray-50 transition-colors">
                <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" strokeLinecap="round"/>
                  <polyline points="17 8 12 3 7 8" strokeLinecap="round" strokeLinejoin="round"/>
                  <line x1="12" y1="3" x2="12" y2="15" strokeLinecap="round"/>
                </svg>
                Importeer JSON
              </button>
              <input ref={fileRef} type="file" accept=".json" onChange={handleFileChange} className="hidden" />
            </div>

            {analyses.length === 0 ? (
              <div className="text-center py-20 text-gray-300">
                <svg className="mx-auto mb-3 opacity-30" width="40" height="40" fill="none" stroke="currentColor" strokeWidth="1.5" viewBox="0 0 24 24">
                  <path d="M9 12h6M9 16h6M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                <p className="text-sm">Geen analyses gevonden. Start een nieuwe analyse.</p>
              </div>
            ) : (
              <div className="space-y-2">
                {analyses.map(a => (
                  <div key={a.id} onClick={() => onOpen(a)}
                    className="group bg-white border border-gray-100 rounded-xl px-5 py-4 flex items-center justify-between cursor-pointer hover:border-gray-300 hover:shadow-sm transition-all">
                    <div>
                      <p className="text-sm font-semibold text-gray-900">{a.klantnaam || 'Naamloos'}</p>
                      <p className="text-xs text-gray-400 mt-0.5">{formatDate(a.datum)}</p>
                    </div>
                    <div className="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                      <button onClick={e => { e.stopPropagation(); onExport(a); }}
                        className="text-xs text-gray-400 hover:text-gray-700 px-2.5 py-1.5 rounded-md hover:bg-gray-50 transition-colors">
                        Export
                      </button>
                      <button onClick={e => { e.stopPropagation(); onDelete(a.id); }}
                        className="text-xs text-gray-400 hover:text-red-500 px-2.5 py-1.5 rounded-md hover:bg-red-50 transition-colors">
                        Verwijder
                      </button>
                      <span className="text-gray-300 ml-1">→</span>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── App root ─────────────────────────────────────────────────────────────
    function App() {
      const [screen, setScreen] = useState('home'); // 'home' | 'dashboard' | 'form'
      const [viewing, setViewing] = useState(null);
      const [editing, setEditing] = useState(null);
      const [analyses, setAnalyses] = useState(() => {
        try { return JSON.parse(localStorage.getItem('ma_analyses') || '[]'); }
        catch { return []; }
      });

      const persist = (list) => {
        localStorage.setItem('ma_analyses', JSON.stringify(list));
        setAnalyses(list);
      };

      const handleSave = (data) => {
        let saved;
        if (editing) {
          saved = { ...data, id: editing.id, datum: editing.datum };
          persist(analyses.map(a => a.id === editing.id ? saved : a));
        } else {
          saved = { ...data, id: generateId(), datum: new Date().toISOString() };
          persist([saved, ...analyses]);
        }
        // If we came from dashboard, return there with updated data
        if (viewing) {
          setViewing(saved);
          setScreen('dashboard');
        } else {
          setScreen('home');
        }
        setEditing(null);
      };

      const handleDelete = (id) => {
        if (window.confirm('Deze analyse verwijderen?')) {
          persist(analyses.filter(a => a.id !== id));
        }
      };

      const handleImport = (raw) => {
        const items = Array.isArray(raw) ? raw : [raw];
        const newItems = items.map(d => ({
          ...d, id: generateId(),
          datum: d.datum || new Date().toISOString(),
          klantnaam: d.klantnaam || 'Geïmporteerd',
        }));
        persist([...newItems, ...analyses]);
      };

      if (screen === 'dashboard' && viewing) {
        return (
          <DashboardScreen
            analysis={viewing}
            onBack={() => { setViewing(null); setScreen('home'); }}
            onEdit={() => { setEditing(viewing); setScreen('form'); }}
          />
        );
      }

      if (screen === 'form') {
        return (
          <FormScreen
            initial={editing}
            onSave={handleSave}
            onBack={() => {
              if (viewing) { setScreen('dashboard'); }
              else { setScreen('home'); setEditing(null); }
            }}
          />
        );
      }

      return (
        <OpeningScreen
          analyses={analyses}
          onNew={() => { setEditing(null); setViewing(null); setScreen('form'); }}
          onImport={handleImport}
          onOpen={a => { setViewing(a); setScreen('dashboard'); }}
          onDelete={handleDelete}
          onExport={exportAnalysis}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
